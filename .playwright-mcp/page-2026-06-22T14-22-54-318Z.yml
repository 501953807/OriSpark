        - paragraph
        - heading "5 Authenticator and Verifier Requirements" [level=2] [ref=e577]:
          - text: "5"
          - text: Authenticator and Verifier Requirements
        - paragraph [ref=e578]:
          - emphasis [ref=e579]: This section is normative.
        - paragraph [ref=e580]:
          - text: This section provides the detailed requirements specific to each type of authenticator. With the exception of reauthentication requirements specified in
          - link "Section 4" [ref=e581] [cursor=pointer]:
            - /url: "#AAL_SEC4"
          - text: and the requirement for verifier impersonation resistance at AAL3 described in
          - link "Section 5.2.5" [ref=e582] [cursor=pointer]:
            - /url: "#verifimpers"
          - text: ", the technical requirements for each of the authenticator types are the same regardless of the AAL at which the authenticator is used."
        - heading "5.1 Requirements by Authenticator Type" [level=3] [ref=e583]: 5.1 Requirements by Authenticator Type
        - heading "5.1.1 Memorized Secrets" [level=4] [ref=e584]: 5.1.1 Memorized Secrets
        - table [ref=e586]:
          - rowgroup [ref=e587]:
            - row "authenticator A Memorized Secret authenticator — commonly referred to as a password or, if numeric, a PIN — is a secret value intended to be chosen and memorized by the user. Memorized secrets need to be of sufficient complexity and secrecy that it would be impractical for an attacker to guess or otherwise discover the correct secret value. A memorized secret is something you know." [ref=e588]:
              - cell "authenticator" [ref=e589]:
                - img "authenticator" [ref=e590]
              - cell "A Memorized Secret authenticator — commonly referred to as a password or, if numeric, a PIN — is a secret value intended to be chosen and memorized by the user. Memorized secrets need to be of sufficient complexity and secrecy that it would be impractical for an attacker to guess or otherwise discover the correct secret value. A memorized secret is something you know." [ref=e591]
        - heading "5.1.1.1 Memorized Secret Authenticators" [level=4] [ref=e592]
        - paragraph [ref=e593]:
          - text: Memorized secrets SHALL be at least 8 characters in length if chosen by the subscriber. Memorized secrets chosen randomly by the CSP or verifier SHALL be at least 6 characters in length and MAY be entirely numeric. If the CSP or verifier disallows a chosen memorized secret based on its appearance on a blacklist of compromised values, the subscriber SHALL be required to choose a different memorized secret. No other complexity requirements for memorized secrets SHOULD be imposed. A rationale for this is presented in
          - link "Appendix A" [ref=e594] [cursor=pointer]:
            - /url: "#appA"
          - emphasis [ref=e595]: Strength of Memorized Secrets
          - text: .
        - heading "5.1.1.2 Memorized Secret Verifiers" [level=4] [ref=e596]: 5.1.1.2 Memorized Secret Verifiers
        - paragraph [ref=e597]:
          - text: Verifiers SHALL require subscriber-chosen memorized secrets to be at least 8 characters in length. Verifiers SHOULD permit subscriber-chosen memorized secrets at least 64 characters in length. All printing ASCII
          - link "[RFC 20]" [ref=e598] [cursor=pointer]:
            - /url: "#RFC20"
          - text: characters as well as the space character SHOULD be acceptable in memorized secrets. Unicode
          - link "[ISO/ISC 10646]" [ref=e599] [cursor=pointer]:
            - /url: "#ISOIEC10646"
          - text: characters SHOULD be accepted as well. To make allowances for likely mistyping, verifiers MAY replace multiple consecutive space characters with a single space character prior to verification, provided that the result is at least 8 characters in length. Truncation of the secret SHALL NOT be performed. For purposes of the above length requirements, each Unicode code point SHALL be counted as a single character.
        - paragraph [ref=e600]:
          - text: If Unicode characters are accepted in memorized secrets, the verifier SHOULD apply the Normalization Process for Stabilized Strings using either the NFKC or NFKD normalization defined in Section 12.1 of Unicode Standard Annex 15
          - link "[UAX 15]" [ref=e601] [cursor=pointer]:
            - /url: "#UAX15"
          - text: . This process is applied before hashing the byte string representing the memorized secret. Subscribers choosing memorized secrets containing Unicode characters SHOULD be advised that some characters may be represented differently by some endpoints, which can affect their ability to authenticate successfully.
        - paragraph [ref=e602]:
          - text: Memorized secrets that are randomly chosen by the CSP (e.g., at enrollment) or by the verifier (e.g., when a user requests a new PIN) SHALL be at least 6 characters in length and SHALL be generated using an approved random bit generator
          - link "[SP 800-90Ar1]" [ref=e603] [cursor=pointer]:
            - /url: "#SP800-90Ar1"
          - text: .
        - paragraph [ref=e604]: Memorized secret verifiers SHALL NOT permit the subscriber to store a “hint” that is accessible to an unauthenticated claimant. Verifiers SHALL NOT prompt subscribers to use specific types of information (e.g., “What was the name of your first pet?”) when choosing memorized secrets.
        - paragraph [ref=e605]: "When processing requests to establish and change memorized secrets, verifiers SHALL compare the prospective secrets against a list that contains values known to be commonly-used, expected, or compromised. For example, the list MAY include, but is not limited to:"
        - list [ref=e606]:
          - listitem [ref=e607]: Passwords obtained from previous breach corpuses.
          - listitem [ref=e608]: Dictionary words.
          - listitem [ref=e609]: Repetitive or sequential characters (e.g. ‘aaaaaa’, ‘1234abcd’).
          - listitem [ref=e610]: Context-specific words, such as the name of the service, the username, and derivatives thereof.
        - paragraph [ref=e611]: If the chosen secret is found in the list, the CSP or verifier SHALL advise the subscriber that they need to select a different secret, SHALL provide the reason for rejection, and SHALL require the subscriber to choose a different value.
        - paragraph [ref=e612]:
          - text: Verifiers SHOULD offer guidance to the subscriber, such as a password-strength meter
          - link "[Meters]" [ref=e613] [cursor=pointer]:
            - /url: "#meters"
          - text: ", to assist the user in choosing a strong memorized secret. This is particularly important following the rejection of a memorized secret on the above list as it discourages trivial modification of listed (and likely very weak) memorized secrets"
          - link "[Blacklists]" [ref=e614] [cursor=pointer]:
            - /url: "#blacklists"
          - text: .
        - paragraph [ref=e615]:
          - text: Verifiers SHALL implement a rate-limiting mechanism that effectively limits the number of failed authentication attempts that can be made on the subscriber’s account as described in
          - link "Section 5.2.2" [ref=e616] [cursor=pointer]:
            - /url: "#throttle"
          - text: .
        - paragraph [ref=e617]: Verifiers SHOULD NOT impose other composition rules (e.g., requiring mixtures of different character types or prohibiting consecutively repeated characters) for memorized secrets. Verifiers SHOULD NOT require memorized secrets to be changed arbitrarily (e.g., periodically). However, verifiers SHALL force a change if there is evidence of compromise of the authenticator.
        - paragraph [ref=e618]: Verifiers SHOULD permit claimants to use “paste” functionality when entering a memorized secret. This facilitates the use of password managers, which are widely used and in many cases increase the likelihood that users will choose stronger memorized secrets.
        - paragraph [ref=e619]: In order to assist the claimant in successfully entering a memorized secret, the verifier SHOULD offer an option to display the secret — rather than a series of dots or asterisks — until it is entered. This allows the claimant to verify their entry if they are in a location where their screen is unlikely to be observed. The verifier MAY also permit the user’s device to display individual entered characters for a short time after each character is typed to verify correct entry. This is particularly applicable on mobile devices.
        - paragraph [ref=e620]: The verifier SHALL use approved encryption and an authenticated protected channel when requesting memorized secrets in order to provide resistance to eavesdropping and MitM attacks.
        - paragraph [ref=e621]:
          - text: Verifiers SHALL store memorized secrets in a form that is resistant to offline attacks. Memorized secrets SHALL be salted and hashed using a suitable one-way key derivation function. Key derivation functions take a password, a salt, and a cost factor as inputs then generate a password hash. Their purpose is to make each password guessing trial by an attacker who has obtained a password hash file expensive and therefore the cost of a guessing attack high or prohibitive. Examples of suitable key derivation functions include Password-based Key Derivation Function 2 (PBKDF2)
          - link "[SP 800-132]" [ref=e622] [cursor=pointer]:
            - /url: "#SP800-132"
          - text: and Balloon
          - link "[BALLOON]" [ref=e623] [cursor=pointer]:
            - /url: "#balloon"
          - text: . A memory-hard function SHOULD be used because it increases the cost of an attack. The key derivation function SHALL use an approved one-way function such as Keyed Hash Message Authentication Code (HMAC)
          - link "[FIPS 198-1]" [ref=e624] [cursor=pointer]:
            - /url: "#FIPS198-1"
          - text: ", any approved hash function in"
          - link "SP 800-107" [ref=e625] [cursor=pointer]:
            - /url: "#SP800-107"
          - text: ", Secure Hash Algorithm 3 (SHA-3)"
          - link "[FIPS 202]" [ref=e626] [cursor=pointer]:
            - /url: "#FIPS202"
          - text: ", CMAC"
          - link "[SP 800-38B]" [ref=e627] [cursor=pointer]:
            - /url: "#SP800-38B"
          - text: or Keccak Message Authentication Code (KMAC), Customizable SHAKE (cSHAKE), or ParallelHash
          - link "[SP 800-185]" [ref=e628] [cursor=pointer]:
            - /url: "#SP800-185"
          - text: . The chosen output length of the key derivation function SHOULD be the same as the length of the underlying one-way function output.
        - paragraph [ref=e629]: The salt SHALL be at least 32 bits in length and be chosen arbitrarily so as to minimize salt value collisions among stored hashes. Both the salt value and the resulting hash SHALL be stored for each subscriber using a memorized secret authenticator.
        - paragraph [ref=e630]: "For PBKDF2, the cost factor is an iteration count: the more times the PBKDF2 function is iterated, the longer it takes to compute the password hash. Therefore, the iteration count SHOULD be as large as verification server performance will allow, typically at least 10,000 iterations."
        - paragraph [ref=e631]:
          - text: In addition, verifiers SHOULD perform an additional iteration of a key derivation function using a salt value that is secret and known only to the verifier. This salt value, if used, SHALL be generated by an approved random bit generator
          - link "[SP 800-90Ar1]" [ref=e632] [cursor=pointer]:
            - /url: "#SP800-90Ar1"
          - text: and provide at least the minimum security strength specified in the latest revision of
          - link "SP 800-131A" [ref=e633] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication). The secret salt value SHALL be stored separately from the hashed memorized secrets (e.g., in a specialized device like a hardware security module). With this additional iteration, brute-force attacks on the hashed memorized secrets are impractical as long as the secret salt value remains secret.
        - heading "5.1.2 Look-Up Secrets" [level=4] [ref=e634]: 5.1.2 Look-Up Secrets
        - table [ref=e636]:
          - rowgroup [ref=e637]:
            - row "authenticator A look-up secret authenticator is a physical or electronic record that stores a set of secrets shared between the claimant and the CSP. The claimant uses the authenticator to look up the appropriate secret(s) needed to respond to a prompt from the verifier. For example, the verifier may ask a claimant to provide a specific subset of the numeric or character strings printed on a card in table format. A common application of look-up secrets is the use of \"recovery keys\" stored by the subscriber for use in the event another authenticator is lost or malfunctions. A look-up secret is something you have." [ref=e638]:
              - cell "authenticator" [ref=e639]:
                - img "authenticator" [ref=e640]
              - cell "A look-up secret authenticator is a physical or electronic record that stores a set of secrets shared between the claimant and the CSP. The claimant uses the authenticator to look up the appropriate secret(s) needed to respond to a prompt from the verifier. For example, the verifier may ask a claimant to provide a specific subset of the numeric or character strings printed on a card in table format. A common application of look-up secrets is the use of \"recovery keys\" stored by the subscriber for use in the event another authenticator is lost or malfunctions. A look-up secret is something you have." [ref=e641]
        - heading "5.1.2.1 Look-Up Secret Authenticators" [level=4] [ref=e642]: 5.1.2.1 Look-Up Secret Authenticators
        - paragraph [ref=e643]:
          - text: CSPs creating look-up secret authenticators SHALL use an approved random bit generator
          - link "[SP 800-90Ar1]" [ref=e644] [cursor=pointer]:
            - /url: "#SP800-90Ar1"
          - text: to generate the list of secrets and SHALL deliver the authenticator securely to the subscriber. Look-up secrets SHALL have at least 20 bits of entropy.
        - paragraph [ref=e645]:
          - text: Look-up secrets MAY be distributed by the CSP in person, by postal mail to the subscriber’s address of record, or by online distribution. If distributed online, look-up secrets SHALL be distributed over a secure channel in accordance with the post-enrollment binding requirements in
          - link "Section 6.1.2" [ref=e646] [cursor=pointer]:
            - /url: "#post-enroll-bind"
          - text: .
        - paragraph [ref=e647]: If the authenticator uses look-up secrets sequentially from a list, the subscriber MAY dispose of used secrets, but only after a successful authentication.
        - heading "5.1.2.2 Look-Up Secret Verifiers" [level=4] [ref=e648]
        - paragraph [ref=e649]: Verifiers of look-up secrets SHALL prompt the claimant for the next secret from their authenticator or for a specific (e.g., numbered) secret. A given secret from an authenticator SHALL be used successfully only once. If the look-up secret is derived from a grid card, each cell of the grid SHALL be used only once.
        - paragraph [ref=e650]:
          - text: Verifiers SHALL store look-up secrets in a form that is resistant to offline attacks. Look-up secrets having at least 112 bits of entropy SHALL be hashed with an approved one-way function as described in
          - link "Section 5.1.1.2" [ref=e651] [cursor=pointer]:
            - /url: "#memsecretver"
          - text: . Look-up secrets with fewer than 112 bits of entropy SHALL be salted and hashed using a suitable one-way key derivation function, also described in
          - link "Section 5.1.1.2" [ref=e652] [cursor=pointer]:
            - /url: "#memsecretver"
          - text: . The salt value SHALL be at least 32 in bits in length and arbitrarily chosen so as to minimize salt value collisions among stored hashes. Both the salt value and the resulting hash SHALL be stored for each look-up secret.
        - paragraph [ref=e653]:
          - text: For look-up secrets that have less than 64 bits of entropy, the verifier SHALL implement a rate-limiting mechanism that effectively limits the number of failed authentication attempts that can be made on the subscriber’s account as described in
          - link "Section 5.2.2" [ref=e654] [cursor=pointer]:
            - /url: "#throttle"
          - text: .
        - paragraph [ref=e655]: The verifier SHALL use approved encryption and an authenticated protected channel when requesting look-up secrets in order to provide resistance to eavesdropping and MitM attacks.
        - heading "5.1.3 Out-of-Band Devices" [level=4] [ref=e656]: 5.1.3 Out-of-Band Devices
        - table [ref=e658]:
          - rowgroup [ref=e659]:
            - row [ref=e660]:
              - cell "authenticator" [ref=e661]:
                - img "authenticator" [ref=e662]
              - cell [ref=e663]:
                - text: An out-of-band authenticator is a physical device that is uniquely addressable and can communicate securely with the verifier over a distinct communications channel, referred to as the secondary channel. The device is possessed and controlled by the claimant and supports private communication over this secondary channel, separate from the primary channel for e-authentication. An out-of-band authenticator is something you have.
                - text: "The out-of-band authenticator can operate in one of the following ways:"
                - text: "- The claimant transfers a secret received by the out-of-band device via the secondary channel to the verifier using the primary channel. For example, the claimant may receive the secret on their mobile device and type it (typically a 6-digit code) into their authentication session."
                - text: "- The claimant transfers a secret received via the primary channel to the out-of-band device for transmission to the verifier via the secondary channel. For example, the claimant may view the secret on their authentication session and either type it into an app on their mobile device or use a technology such as a barcode or QR code to effect the transfer."
                - text: "- The claimant compares secrets received from the primary channel and the secondary channel and confirms the authentication via the secondary channel."
                - text: The secret's purpose is to securely bind the authentication operation on the primary and secondary channel. When the response is via the primary communication channel, the secret also establishes the claimant's control of the out-of-band device.
        - heading "5.1.3.1 Out-of-Band Authenticators" [level=4] [ref=e664]: 5.1.3.1 Out-of-Band Authenticators
        - paragraph [ref=e665]: The out-of-band authenticator SHALL establish a separate channel with the verifier in order to retrieve the out-of-band secret or authentication request. This channel is considered to be out-of-band with respect to the primary communication channel (even if it terminates on the same device) provided the device does not leak information from one channel to the other without the authorization of the claimant.
        - paragraph [ref=e666]:
          - text: The out-of-band device SHOULD be uniquely addressable and communication over the secondary channel SHALL be encrypted unless sent via the public switched telephone network (PSTN). For additional authenticator requirements specific to the PSTN, see
          - link "Section 5.1.3.3" [ref=e667] [cursor=pointer]:
            - /url: "#pstnOOB"
          - text: . Methods that do not prove possession of a specific device, such as voice-over-IP (VOIP) or email, SHALL NOT be used for out-of-band authentication.
        - paragraph [ref=e668]: "The out-of-band authenticator SHALL uniquely authenticate itself in one of the following ways when communicating with the verifier:"
        - list [ref=e669]:
          - listitem [ref=e670]:
            - paragraph [ref=e671]: Establish an authenticated protected channel to the verifier using approved cryptography. The key used SHALL be stored in suitably secure storage available to the authenticator application (e.g., keychain storage, TPM, TEE, secure element).
          - listitem [ref=e672]:
            - paragraph [ref=e673]: Authenticate to a public mobile telephone network using a SIM card or equivalent that uniquely identifies the device. This method SHALL only be used if a secret is being sent from the verifier to the out-of-band device via the PSTN (SMS or voice).
        - paragraph [ref=e674]: If a secret is sent by the verifier to the out-of-band device, the device SHOULD NOT display the authentication secret while it is locked by the owner (i.e., requires an entry of a PIN, passcode, or biometric to view). However, authenticators SHOULD indicate the receipt of an authentication secret on a locked device.
        - paragraph [ref=e675]: "If the out-of-band authenticator sends an approval message over the secondary communication channel — rather than by the claimant transferring a received secret to the primary communication channel — it SHALL do one of the following:"
        - list [ref=e676]:
          - listitem [ref=e677]:
            - paragraph [ref=e678]: The authenticator SHALL accept transfer of the secret from the primary channel which it SHALL send to the verifier over the secondary channel to associate the approval with the authentication transaction. The claimant MAY perform the transfer manually or use a technology such as a barcode or QR code to effect the transfer.
          - listitem [ref=e679]:
            - paragraph [ref=e680]: The authenticator SHALL present a secret received via the secondary channel from the verifier and prompt the claimant to verify the consistency of that secret with the primary channel, prior to accepting a yes/no response from the claimant. It SHALL then send that response to the verifier.
        - heading "5.1.3.2 Out-of-Band Verifiers" [level=4] [ref=e681]
        - paragraph [ref=e682]:
          - text: For additional verification requirements specific to the PSTN, see
          - link "Section 5.1.3.3" [ref=e683] [cursor=pointer]:
            - /url: "#pstnOOB"
          - text: .
        - paragraph [ref=e684]: If out-of-band verification is to be made using a secure application, such as on a smart phone, the verifier MAY send a push notification to that device. The verifier then waits for the establishment of an authenticated protected channel and verifies the authenticator’s identifying key. The verifier SHALL NOT store the identifying key itself, but SHALL use a verification method (e.g., an approved hash function or proof of possession of the identifying key) to uniquely identify the authenticator. Once authenticated, the verifier transmits the authentication secret to the authenticator.
        - paragraph [ref=e685]: "Depending on the type of out-of-band authenticator, one of the following SHALL take place:"
        - list [ref=e686]:
          - listitem [ref=e687]:
            - paragraph [ref=e688]: "Transfer of secret to primary channel: The verifier MAY signal the device containing the subscriber’s authenticator to indicate readiness to authenticate. It SHALL then transmit a random secret to the out-of-band authenticator. The verifier SHALL then wait for the secret to be returned on the primary communication channel."
          - listitem [ref=e689]:
            - paragraph [ref=e690]: "Transfer of secret to secondary channel: The verifier SHALL display a random authentication secret to the claimant via the primary channel. It SHALL then wait for the secret to be returned on the secondary channel from the claimant’s out-of-band authenticator."
          - listitem [ref=e691]:
            - paragraph [ref=e692]: "Verification of secrets by claimant: The verifier SHALL display a random authentication secret to the claimant via the primary channel, and SHALL send the same secret to the out-of-band authenticator via the secondary channel for presentation to the claimant. It SHALL then wait for an approval (or disapproval) message via the secondary channel."
        - paragraph [ref=e693]:
          - text: In all cases, the authentication SHALL be considered invalid if not completed within 10 minutes. In order to provide replay resistance as described in
          - link "Section 5.2.8" [ref=e694] [cursor=pointer]:
            - /url: "#replay"
          - text: ", verifiers SHALL accept a given authentication secret only once during the validity period."
        - paragraph [ref=e695]:
          - text: The verifier SHALL generate random authentication secrets with at least 20 bits of entropy using an approved random bit generator
          - link "[SP 800-90Ar1]" [ref=e696] [cursor=pointer]:
            - /url: "#SP800-90Ar1"
          - text: . If the authentication secret has less than 64 bits of entropy, the verifier SHALL implement a rate-limiting mechanism that effectively limits the number of failed authentication attempts that can be made on the subscriber’s account as described in
          - link "Section 5.2.2" [ref=e697] [cursor=pointer]:
            - /url: "#throttle"
          - text: .
        - heading "5.1.3.3 Authentication using the Public Switched Telephone Network" [level=4] [ref=e698]: 5.1.3.3 Authentication using the Public Switched Telephone Network
        - paragraph [ref=e699]:
          - text: Use of the PSTN for out-of-band verification is RESTRICTED as described in this section and in
          - link "Section 5.2.10" [ref=e700] [cursor=pointer]:
            - /url: "#restricted"
          - text: . If out-of-band verification is to be made using the PSTN, the verifier SHALL verify that the pre-registered telephone number being used is associated with a specific physical device. Changing the pre-registered telephone number is considered to be the binding of a new authenticator and SHALL only occur as described in
          - link "Section 6.1.2" [ref=e701] [cursor=pointer]:
            - /url: "#post-enroll-bind"
          - text: .
        - paragraph [ref=e702]: Verifiers SHOULD consider risk indicators such as device swap, SIM change, number porting, or other abnormal behavior before using the PSTN to deliver an out-of-band authentication secret.
        - blockquote [ref=e703]:
          - paragraph [ref=e704]:
            - text: "NOTE: Consistent with the restriction of authenticators in"
            - link "Section 5.2.10" [ref=e705] [cursor=pointer]:
              - /url: "#restricted"
            - text: ", NIST may adjust the RESTRICTED status of the PSTN over time based on the evolution of the threat landscape and the technical operation of the PSTN."
        - heading "5.1.4 Single-Factor OTP Device" [level=4] [ref=e706]: 5.1.4 Single-Factor OTP Device
        - table [ref=e708]:
          - rowgroup [ref=e709]:
            - row [ref=e710]:
              - cell "authenticator" [ref=e711]:
                - img "authenticator" [ref=e712]
              - cell "A single-factor OTP device generates OTPs. This category includes hardware devices and software-based OTP generators installed on devices such as mobile phones. These devices have an embedded secret that is used as the seed for generation of OTPs and does not require activation through a second factor. The OTP is displayed on the device and manually input for transmission to the verifier, thereby proving possession and control of the device. An OTP device may, for example, display 6 characters at a time. A single-factor OTP device is something you have. Single-factor OTP devices are similar to look-up secret authenticators with the exception that the secrets are cryptographically and independently generated by the authenticator and verifier and compared by the verifier. The secret is computed based on a nonce that may be time-based or from a counter on the authenticator and verifier." [ref=e713]:
                - text: A single-factor OTP device generates OTPs. This category includes hardware devices and software-based OTP generators installed on devices such as mobile phones. These devices have an embedded secret that is used as the seed for generation of OTPs and does not require activation through a second factor. The OTP is displayed on the device and manually input for transmission to the verifier, thereby proving possession and control of the device. An OTP device may, for example, display 6 characters at a time. A single-factor OTP device is something you have.
                - text: Single-factor OTP devices are similar to look-up secret authenticators with the exception that the secrets are cryptographically and independently generated by the authenticator and verifier and compared by the verifier. The secret is computed based on a nonce that may be time-based or from a counter on the authenticator and verifier.
        - heading "5.1.4.1 Single-Factor OTP Authenticators" [level=4] [ref=e714]: 5.1.4.1 Single-Factor OTP Authenticators
        - paragraph [ref=e715]: Single-factor OTP authenticators contain two persistent values. The first is a symmetric key that persists for the device’s lifetime. The second is a nonce that is either changed each time the authenticator is used or is based on a real-time clock.
        - paragraph [ref=e716]:
          - text: The secret key and its algorithm SHALL provide at least the minimum security strength specified in the latest revision of
          - link "SP 800-131A" [ref=e717] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication). The nonce SHALL be of sufficient length to ensure that it is unique for each operation of the device over its lifetime. OTP authenticators — particularly software-based OTP generators — SHOULD discourage and SHALL NOT facilitate the cloning of the secret key onto multiple devices.
        - paragraph [ref=e718]: The authenticator output is obtained by using an approved block cipher or hash function to combine the key and nonce in a secure manner. The authenticator output MAY be truncated to as few as 6 decimal digits (approximately 20 bits of entropy).
        - paragraph [ref=e719]: If the nonce used to generate the authenticator output is based on a real-time clock, the nonce SHALL be changed at least once every 2 minutes. The OTP value associated with a given nonce SHALL be accepted only once.
        - heading "5.1.4.2 Single-Factor OTP Verifiers" [level=4] [ref=e720]
        - paragraph [ref=e721]: Single-factor OTP verifiers effectively duplicate the process of generating the OTP used by the authenticator. As such, the symmetric keys used by authenticators are also present in the verifier, and SHALL be strongly protected against compromise.
        - paragraph [ref=e722]: When a single-factor OTP authenticator is being associated with a subscriber account, the verifier or associated CSP SHALL use approved cryptography to either generate and exchange or to obtain the secrets required to duplicate the authenticator output.
        - paragraph [ref=e723]:
          - text: The verifier SHALL use approved encryption and an authenticated protected channel when collecting the OTP in order to provide resistance to eavesdropping and MitM attacks. Time-based OTPs
          - link "[RFC 6238]" [ref=e724] [cursor=pointer]:
            - /url: "#RFC6238"
          - text: SHALL have a defined lifetime that is determined by the expected clock drift — in either direction — of the authenticator over its lifetime, plus allowance for network delay and user entry of the OTP. In order to provide replay resistance as described in
          - link "Section 5.2.8" [ref=e725] [cursor=pointer]:
            - /url: "#replay"
          - text: ", verifiers SHALL accept a given time-based OTP only once during the validity period."
        - paragraph [ref=e726]:
          - text: If the authenticator output has less than 64 bits of entropy, the verifier SHALL implement a rate-limiting mechanism that effectively limits the number of failed authentication attempts that can be made on the subscriber’s account as described in
          - link "Section 5.2.2" [ref=e727] [cursor=pointer]:
            - /url: "#throttle"
          - text: .
        - heading "5.1.5 Multi-Factor OTP Devices" [level=4] [ref=e728]: 5.1.5 Multi-Factor OTP Devices
        - table [ref=e730]:
          - rowgroup [ref=e731]:
            - row "authenticator A multi-factor OTP device generates OTPs for use in authentication after activation through an additional authentication factor. This includes hardware devices and software-based OTP generators installed on devices such as mobile phones. The second factor of authentication may be achieved through some kind of integral entry pad, an integral biometric (e.g., fingerprint) reader, or a direct computer interface (e.g., USB port). The OTP is displayed on the device and manually input for transmission to the verifier. For example, an OTP device may display 6 characters at a time, thereby proving possession and control of the device. The multi-factor OTP device is something you have, and it SHALL be activated by either something you know or something you are." [ref=e732]:
              - cell "authenticator" [ref=e733]:
                - img "authenticator" [ref=e734]
              - cell "A multi-factor OTP device generates OTPs for use in authentication after activation through an additional authentication factor. This includes hardware devices and software-based OTP generators installed on devices such as mobile phones. The second factor of authentication may be achieved through some kind of integral entry pad, an integral biometric (e.g., fingerprint) reader, or a direct computer interface (e.g., USB port). The OTP is displayed on the device and manually input for transmission to the verifier. For example, an OTP device may display 6 characters at a time, thereby proving possession and control of the device. The multi-factor OTP device is something you have, and it SHALL be activated by either something you know or something you are." [ref=e735]
        - heading "5.1.5.1 Multi-Factor OTP Authenticators" [level=4] [ref=e736]:
          - text: 5.1.5.1
          - text: Multi-Factor OTP Authenticators
        - paragraph [ref=e737]:
          - text: Multi-factor OTP authenticators operate in a similar manner to single-factor OTP authenticators (see
          - link "Section 5.1.4.1" [ref=e738] [cursor=pointer]:
            - /url: "#sfotpa"
          - text: ), except that they require the entry of either a memorized secret or the use of a biometric to obtain the OTP from the authenticator. Each use of the authenticator SHALL require the input of the additional factor.
        - paragraph [ref=e739]: In addition to activation information, multi-factor OTP authenticators contain two persistent values. The first is a symmetric key that persists for the device’s lifetime. The second is a nonce that is either changed each time the authenticator is used or is based on a real-time clock.
        - paragraph [ref=e740]:
          - text: The secret key and its algorithm SHALL provide at least the minimum security strength specified in the latest revision of
          - link "[SP 800-131A]" [ref=e741] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication). The nonce SHALL be of sufficient length to ensure that it is unique for each operation of the device over its lifetime. OTP authenticators — particularly software-based OTP generators — SHOULD discourage and SHALL NOT facilitate the cloning of the secret key onto multiple devices.
        - paragraph [ref=e742]: The authenticator output is obtained by using an approved block cipher or hash function to combine the key and nonce in a secure manner. The authenticator output MAY be truncated to as few as 6 decimal digits (approximately 20 bits of entropy).
        - paragraph [ref=e743]: If the nonce used to generate the authenticator output is based on a real-time clock, the nonce SHALL be changed at least once every 2 minutes. The OTP value associated with a given nonce SHALL be accepted only once.
        - paragraph [ref=e744]:
          - text: Any memorized secret used by the authenticator for activation SHALL be a randomly-chosen numeric secret at least 6 decimal digits in length or other memorized secret meeting the requirements of
          - link "Section 5.1.1.2" [ref=e745] [cursor=pointer]:
            - /url: "#memsecretver"
          - text: and SHALL be rate limited as specified in
          - link "Section 5.2.2" [ref=e746] [cursor=pointer]:
            - /url: "#throttle"
          - text: . A biometric activation factor SHALL meet the requirements of
          - link "Section 5.2.3" [ref=e747] [cursor=pointer]:
            - /url: "#biometric_use"
          - text: ", including limits on the number of consecutive authentication failures."
        - paragraph [ref=e748]: The unencrypted key and activation secret or biometric sample — and any biometric data derived from the biometric sample such as a probe produced through signal processing — SHALL be zeroized immediately after an OTP has been generated.
        - heading "5.1.5.2 Multi-Factor OTP Verifiers" [level=4] [ref=e749]
        - paragraph [ref=e750]: Multi-factor OTP verifiers effectively duplicate the process of generating the OTP used by the authenticator, but without the requirement that a second factor be provided. As such, the symmetric keys used by authenticators SHALL be strongly protected against compromise.
        - paragraph [ref=e751]:
          - text: When a multi-factor OTP authenticator is being associated with a subscriber account, the verifier or associated CSP SHALL use approved cryptography to either generate and exchange or to obtain the secrets required to duplicate the authenticator output. The verifier or CSP SHALL also establish, via the authenticator source, that the authenticator is a multi-factor device. In the absence of a trusted statement that it is a multi-factor device, the verifier SHALL treat the authenticator as single-factor, in accordance with
          - link "Section 5.1.4" [ref=e752] [cursor=pointer]:
            - /url: "#singlefactorOTP"
          - text: .
        - paragraph [ref=e753]:
          - text: The verifier SHALL use approved encryption and an authenticated protected channel when collecting the OTP in order to provide resistance to eavesdropping and MitM attacks. Time-based OTPs
          - link "[RFC 6238]" [ref=e754] [cursor=pointer]:
            - /url: "#RFC6238"
          - text: SHALL have a defined lifetime that is determined by the expected clock drift — in either direction — of the authenticator over its lifetime, plus allowance for network delay and user entry of the OTP. In order to provide replay resistance as described in
          - link "Section 5.2.8" [ref=e755] [cursor=pointer]:
            - /url: "#replay"
          - text: ", verifiers SHALL accept a given time-based OTP only once during the validity period. In the event a claimant’s authentication is denied due to duplicate use of an OTP, verifiers MAY warn the claimant in case an attacker has been able to authenticate in advance. Verifiers MAY also warn a subscriber in an existing session of the attempted duplicate use of an OTP."
        - paragraph [ref=e756]:
          - text: If the authenticator output or activation secret has less than 64 bits of entropy, the verifier SHALL implement a rate-limiting mechanism that effectively limits the number of failed authentication attempts that can be made on the subscriber’s account as described in
          - link "Section 5.2.2" [ref=e757] [cursor=pointer]:
            - /url: "#throttle"
          - text: . A biometric activation factor SHALL meet the requirements of
          - link "Section 5.2.3" [ref=e758] [cursor=pointer]:
            - /url: "#biometric_use"
          - text: ", including limits on the number of consecutive authentication failures."
        - heading "5.1.6 Single-Factor Cryptographic Software" [level=4] [ref=e759]: 5.1.6 Single-Factor Cryptographic Software
        - table [ref=e761]:
          - rowgroup [ref=e762]:
            - row "authenticator A single-factor software cryptographic authenticator is a cryptographic key stored on disk or some other \"soft\" media. Authentication is accomplished by proving possession and control of the key. The authenticator output is highly dependent on the specific cryptographic protocol, but it is generally some type of signed message. The single-factor software cryptographic authenticator is something you have." [ref=e763]:
              - cell "authenticator" [ref=e764]:
                - img "authenticator" [ref=e765]
              - cell "A single-factor software cryptographic authenticator is a cryptographic key stored on disk or some other \"soft\" media. Authentication is accomplished by proving possession and control of the key. The authenticator output is highly dependent on the specific cryptographic protocol, but it is generally some type of signed message. The single-factor software cryptographic authenticator is something you have." [ref=e766]
        - heading "5.1.6.1 Single-Factor Cryptographic Software Authenticators" [level=4] [ref=e767]: 5.1.6.1 Single-Factor Cryptographic Software Authenticators
        - paragraph [ref=e768]: Single-factor software cryptographic authenticators encapsulate one or more secret keys unique to the authenticator. The key SHALL be stored in suitably secure storage available to the authenticator application (e.g., keychain storage, TPM, or TEE if available). The key SHALL be strongly protected against unauthorized disclosure by the use of access controls that limit access to the key to only those software components on the device requiring access. Single-factor cryptographic software authenticators SHOULD discourage and SHALL NOT facilitate the cloning of the secret key onto multiple devices.
        - heading "5.1.6.2 Single-Factor Cryptographic Software Verifiers" [level=4] [ref=e769]
        - paragraph [ref=e770]:
          - text: The requirements for a single-factor cryptographic software verifier are identical to those for a single-factor cryptographic device verifier, described in
          - link "Section 5.1.7.2" [ref=e771] [cursor=pointer]:
            - /url: "#sfcdv"
          - text: .
        - heading "5.1.7 Single-Factor Cryptographic Devices" [level=4] [ref=e772]: 5.1.7 Single-Factor Cryptographic Devices
        - table [ref=e774]:
          - rowgroup [ref=e775]:
            - row "authenticator A single-factor cryptographic device is a hardware device that performs cryptographic operations using protected cryptographic key(s) and provides the authenticator output via direct connection to the user endpoint. The device uses embedded symmetric or asymmetric cryptographic keys, and does not require activation through a second factor of authentication. Authentication is accomplished by proving possession of the device via the authentication protocol. The authenticator output is provided by direct connection to the user endpoint and is highly dependent on the specific cryptographic device and protocol, but it is typically some type of signed message. A single-factor cryptographic device is something you have." [ref=e776]:
              - cell "authenticator" [ref=e777]:
                - img "authenticator" [ref=e778]
              - cell "A single-factor cryptographic device is a hardware device that performs cryptographic operations using protected cryptographic key(s) and provides the authenticator output via direct connection to the user endpoint. The device uses embedded symmetric or asymmetric cryptographic keys, and does not require activation through a second factor of authentication. Authentication is accomplished by proving possession of the device via the authentication protocol. The authenticator output is provided by direct connection to the user endpoint and is highly dependent on the specific cryptographic device and protocol, but it is typically some type of signed message. A single-factor cryptographic device is something you have." [ref=e779]
        - heading "5.1.7.1 Single-Factor Cryptographic Device Authenticators" [level=4] [ref=e780]:
          - text: 5.1.7.1
          - text: Single-Factor Cryptographic Device Authenticators
        - paragraph [ref=e781]: Single-factor cryptographic device authenticators encapsulate one or more secret keys unique to the device that SHALL NOT be exportable (i.e., cannot be removed from the device). The authenticator operates by signing a challenge nonce presented through a direct computer interface (e.g., a USB port). Alternatively, the authenticator could be a suitably secure processor integrated with the user endpoint itself (e.g., a hardware TPM). Although cryptographic devices contain software, they differ from cryptographic software authenticators in that all embedded software is under control of the CSP or issuer and that the entire authenticator is subject to all applicable FIPS 140 requirements at the AAL being authenticated.
        - paragraph [ref=e782]:
          - text: The secret key and its algorithm SHALL provide at least the minimum security length specified in the latest revision of
          - link "SP 800-131A" [ref=e783] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication). The challenge nonce SHALL be at least 64 bits in length. Approved cryptography SHALL be used.
        - paragraph [ref=e784]: Single-factor cryptographic device authenticators SHOULD require a physical input (e.g., the pressing of a button) in order to operate. This provides defense against unintended operation of the device, which might occur if the endpoint to which it is connected is compromised.
        - heading "5.1.7.2 Single-Factor Cryptographic Device Verifiers" [level=4] [ref=e785]:
          - text: 5.1.7.2
          - text: Single-Factor Cryptographic Device Verifiers
        - paragraph [ref=e786]: Single-factor cryptographic device verifiers generate a challenge nonce, send it to the corresponding authenticator, and use the authenticator output to verify possession of the device. The authenticator output is highly dependent on the specific cryptographic device and protocol, but it is generally some type of signed message.
        - paragraph [ref=e787]: The verifier has either symmetric or asymmetric cryptographic keys corresponding to each authenticator. While both types of keys SHALL be protected against modification, symmetric keys SHALL additionally be protected against unauthorized disclosure.
        - paragraph [ref=e788]:
          - text: The challenge nonce SHALL be at least 64 bits in length, and SHALL either be unique over the authenticator’s lifetime or statistically unique (i.e., generated using an approved random bit generator
          - link "[SP 800-90Ar1]" [ref=e789] [cursor=pointer]:
            - /url: "#SP800-90Ar1"
          - text: ). The verification operation SHALL use approved cryptography.
        - heading "5.1.8 Multi-Factor Cryptographic Software" [level=4] [ref=e790]: 5.1.8 Multi-Factor Cryptographic Software
        - table [ref=e792]:
          - rowgroup [ref=e793]:
            - row "authenticator A multi-factor software cryptographic authenticator is a cryptographic key stored on disk or some other \"soft\" media that requires activation through a second factor of authentication. Authentication is accomplished by proving possession and control of the key. The authenticator output is highly dependent on the specific cryptographic protocol, but it is generally some type of signed message. The multi-factor software cryptographic authenticator is something you have, and it SHALL be activated by either something you know or something you are." [ref=e794]:
              - cell "authenticator" [ref=e795]:
                - img "authenticator" [ref=e796]
              - cell "A multi-factor software cryptographic authenticator is a cryptographic key stored on disk or some other \"soft\" media that requires activation through a second factor of authentication. Authentication is accomplished by proving possession and control of the key. The authenticator output is highly dependent on the specific cryptographic protocol, but it is generally some type of signed message. The multi-factor software cryptographic authenticator is something you have, and it SHALL be activated by either something you know or something you are." [ref=e797]
        - heading "5.1.8.1 Multi-Factor Cryptographic Software Authenticators" [level=4] [ref=e798]: 5.1.8.1 Multi-Factor Cryptographic Software Authenticators
        - paragraph [ref=e799]: Multi-factor software cryptographic authenticators encapsulate one or more secret keys unique to the authenticator and accessible only through the input of an additional factor, either a memorized secret or a biometric. The key SHOULD be stored in suitably secure storage available to the authenticator application (e.g., keychain storage, TPM, TEE). The key SHALL be strongly protected against unauthorized disclosure by the use of access controls that limit access to the key to only those software components on the device requiring access. Multi-factor cryptographic software authenticators SHOULD discourage and SHALL NOT facilitate the cloning of the secret key onto multiple devices.
        - paragraph [ref=e800]: Each authentication operation using the authenticator SHALL require the input of both factors.
        - paragraph [ref=e801]:
          - text: Any memorized secret used by the authenticator for activation SHALL be a randomly-chosen numeric value at least 6 decimal digits in length or other memorized secret meeting the requirements of
          - link "Section 5.1.1.2" [ref=e802] [cursor=pointer]:
            - /url: "#memsecretver"
          - text: and SHALL be rate limited as specified in
          - link "Section 5.2.2" [ref=e803] [cursor=pointer]:
            - /url: "#throttle"
          - text: . A biometric activation factor SHALL meet the requirements of
          - link "Section 5.2.3" [ref=e804] [cursor=pointer]:
            - /url: "#biometric_use"
          - text: ", including limits on the number of consecutive authentication failures."
        - paragraph [ref=e805]: The unencrypted key and activation secret or biometric sample — and any biometric data derived from the biometric sample such as a probe produced through signal processing — SHALL be zeroized immediately after an authentication transaction has taken place.
        - heading "5.1.8.2 Multi-Factor Cryptographic Software Verifiers" [level=4] [ref=e806]
        - paragraph [ref=e807]:
          - text: The requirements for a multi-factor cryptographic software verifier are identical to those for a single-factor cryptographic device verifier, described in
          - link "Section 5.1.7.2" [ref=e808] [cursor=pointer]:
            - /url: "#sfcdv"
          - text: . Verification of the output from a multi-factor cryptographic software authenticator proves use of the activation factor.
        - heading "5.1.9 Multi-Factor Cryptographic Devices" [level=4] [ref=e809]:
          - text: 5.1.9
          - text: Multi-Factor Cryptographic Devices
        - table [ref=e811]:
          - rowgroup [ref=e812]:
            - row "authenticator A multi-factor cryptographic device is a hardware device that performs cryptographic operations using one or more protected cryptographic keys and requires activation through a second authentication factor. Authentication is accomplished by proving possession of the device and control of the key. The authenticator output is provided by direct connection to the user endpoint and is highly dependent on the specific cryptographic device and protocol, but it is typically some type of signed message. The multi-factor cryptographic device is something you have, and it SHALL be activated by either something you know or something you are." [ref=e813]:
              - cell "authenticator" [ref=e814]:
                - img "authenticator" [ref=e815]
              - cell "A multi-factor cryptographic device is a hardware device that performs cryptographic operations using one or more protected cryptographic keys and requires activation through a second authentication factor. Authentication is accomplished by proving possession of the device and control of the key. The authenticator output is provided by direct connection to the user endpoint and is highly dependent on the specific cryptographic device and protocol, but it is typically some type of signed message. The multi-factor cryptographic device is something you have, and it SHALL be activated by either something you know or something you are." [ref=e816]
        - heading "5.1.9.1 Multi-Factor Cryptographic Device Authenticators" [level=4] [ref=e817]
        - paragraph [ref=e818]: Multi-factor cryptographic device authenticators use tamper-resistant hardware to encapsulate one or more secret keys unique to the authenticator and accessible only through the input of an additional factor, either a memorized secret or a biometric. The authenticator operates by using a private key that was unlocked by the additional factor to sign a challenge nonce presented through a direct computer interface (e.g., a USB port). Alternatively, the authenticator could be a suitably secure processor integrated with the user endpoint itself (e.g., a hardware TPM). Although cryptographic devices contain software, they differ from cryptographic software authenticators in that all embedded software is under control of the CSP or issuer, and that the entire authenticator is subject to any applicable FIPS 140 requirements at the selected AAL.
        - paragraph [ref=e819]:
          - text: The secret key and its algorithm SHALL provide at least the minimum security length specified in the latest revision of
          - link "SP 800-131A" [ref=e820] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication). The challenge nonce SHALL be at least 64 bits in length. Approved cryptography SHALL be used.
        - paragraph [ref=e821]: Each authentication operation using the authenticator SHOULD require the input of the additional factor. Input of the additional factor MAY be accomplished via either direct input on the device or via a hardware connection (e.g., USB, smartcard).
        - paragraph [ref=e822]:
          - text: Any memorized secret used by the authenticator for activation SHALL be a randomly-chosen numeric value at least 6 decimal digits in length or other memorized secret meeting the requirements of
          - link "Section 5.1.1.2" [ref=e823] [cursor=pointer]:
            - /url: "#memsecretver"
          - text: and SHALL be rate limited as specified in
          - link "Section 5.2.2" [ref=e824] [cursor=pointer]:
            - /url: "#throttle"
          - text: . A biometric activation factor SHALL meet the requirements of
          - link "Section 5.2.3" [ref=e825] [cursor=pointer]:
            - /url: "#biometric_use"
          - text: ", including limits on the number of consecutive authentication failures."
        - paragraph [ref=e826]: The unencrypted key and activation secret or biometric sample — and any biometric data derived from the biometric sample such as a probe produced through signal processing — SHALL be zeroized immediately after an authentication transaction has taken place.
        - heading "5.1.9.2 Multi-Factor Cryptographic Device Verifiers" [level=4] [ref=e827]: 5.1.9.2 Multi-Factor Cryptographic Device Verifiers
        - paragraph [ref=e828]:
          - text: The requirements for a multi-factor cryptographic device verifier are identical to those for a single-factor cryptographic device verifier, described in
          - link "Section 5.1.7.2" [ref=e829] [cursor=pointer]:
            - /url: "#sfcdv"
          - text: . Verification of the authenticator output from a multi-factor cryptographic device proves use of the activation factor.
        - heading "5.2 General Authenticator Requirements" [level=4] [ref=e830]
        - heading "5.2.1 Physical Authenticators" [level=4] [ref=e831]
        - paragraph [ref=e832]: CSPs SHALL provide subscriber instructions on how to appropriately protect the authenticator against theft or loss. The CSP SHALL provide a mechanism to revoke or suspend the authenticator immediately upon notification from subscriber that loss or theft of the authenticator is suspected.
        - heading "5.2.2 Rate Limiting (Throttling)" [level=4] [ref=e833]: 5.2.2 Rate Limiting (Throttling)
        - paragraph [ref=e834]:
          - text: When required by the authenticator type descriptions in
          - link "Section 5.1" [ref=e835] [cursor=pointer]:
            - /url: "#reqauthtype"
          - text: ", the verifier SHALL implement controls to protect against online guessing attacks. Unless otherwise specified in the description of a given authenticator, the verifier SHALL limit consecutive failed authentication attempts on a single account to no more than 100."
        - paragraph [ref=e836]: "Additional techniques MAY be used to reduce the likelihood that an attacker will lock the legitimate claimant out as a result of rate limiting. These include:"
        - list [ref=e837]:
          - listitem [ref=e838]:
            - paragraph [ref=e839]: Requiring the claimant to complete a CAPTCHA before attempting authentication.
          - listitem [ref=e840]:
            - paragraph [ref=e841]: Requiring the claimant to wait following a failed attempt for a period of time that increases as the account approaches its maximum allowance for consecutive failed attempts (e.g., 30 seconds up to an hour).
          - listitem [ref=e842]:
            - paragraph [ref=e843]: Accepting only authentication requests that come from a white list of IP addresses from which the subscriber has been successfully authenticated before.
          - listitem [ref=e844]:
            - paragraph [ref=e845]: Leveraging other risk-based or adaptive authentication techniques to identify user behavior that falls within, or out of, typical norms. These might, for example, include use of IP address, geolocation, timing of request patterns, or browser metadata.
        - paragraph [ref=e846]: When the subscriber successfully authenticates, the verifier SHOULD disregard any previous failed attempts for that user from the same IP address.
        - heading "5.2.3 Use of Biometrics" [level=4] [ref=e847]: 5.2.3 Use of Biometrics
        - paragraph [ref=e848]:
          - text: The use of biometrics (
          - emphasis [ref=e849]: something you are
          - text: ) in authentication includes both measurement of physical characteristics (e.g., fingerprint, iris, facial characteristics) and behavioral characteristics (e.g., typing cadence). Both classes are considered biometric modalities, although different modalities may differ in the extent to which they establish authentication intent as described in
          - link "Section 5.2.9" [ref=e850] [cursor=pointer]:
            - /url: "#intent"
          - text: .
        - paragraph [ref=e851]: "For a variety of reasons, this document supports only limited use of biometrics for authentication. These reasons include:"
        - list [ref=e852]:
          - listitem [ref=e853]: The biometric False Match Rate (FMR) does not provide confidence in the authentication of the subscriber by itself. In addition, FMR does not account for spoofing attacks.
          - listitem [ref=e854]: Biometric comparison is probabilistic, whereas the other authentication factors are deterministic.
          - listitem [ref=e855]: Biometric template protection schemes provide a method for revoking biometric credentials that is comparable to other authentication factors (e.g., PKI certificates and passwords). However, the availability of such solutions is limited, and standards for testing these methods are under development.
          - listitem [ref=e856]: Biometric characteristics do not constitute secrets. They can be obtained online or by taking a picture of someone with a camera phone (e.g., facial images) with or without their knowledge, lifted from objects someone touches (e.g., latent fingerprints), or captured with high resolution images (e.g., iris patterns). While presentation attack detection (PAD) technologies (e.g., liveness detection) can mitigate the risk of these types of attacks, additional trust in the sensor or biometric processing is required to ensure that PAD is operating in accordance with the needs of the CSP and the subscriber.
        - paragraph [ref=e857]: "Therefore, the limited use of biometrics for authentication is supported with the following requirements and guidelines:"
        - paragraph [ref=e858]:
          - text: Biometrics SHALL be used only as part of multi-factor authentication with a physical authenticator (
          - emphasis [ref=e859]: something you have
          - text: ).
        - paragraph [ref=e860]: An authenticated protected channel between sensor (or an endpoint containing a sensor that resists sensor replacement) and verifier SHALL be established and the sensor or endpoint SHALL be authenticated prior to capturing the biometric sample from the claimant.
        - paragraph [ref=e861]:
          - text: The biometric system SHALL operate with an FMR
          - link "[ISO/IEC 2382-37]" [ref=e862] [cursor=pointer]:
            - /url: "#ISOIEC2382-37"
          - text: of 1 in 1000 or better. This FMR SHALL be achieved under conditions of a conformant attack (i.e., zero-effort impostor attempt) as defined in
          - link "[ISO/IEC 30107-1]" [ref=e863] [cursor=pointer]:
            - /url: "#ISOIEC30107-1"
          - text: .
        - paragraph [ref=e864]:
          - text: The biometric system SHOULD implement PAD. Testing of the biometric system to be deployed SHOULD demonstrate at least 90% resistance to presentation attacks for each relevant attack type (i.e., species), where resistance is defined as the number of thwarted presentation attacks divided by the number of trial presentation attacks. Testing of presentation attack resistance SHALL be in accordance with Clause 12 of
          - link "[ISO/IEC 30107-3]" [ref=e865] [cursor=pointer]:
            - /url: "#ISOIEC30107-3"
          - text: . The PAD decision MAY be made either locally on the claimant’s device or by a central verifier.
        - blockquote [ref=e866]:
          - paragraph [ref=e867]: "Note: PAD is being considered as a mandatory requirement in future editions of this guideline."
        - paragraph [ref=e868]: "The biometric system SHALL allow no more than 5 consecutive failed authentication attempts or 10 consecutive failed attempts if PAD meeting the above requirements is implemented. Once that limit has been reached, the biometric authenticator SHALL either:"
        - list [ref=e869]:
          - listitem [ref=e870]: Impose a delay of at least 30 seconds before the next attempt, increasing exponentially with each successive attempt (e.g., 1 minute before the following failed attempt, 2 minutes before the second following attempt), or
          - listitem [ref=e871]: Disable the biometric user authentication and offer another factor (e.g., a different biometric modality or a PIN/Passcode if it is not already a required factor) if such an alternative method is already available.
        - paragraph [ref=e872]: "The verifier SHALL make a determination of sensor and endpoint performance, integrity, and authenticity. Acceptable methods for making this determination include, but are not limited to:"
        - list [ref=e873]:
          - listitem [ref=e874]: Authentication of the sensor or endpoint.
          - listitem [ref=e875]: Certification by an approved accreditation authority.
          - listitem [ref=e876]:
            - text: Runtime interrogation of signed metadata (e.g., attestation) as described in
            - link "Section 5.2.4" [ref=e877] [cursor=pointer]:
              - /url: "#attestation"
            - text: .
        - paragraph [ref=e878]: Biometric comparison can be performed locally on claimant’s device or at a central verifier. Since the potential for attacks on a larger scale is greater at central verifiers, local comparison is preferred.
        - paragraph [ref=e879]: "If comparison is performed centrally:"
        - list [ref=e880]:
          - listitem [ref=e881]: Use of the biometric as an authentication factor SHALL be limited to one or more specific devices that are identified using approved cryptography. Since the biometric has not yet unlocked the main authentication key, a separate key SHALL be used for identifying the device.
          - listitem [ref=e882]:
            - text: Biometric revocation, referred to as biometric template protection in
            - link "ISO/IEC 24745" [ref=e883] [cursor=pointer]:
              - /url: "#ISO24745"
            - text: ", SHALL be implemented."
          - listitem [ref=e884]: All transmission of biometrics SHALL be over the authenticated protected channel.
        - paragraph [ref=e885]: Biometric samples collected in the authentication process MAY be used to train comparison algorithms or — with user consent — for other research purposes. Biometric samples and any biometric data derived from the biometric sample such as a probe produced through signal processing SHALL be zeroized immediately after any training or research data has been derived.
        - paragraph [ref=e886]:
          - text: Biometrics are also used in some cases to prevent repudiation of enrollment and to verify that the same individual participates in all phases of the enrollment process as described in
          - link "SP 800-63A" [ref=e887] [cursor=pointer]:
            - /url: sp800-63a.html
          - text: .
        - heading "5.2.4 Attestation" [level=4] [ref=e888]: 5.2.4 Attestation
        - paragraph [ref=e889]: "An attestation is information conveyed to the verifier regarding a directly-connected authenticator or the endpoint involved in an authentication operation. Information conveyed by attestation MAY include, but is not limited to:"
        - list [ref=e890]:
          - listitem [ref=e891]: The provenance (e.g., manufacturer or supplier certification), health, and integrity of the authenticator and endpoint.
          - listitem [ref=e892]: Security features of the authenticator.
          - listitem [ref=e893]: Security and performance characteristics of biometric sensor(s).
          - listitem [ref=e894]: Sensor modality.
        - paragraph [ref=e895]:
          - text: If this attestation is signed, it SHALL be signed using a digital signature that provides at least the minimum security strength specified in the latest revision of
          - link "SP 800-131A" [ref=e896] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication).
        - paragraph [ref=e897]: Attestation information MAY be used as part of a verifier’s risk-based authentication decision.
        - heading "5.2.5 Verifier Impersonation Resistance" [level=4] [ref=e898]: 5.2.5 Verifier Impersonation Resistance
        - paragraph [ref=e899]: Verifier impersonation attacks, sometimes referred to as “phishing attacks,” are attempts by fraudulent verifiers and RPs to fool an unwary claimant into authenticating to an impostor website. In prior versions of SP 800-63, protocols resistant to verifier-impersonation attacks were also referred to as “strongly MitM resistant.”
        - paragraph [ref=e900]: A verifier impersonation-resistant authentication protocol SHALL establish an authenticated protected channel with the verifier. It SHALL then strongly and irreversibly bind a channel identifier that was negotiated in establishing the authenticated protected channel to the authenticator output (e.g., by signing the two values together using a private key controlled by the claimant for which the public key is known to the verifier). The verifier SHALL validate the signature or other information used to prove verifier impersonation resistance. This prevents an impostor verifier, even one that has obtained a certificate representing the actual verifier, from replaying that authentication on a different authenticated protected channel.
        - paragraph [ref=e901]:
          - text: Approved cryptographic algorithms SHALL be used to establish verifier impersonation resistance where it is required. Keys used for this purpose SHALL provide at least the minimum security strength specified in the latest revision of
          - link "SP 800-131A" [ref=e902] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication).
        - paragraph [ref=e903]: One example of a verifier impersonation-resistant authentication protocol is client-authenticated TLS, because the client signs the authenticator output along with earlier messages from the protocol that are unique to the particular TLS connection being negotiated.
        - paragraph [ref=e904]: Authenticators that involve the manual entry of an authenticator output, such as out-of-band and OTP authenticators, SHALL NOT be considered verifier impersonation-resistant because the manual entry does not bind the authenticator output to the specific session being authenticated. In a MitM attack, an impostor verifier could replay the OTP authenticator output to the verifier and successfully authenticate.
        - heading "5.2.6 Verifier-CSP Communications" [level=4] [ref=e905]: 5.2.6 Verifier-CSP Communications
        - paragraph [ref=e906]:
          - text: In situations where the verifier and CSP are separate entities (as shown by the dotted line in
          - link "SP 800-63-3 Figure 4-1" [ref=e907] [cursor=pointer]:
            - /url: sp800-63-3.html#63Sec4-Figure1
          - text: ), communications between the verifier and CSP SHALL occur through a mutually-authenticated secure channel (such as a client-authenticated TLS connection) using approved cryptography.
        - heading "5.2.7 Verifier-Compromise Resistance" [level=4] [ref=e908]: 5.2.7 Verifier-Compromise Resistance
        - paragraph [ref=e909]:
          - text: Use of some types of authenticators requires that the verifier store a copy of the authenticator secret. For example, an OTP authenticator (described in
          - link "Section 5.1.4" [ref=e910] [cursor=pointer]:
            - /url: "#singlefactorOTP"
          - text: ) requires that the verifier independently generate the authenticator output for comparison against the value sent by the claimant. Because of the potential for the verifier to be compromised and stored secrets stolen, authentication protocols that do not require the verifier to persistently store secrets that could be used for authentication are considered stronger, and are described herein as being
          - emphasis [ref=e911]: verifier compromise resistant
          - text: . Note that such verifiers are not resistant to all attacks. A verifier could be compromised in a different way, such as being manipulated into always accepting a particular authenticator output.
        - paragraph [ref=e912]: "Verifier compromise resistance can be achieved in different ways, for example:"
        - list [ref=e913]:
          - listitem [ref=e914]:
            - paragraph [ref=e915]: Use a cryptographic authenticator that requires the verifier store a public key corresponding to a private key held by the authenticator.
          - listitem [ref=e916]:
            - paragraph [ref=e917]:
              - text: Store the expected authenticator output in hashed form. This method can be used with some look-up secret authenticators (described in
              - link "Section 5.1.2" [ref=e918] [cursor=pointer]:
                - /url: "#lookupsecrets"
              - text: ), for example.
        - paragraph [ref=e919]:
          - text: To be considered verifier compromise resistant, public keys stored by the verifier SHALL be associated with the use of approved cryptographic algorithms and SHALL provide at least the minimum security strength specified in the latest revision of
          - link "SP 800-131A" [ref=e920] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication).
        - paragraph [ref=e921]:
          - text: Other verifier compromise resistant secrets SHALL use approved hash algorithms and the underlying secrets SHALL have at least the minimum security strength specified in the latest revision of
          - link "SP 800-131A" [ref=e922] [cursor=pointer]:
            - /url: "#SP800-131A"
          - text: (112 bits as of the date of this publication). Secrets (e.g., memorized secrets) having lower complexity SHALL NOT be considered verifier compromise resistant when hashed because of the potential to defeat the hashing process through dictionary lookup or exhaustive search.
        - heading "5.2.8 Replay Resistance" [level=4] [ref=e923]: 5.2.8 Replay Resistance
        - paragraph [ref=e924]: An authentication process resists replay attacks if it is impractical to achieve a successful authentication by recording and replaying a previous authentication message. Replay resistance is in addition to the replay-resistant nature of authenticated protected channel protocols, since the output could be stolen prior to entry into the protected channel. Protocols that use nonces or challenges to prove the “freshness” of the transaction are resistant to replay attacks since the verifier will easily detect when old protocol messages are replayed since they will not contain the appropriate nonces or timeliness data.
        - paragraph [ref=e925]: Examples of replay-resistant authenticators are OTP devices, cryptographic authenticators, and look-up secrets.
        - paragraph [ref=e926]: In contrast, memorized secrets are not considered replay resistant because the authenticator output — the secret itself — is provided for each authentication.
        - heading "5.2.9 Authentication Intent" [level=4] [ref=e927]: 5.2.9 Authentication Intent
        - paragraph [ref=e928]: An authentication process demonstrates intent if it requires the subject to explicitly respond to each authentication or reauthentication request. The goal of authentication intent is to make it more difficult for directly-connected physical authenticators (e.g., multi-factor cryptographic devices) to be used without the subject’s knowledge, such as by malware on the endpoint. Authentication intent SHALL be established by the authenticator itself, although multi-factor cryptographic devices MAY establish intent by reentry of the other authentication factor on the endpoint with which the authenticator is used.
        - paragraph [ref=e929]: Authentication intent MAY be established in a number of ways. Authentication processes that require the subject’s intervention (e.g., a claimant entering an authenticator output from an OTP device) establish intent. Cryptographic devices that require user action (e.g., pushing a button or reinsertion) for each authentication or reauthentication operation are also establish intent.
        - paragraph [ref=e930]: Depending on the modality, presentation of a biometric may or may not establish authentication intent. Presentation of a fingerprint would normally establish intent, while observation of the claimant’s face using a camera normally would not by itself. Behavioral biometrics similarly are less likely to establish authentication intent because they do not always require a specific action on the claimant’s part.
        - heading "5.2.10 Restricted Authenticators" [level=4] [ref=e931]: 5.2.10 Restricted Authenticators
        - paragraph [ref=e932]: As threats evolve, authenticators’ capability to resist attacks typically degrades. Conversely, some authenticators’ performance may improve — for example, when changes to their underlying standards increases their ability to resist particular attacks.
        - paragraph [ref=e933]: To account for these changes in authenticator performance, NIST places additional restrictions on authenticator types or specific classes or instantiations of an authenticator type.
        - paragraph [ref=e934]: The use of a RESTRICTED authenticator requires that the implementing organization assess, understand, and accept the risks associated with that RESTRICTED authenticator and acknowledge that risk will likely increase over time. It is the responsibility of the organization to determine the level of acceptable risk for their system(s) and associated data and to define any methods for mitigating excessive risks. If at any time the organization determines that the risk to any party is unacceptable, then that authenticator SHALL NOT be used.
        - paragraph [ref=e935]: "Further, the risk of an authentication error is typically borne by multiple parties, including the implementing organization, organizations that rely on the authentication decision, and the subscriber. Because the subscriber may be exposed to additional risk when an organization accepts a RESTRICTED authenticator and that the subscriber may have a limited understanding of and ability to control that risk, the CSP SHALL:"
        - list [ref=e936]:
          - listitem [ref=e937]:
            - paragraph [ref=e938]: Offer subscribers at least one alternate authenticator that is not RESTRICTED and can be used to authenticate at the required AAL.
          - listitem [ref=e939]:
            - paragraph [ref=e940]: Provide meaningful notice to subscribers regarding the security risks of the RESTRICTED authenticator and availability of alternative(s) that are not RESTRICTED.
          - listitem [ref=e941]:
            - paragraph [ref=e942]: Address any additional risk to subscribers in its risk assessment.
          - listitem [ref=e943]:
            - paragraph [ref=e944]:
              - text: Develop a migration plan for the possibility that the RESTRICTED authenticator is no longer acceptable at some point in the future and include this migration plan in its
              - link "digital identity acceptance statement" [ref=e945] [cursor=pointer]:
                - /url: sp800-63-3.html#daps
              - text: .
        - paragraph
        - heading "6 Authenticator Lifecycle Management" [level=2] [ref=e946]
        - paragraph [ref=e947]:
          - emphasis [ref=e948]: This section is normative.
        - paragraph [ref=e949]: A number of events can occur over the lifecycle of a subscriber’s authenticator that affect that authenticator’s use. These events include binding, loss, theft, unauthorized duplication, expiration, and revocation. This section describes the actions to be taken in response to those events.
        - heading "6.1 Authenticator Binding" [level=3] [ref=e950]: 6.1 Authenticator Binding
        - paragraph [ref=e951]:
          - emphasis [ref=e952]: Authenticator binding
          - text: refers to the establishment of an association between a specific authenticator and a subscriber’s account, enabling the authenticator to be used — possibly in conjunction with other authenticators — to authenticate for that account.
        - paragraph [ref=e953]: "Authenticators SHALL be bound to subscriber accounts by either:"
        - list [ref=e954]:
          - listitem [ref=e955]: Issuance by the CSP as part of enrollment; or
          - listitem [ref=e956]: Associating a subscriber-provided authenticator that is acceptable to the CSP.
        - paragraph [ref=e957]:
          - text: These guidelines refer to the
          - emphasis [ref=e958]: binding
          - text: rather than the issuance of an authenticator as to accommodate both options.
        - paragraph [ref=e959]:
          - text: Throughout the digital identity lifecycle, CSPs SHALL maintain a record of all authenticators that are or have been associated with each identity. The CSP or verifier SHALL maintain the information required for throttling authentication attempts when required, as described in
          - link "Section 5.2.2" [ref=e960] [cursor=pointer]:
            - /url: "#throttle"
          - text: . The CSP SHALL also verify the type of user-provided authenticator (e.g., single-factor cryptographic device vs. multi-factor cryptographic device) so verifiers can determine compliance with requirements at each AAL.
        - paragraph [ref=e961]: The record created by the CSP SHALL contain the date and time the authenticator was bound to the account. The record SHOULD include information about the source of the binding (e.g., IP address, device identifier) of any device associated with the enrollment. If available, the record SHOULD also contain information about the source of unsuccessful authentications attempted with the authenticator.
        - paragraph [ref=e962]: When any new authenticator is bound to a subscriber account, the CSP SHALL ensure that the binding protocol and the protocol for provisioning the associated key(s) are done at a level of security commensurate with the AAL at which the authenticator will be used. For example, protocols for key provisioning SHALL use authenticated protected channels or be performed in person to protect against man-in-the-middle attacks. Binding of multi-factor authenticators SHALL require multi-factor authentication or equivalent (e.g., association with the session in which identity proofing has been just completed) be used in order to bind the authenticator. The same conditions apply when a key pair is generated by the authenticator and the public key is sent to the CSP.
        - heading "6.1.1 Binding at Enrollment" [level=4] [ref=e963]
        - paragraph [ref=e964]:
          - text: The following requirements apply when an authenticator is bound to an identity as a result of a successful identity proofing transaction, as described in
          - link "SP 800-63A" [ref=e965] [cursor=pointer]:
            - /url: sp800-63a.html
          - text: . Since Executive Order 13681
          - link "[EO 13681]" [ref=e966] [cursor=pointer]:
            - /url: "#EO13681"
          - text: requires the use of multi-factor authentication for the release of any personal data, it is important that authenticators be bound to subscriber accounts at enrollment, enabling access to personal data, including that established by identity proofing.
        - paragraph [ref=e967]:
          - text: The CSP SHALL bind at least one, and SHOULD bind at least two, physical (
          - emphasis [ref=e968]: something you have
          - text: ) authenticators to the subscriber’s online identity, in addition to a memorized secret or one or more biometrics. Binding of multiple authenticators is preferred in order to recover from the loss or theft of the subscriber’s primary authenticator.
        - paragraph [ref=e969]: While all identifying information is self-asserted at IAL1, preservation of online material or an online reputation makes it undesirable to lose control of an account due to the loss of an authenticator. The second authenticator makes it possible to securely recover from an authenticator loss. For this reason, a CSP SHOULD bind at least two physical authenticators to the subscriber’s credential at IAL1 as well.
        - paragraph [ref=e970]:
          - text: At IAL2 and above, identifying information is associated with the digital identity and the subscriber has undergone an identity proofing process as described in
          - link "SP 800-63A" [ref=e971] [cursor=pointer]:
            - /url: sp800-63a.html
          - text: . As a result, authenticators at the same AAL as the desired IAL SHALL be bound to the account. For example, if the subscriber has successfully completed proofing at IAL2, then AAL2 or AAL3 authenticators are appropriate to bind to the IAL2 identity. While a CSP MAY bind an AAL1 authenticator to an IAL2 identity, if the subscriber is authenticated at AAL1, the CSP SHALL NOT expose personal information, even if self-asserted, to the subscriber. As stated in the previous paragraph, the availability of additional authenticators provides backup methods for authentication if an authenticator is damaged, lost, or stolen.
        - paragraph [ref=e972]: "If enrollment and binding cannot be completed in a single physical encounter or electronic transaction (i.e., within a single protected session), the following methods SHALL be used to ensure that the same party acts as the applicant throughout the processes:"
        - paragraph [ref=e973]: "For remote transactions:"
        - list [ref=e974]:
          - listitem [ref=e975]:
            - paragraph [ref=e976]: The applicant SHALL identify themselves in each new binding transaction by presenting a temporary secret which was either established during a prior transaction, or sent to the applicant’s phone number, email address, or postal address of record.
          - listitem [ref=e977]:
            - paragraph [ref=e978]: Long-term authenticator secrets SHALL only be issued to the applicant within a protected session.
        - paragraph [ref=e979]: "For in-person transactions:"
        - list [ref=e980]:
          - listitem [ref=e981]:
            - paragraph [ref=e982]: The applicant SHALL identify themselves in person by either using a secret as described in remote transaction (1) above, or through use of a biometric that was recorded during a prior encounter.
          - listitem [ref=e983]:
            - paragraph [ref=e984]: Temporary secrets SHALL NOT be reused.
          - listitem [ref=e985]:
            - paragraph [ref=e986]: If the CSP issues long-term authenticator secrets during a physical transaction, then they SHALL be loaded locally onto a physical device that is issued in person to the applicant or delivered in a manner that confirms the address of record.
        - heading "6.1.2 Post-Enrollment Binding" [level=4] [ref=e987]: 6.1.2 Post-Enrollment Binding
        - heading "6.1.2.1 Binding of an Additional Authenticator at Existing AAL" [level=4] [ref=e988]: 6.1.2.1 Binding of an Additional Authenticator at Existing AAL
        - paragraph [ref=e989]:
          - text: With the exception of memorized secrets, CSPs and verifiers SHOULD encourage subscribers to maintain at least two valid authenticators of each factor that they will be using. For example, a subscriber who usually uses an OTP device as a physical authenticator MAY also be issued a number of look-up secret authenticators, or register a device for out-of-band authentication, in case the physical authenticator is lost, stolen, or damaged. See
          - link "Section 6.1.2.3" [ref=e990] [cursor=pointer]:
            - /url: "#replacement"
          - text: for more information on replacement of memorized secret authenticators.
        - paragraph [ref=e991]: Accordingly, CSPs SHOULD permit the binding of additional authenticators to a subscriber’s account. Before adding the new authenticator, the CSP SHALL first require the subscriber to authenticate at the AAL (or a higher AAL) at which the new authenticator will be used. When an authenticator is added, the CSP SHOULD send a notification to the subscriber via a mechanism that is independent of the transaction binding the new authenticator (e.g., email to an address previously associated with the subscriber). The CSP MAY limit the number of authenticators that may be bound in this manner.
        - heading "6.1.2.2 Adding an Additional Factor to a Single-Factor Account" [level=4] [ref=e992]
        - paragraph [ref=e993]: If the subscriber’s account has only one authentication factor bound to it (i.e., at IAL1/AAL1) and an additional authenticator of a different authentication factor is to be added, the subscriber MAY request that the account be upgraded to AAL2. The IAL would remain at IAL1.
        - paragraph [ref=e994]: Before binding the new authenticator, the CSP SHALL require the subscriber to authenticate at AAL1. The CSP SHOULD send a notification of the event to the subscriber via a mechanism independent of the transaction binding the new authenticator (e.g., email to an address previously associated with the subscriber).
        - heading "6.1.2.3 Replacement of a Lost Authentication Factor" [level=4] [ref=e995]:
          - text: 6.1.2.3
          - text: Replacement of a Lost Authentication Factor
        - paragraph [ref=e996]:
          - text: If a subscriber loses all authenticators of a factor necessary to complete multi-factor authentication and has been identity proofed at IAL2 or IAL3, that subscriber SHALL repeat the identity proofing process described in
          - link "SP 800-63A" [ref=e997] [cursor=pointer]:
            - /url: sp800-63a.html
          - text: . An abbreviated proofing process, confirming the binding of the claimant to previously-supplied evidence, MAY be used if the CSP has retained the evidence from the original proofing process pursuant to a privacy risk assessment as described in
          - link "SP 800-63A" [ref=e998] [cursor=pointer]:
            - /url: sp800-63a.html
          - text: Section 4.2. The CSP SHALL require the claimant to authenticate using an authenticator of the remaining factor, if any, to confirm binding to the existing identity. Reestablishment of authentication factors at IAL3 SHALL be done in person, or through a supervised remote process as described in
          - link "SP 800-63A" [ref=e999] [cursor=pointer]:
            - /url: sp800-63a.html
          - text: Section 5.3.3.2, and SHALL verify the biometric collected during the original proofing process.
        - paragraph [ref=e1000]: The CSP SHOULD send a notification of the event to the subscriber. This MAY be the same notice as is required as part of the proofing process.
        - paragraph [ref=e1001]: Replacement of a lost (i.e., forgotten) memorized secret is problematic because it is very common. Additional “backup” memorized secrets do not mitigate this because they are just as likely to also have been forgotten. If a biometric is bound to the account, the biometric and associated physical authenticator SHOULD be used to establish a new memorized secret.
        - paragraph [ref=e1002]:
          - text: As an alternative to the above re-proofing process when there is no biometric bound to the account, the CSP MAY bind a new memorized secret with authentication using two physical authenticators, along with a confirmation code that has been sent to one of the subscriber’s addresses of record. The confirmation code SHALL consist of at least 6 random alphanumeric characters generated by an approved random bit generator
          - link "[SP 800-90Ar1]" [ref=e1003] [cursor=pointer]:
            - /url: "#SP800-90Ar1"
          - text: . Those sent to a postal address of record SHALL be valid for a maximum of 7 days but MAY be made valid up to 21 days via an exception process to accommodate addresses outside the direct reach of the U.S. Postal Service. Confirmation codes sent by means other than physical mail SHALL be valid for a maximum of 10 minutes.
        - heading "6.1.3 Binding to a Subscriber-provided Authenticator" [level=4] [ref=e1004]
        - paragraph [ref=e1005]: A subscriber may already possess authenticators suitable for authentication at a particular AAL. For example, they may have a two-factor authenticator from a social network provider, considered AAL2 and IAL1, and would like to use those credentials at an RP that requires IAL2.
        - paragraph [ref=e1006]:
          - text: CSPs SHOULD, where practical, accommodate the use of subscriber-provided authenticators in order to relieve the burden to the subscriber of managing a large number of authenticators. Binding of these authenticators SHALL be done as described in
          - link "Section 6.1.2.1" [ref=e1007] [cursor=pointer]:
            - /url: "#post-enroll-bind"
          - text: . In situations where the authenticator strength is not self-evident (e.g., between single-factor and multi-factor authenticators of a given type), the CSP SHOULD assume the use of the weaker authenticator unless it is able to establish that the stronger authenticator is in fact being used (e.g., by verification with the issuer or manufacturer of the authenticator).
        - heading "6.1.4 Renewal" [level=4] [ref=e1008]
        - paragraph [ref=e1009]: The CSP SHOULD bind an updated authenticator an appropriate amount of time before an existing authenticator’s expiration. The process for this SHOULD conform closely to the initial authenticator binding process (e.g., confirming address of record). Following successful use of the new authenticator, the CSP MAY revoke the authenticator that it is replacing.
        - heading "6.2 Loss, Theft, Damage, and Unauthorized Duplication" [level=3] [ref=e1010]
        - paragraph [ref=e1011]: Compromised authenticators include those that have been lost, stolen, or subject to unauthorized duplication. Generally, one must assume that a lost authenticator has been stolen or compromised by someone that is not the legitimate subscriber of the authenticator. Damaged or malfunctioning authenticators are also considered compromised to guard against any possibility of extraction of the authenticator secret. One notable exception is a memorized secret that has been forgotten without other indications of having been compromised, such as having been obtained by an attacker.
        - paragraph [ref=e1012]: Suspension, revocation, or destruction of compromised authenticators SHOULD occur as promptly as practical following detection. Agencies SHOULD establish time limits for this process.
        - paragraph [ref=e1013]: To facilitate secure reporting of the loss, theft, or damage to an authenticator, the CSP SHOULD provide the subscriber with a method of authenticating to the CSP using a backup or alternate authenticator. This backup authenticator SHALL be either a memorized secret or a physical authenticator. Either MAY be used, but only one authentication factor is required to make this report. Alternatively, the subscriber MAY establish an authenticated protected channel to the CSP and verify information collected during the proofing process. The CSP MAY choose to verify an address of record (i.e., email, telephone, postal) and suspend authenticator(s) reported to have been compromised. The suspension SHALL be reversible if the subscriber successfully authenticates to the CSP using a valid (i.e., not suspended) authenticator and requests reactivation of an authenticator suspended in this manner. The CSP MAY set a time limit after which a suspended authenticator can no longer be reactivated.
        - heading "6.3 Expiration" [level=3] [ref=e1014]
        - paragraph [ref=e1015]: CSPs MAY issue authenticators that expire. If and when an authenticator expires, it SHALL NOT be usable for authentication. When an authentication is attempted using an expired authenticator, the CSP SHOULD give an indication to the subscriber that the authentication failure is due to expiration rather than some other cause.
        - paragraph [ref=e1016]: The CSP SHALL require subscribers to surrender or prove destruction of any physical authenticator containing attribute certificates signed by the CSP as soon as practical after expiration or receipt of a renewed authenticator.
        - heading "6.4 Revocation and Termination" [level=3] [ref=e1017]
        - paragraph [ref=e1018]: Revocation of an authenticator — sometimes referred to as termination, especially in the context of PIV authenticators — refers to removal of the binding between an authenticator and a credential the CSP maintains.
        - paragraph [ref=e1019]: CSPs SHALL revoke the binding of authenticators promptly when an online identity ceases to exist (e.g., subscriber’s death, discovery of a fraudulent subscriber), when requested by the subscriber, or when the CSP determines that the subscriber no longer meets its eligibility requirements.
        - paragraph [ref=e1020]: The CSP SHALL require subscribers to surrender or certify destruction of any physical authenticator containing certified attributes signed by the CSP as soon as practical after revocation or termination takes place. This is necessary to block the use of the authenticator’s certified attributes in offline situations between revocation/termination and expiration of the certification.
        - paragraph [ref=e1021]:
          - text: Further requirements on the termination of PIV authenticators are found in
          - link "FIPS 201" [ref=e1022] [cursor=pointer]:
            - /url: "#FIPS201"
          - text: .
        - paragraph
        - heading "7 Session Management" [level=2] [ref=e1023]
        - paragraph [ref=e1024]:
          - emphasis [ref=e1025]: This section is normative.
        - paragraph [ref=e1026]:
          - text: Once an authentication event has taken place, it is often desirable to allow the subscriber to continue using the application across multiple subsequent interactions without requiring them to repeat the authentication event. This requirement is particularly true for federation scenarios — described in
          - link "SP 800-63C" [ref=e1027] [cursor=pointer]:
            - /url: sp800-63c.html
          - text: — where the authentication event necessarily involves several components and parties coordinating across a network.
        - paragraph [ref=e1028]:
          - text: To facilitate this behavior, a
          - emphasis [ref=e1029]: session
          - text: MAY be started in response to an authentication event, and continue the session until such time that it is terminated. The session MAY be terminated for any number of reasons, including but not limited to an inactivity timeout, an explicit logout event, or other means. The session MAY be continued through a reauthentication event — described in
          - link "Section 7.2" [ref=e1030] [cursor=pointer]:
            - /url: "#sessionreauthn"
          - text: — wherein the user repeats some or all of the initial authentication event, thereby re-establishing the session.
        - paragraph [ref=e1031]: Session management is preferable over continual presentation of credentials as the poor usability of continual presentation often creates incentives for workarounds such as cached unlocking credentials, negating the freshness of the authentication event.
        - heading "7.1 Session Bindings" [level=3] [ref=e1032]
        - paragraph [ref=e1033]: A session occurs between the software that a subscriber is running — such as a browser, application, or operating system (i.e., the session subject) — and the RP or CSP that the subscriber is accessing (i.e., the session host). A session secret SHALL be shared between the subscriber’s software and the service being accessed. This secret binds the two ends of the session, allowing the subscriber to continue using the service over time. The secret SHALL be presented directly by the subscriber’s software or possession of the secret SHALL be proven using a cryptographic mechanism.
        - paragraph [ref=e1034]: The secret used for session binding SHALL be generated by the session host in direct response to an authentication event. A session SHOULD inherit the AAL properties of the authentication event which triggered its creation. A session MAY be considered at a lower AAL than the authentication event but SHALL NOT be considered at a higher AAL than the authentication event.
        - paragraph [ref=e1035]: "Secrets used for session binding:"
        - list [ref=e1036]:
          - listitem [ref=e1037]: SHALL be generated by the session host during an interaction, typically immediately following authentication.
          - listitem [ref=e1038]:
            - text: SHALL be generated by an approved random bit generator
            - link "[SP 800-90Ar1]" [ref=e1039] [cursor=pointer]:
              - /url: "#SP800-90Ar1"
            - text: and contain at least 64 bits of entropy.
          - listitem [ref=e1040]: SHALL be erased or invalidated by the session subject when the subscriber logs out.
          - listitem [ref=e1041]: SHOULD be erased on the subscriber endpoint when the user logs out or when the secret is deemed to have expired.
          - listitem [ref=e1042]: SHOULD NOT be placed in insecure locations such as HTML5 Local Storage due to the potential exposure of local storage to cross-site scripting (XSS) attacks.
          - listitem [ref=e1043]: SHALL be sent to and received from the device using an authenticated protected channel.
          - listitem [ref=e1044]:
            - text: SHALL time out and not be accepted after the times specified in
            - link "Sections 4.1.4" [ref=e1045] [cursor=pointer]:
              - /url: "#aal1reauth"
            - text: ","
            - link "4.2.4" [ref=e1046] [cursor=pointer]:
              - /url: "#aal2reauth"
            - text: ", and"
            - link "4.3.4" [ref=e1047] [cursor=pointer]:
              - /url: "#aal3reauth"
            - text: ", as appropriate for the AAL."
          - listitem [ref=e1048]: SHALL NOT be available to insecure communications between the host and subscriber’s endpoint. Authenticated sessions SHALL NOT fall back to an insecure transport, such as from https to http, following authentication.
        - paragraph [ref=e1049]: URLs or POST content SHALL contain a session identifier that SHALL be verified by the RP to ensure that actions taken outside the session do not affect the protected session.
        - paragraph [ref=e1050]:
          - text: There are several mechanisms for managing a session over time. The following sections give different examples along with additional requirements and considerations particular to each example technology. Additional informative guidance is available in the OWASP
          - emphasis [ref=e1051]: Session Management Cheat Sheet
          - link "[OWASP-session]" [ref=e1052] [cursor=pointer]:
            - /url: "#OWASP-session"
          - text: .
        - heading "7.1.1 Browser Cookies" [level=4] [ref=e1053]
        - paragraph [ref=e1054]: Browser cookies are the predominant mechanism by which a session will be created and tracked for a subscriber accessing a service.
        - paragraph [ref=e1055]: "Cookies:"
        - list [ref=e1056]:
          - listitem [ref=e1057]: SHALL be tagged to be accessible only on secure (HTTPS) sessions.
          - listitem [ref=e1058]: SHALL be accessible to the minimum practical set of hostnames and paths.
          - listitem [ref=e1059]: SHOULD be tagged to be inaccessible via JavaScript (HttpOnly).
          - listitem [ref=e1060]: SHOULD be tagged to expire at, or soon after, the session’s validity period. This requirement is intended to limit the accumulation of cookies, but SHALL NOT be depended upon to enforce session timeouts.
        - heading "7.1.2 Access Tokens" [level=4] [ref=e1061]
        - paragraph [ref=e1062]: An access token — such as found in OAuth — is used to allow an application to access a set of services on a subscriber’s behalf following an authentication event. The presence of an OAuth access token SHALL NOT be interpreted by the RP as presence of the subscriber, in the absence of other signals. The OAuth access token, and any associated refresh tokens, MAY be valid long after the authentication session has ended and the subscriber has left the application.
        - heading "7.1.3 Device Identification" [level=4] [ref=e1063]
        - paragraph [ref=e1064]: Other methods of secure device identification — including but not limited to mutual TLS, token binding, or other mechanisms — MAY be used to enact a session between a subscriber and a service.
        - heading "7.2 Reauthentication" [level=3] [ref=e1065]:
          - text: "7.2"
          - text: Reauthentication
        - paragraph [ref=e1066]: "Continuity of authenticated sessions SHALL be based upon the possession of a session secret issued by the verifier at the time of authentication and optionally refreshed during the session. The nature of a session depends on the application, including:"
        - list [ref=e1067]:
          - listitem [ref=e1068]: A web browser session with a “session” cookie, or
          - listitem [ref=e1069]: An instance of a mobile application that retains a session secret.
        - paragraph [ref=e1070]: Session secrets SHALL be non-persistent. That is, they SHALL NOT be retained across a restart of the associated application or a reboot of the host device.
        - paragraph [ref=e1071]: Periodic reauthentication of sessions SHALL be performed to confirm the continued presence of the subscriber at an authenticated session (i.e., that the subscriber has not walked away without logging out).
        - paragraph [ref=e1072]:
          - text: A session SHALL NOT be extended past the guidelines in Sections
          - link "4.1.3" [ref=e1073] [cursor=pointer]:
            - /url: "#aal1reauth"
          - text: ","
          - link "4.2.3" [ref=e1074] [cursor=pointer]:
            - /url: "#aal2reauth"
          - text: ", and"
          - link "4.3.3" [ref=e1075] [cursor=pointer]:
            - /url: "#aal3reauth"
          - text: (depending on AAL) based on presentation of the session secret alone. Prior to session expiration, the reauthentication time limit SHALL be extended by prompting the subscriber for the authentication factor(s) specified in
          - link "Table 7-1" [ref=e1076] [cursor=pointer]:
            - /url: "#63bSec7-Table1"
          - text: .
        - paragraph [ref=e1077]: When a session has been terminated, due to a time-out or other action, the user SHALL be required to establish a new session by authenticating again.
        - paragraph
        - paragraph [ref=e1079]:
          - strong [ref=e1080]: Table 7-1 AAL Reauthentication Requirements
        - table [ref=e1081]:
          - rowgroup [ref=e1082]:
            - row "AAL Requirement" [ref=e1083]:
              - columnheader "AAL" [ref=e1084]
              - columnheader "Requirement" [ref=e1085]
          - rowgroup [ref=e1086]:
            - row "1 Presentation of any one factor" [ref=e1087]:
              - cell "1" [ref=e1088]
              - cell "Presentation of any one factor" [ref=e1089]
            - row "2 Presentation of a memorized secret or biometric" [ref=e1090]:
              - cell "2" [ref=e1091]
              - cell "Presentation of a memorized secret or biometric" [ref=e1092]
            - row "3 Presentation of all factors" [ref=e1093]:
              - cell "3" [ref=e1094]
              - cell "Presentation of all factors" [ref=e1095]
        - blockquote [ref=e1096]:
          - paragraph [ref=e1097]:
            - text: "Note: At AAL2, a memorized secret or biometric, and not a physical authenticator, is required because the session secret is"
            - emphasis [ref=e1098]: something you have
            - text: ", and an additional authentication factor is required to continue the session."
        - heading "7.2.1 Reauthentication from a Federation or Assertion" [level=4] [ref=e1099]
        - paragraph [ref=e1100]:
          - text: When using a federation protocol as described in
          - link "SP 800-63C" [ref=e1101] [cursor=pointer]:
            - /url: sp800-63c.html
          - text: ", Section 5 to connect the CSP and RP, special considerations apply to session management and reauthentication. The federation protocol communicates an authentication event between the CSP and the RP but establishes no session between them. Since the CSP and RP often employ separate session management technologies, there SHALL NOT be any assumption of correlation between these sessions. Consequently, when an RP session expires and the RP requires reauthentication, it is entirely possible that the session at the CSP has not expired and that a new assertion could be generated from this session at the CSP without reauthenticating the user."
        - paragraph [ref=e1102]: An RP requiring reauthentication through a federation protocol SHALL — if possible within the protocol — specify the maximum acceptable authentication age to the CSP, and the CSP SHALL reauthenticate the subscriber if they have not been authenticated within that time period. The CSP SHALL communicate the authentication event time to the RP to allow the RP to decide if the assertion is sufficient for reauthentication and to determine the time for the next reauthentication event.
        - paragraph
        - heading "8 Threats and Security Considerations" [level=2] [ref=e1103]
        - paragraph [ref=e1104]:
          - emphasis [ref=e1105]: This section is informative.
        - heading "8.1 Authenticator Threats" [level=3] [ref=e1106]
        - paragraph [ref=e1107]: "An attacker who can gain control of an authenticator will often be able to masquerade as the authenticator’s owner. Threats to authenticators can be categorized based on attacks on the types of authentication factors that comprise the authenticator:"
        - list [ref=e1108]:
          - listitem [ref=e1109]:
            - paragraph [ref=e1110]:
              - emphasis [ref=e1111]: Something you know
              - text: may be disclosed to an attacker. The attacker might guess a memorized secret. Where the authenticator is a shared secret, the attacker could gain access to the CSP or verifier and obtain the secret value or perform a dictionary attack on a hash of that value. An attacker may observe the entry of a PIN or passcode, find a written record or journal entry of a PIN or passcode, or may install malicious software (e.g., a keyboard logger) to capture the secret. Additionally, an attacker may determine the secret through offline attacks on a password database maintained by the verifier.
          - listitem [ref=e1112]:
            - paragraph [ref=e1113]:
              - emphasis [ref=e1114]: Something you have
              - text: may be lost, damaged, stolen from the owner, or cloned by an attacker. For example, an attacker who gains access to the owner’s computer might copy a software authenticator. A hardware authenticator might be stolen, tampered with, or duplicated. Out-of-band secrets may be intercepted by an attacker and used to authenticate their own session.
          - listitem [ref=e1115]:
            - paragraph [ref=e1116]:
              - emphasis [ref=e1117]: Something you are
              - text: may be replicated. For example, an attacker may obtain a copy of the subscriber’s fingerprint and construct a replica.
        - paragraph [ref=e1118]:
          - text: This document assumes that the subscriber is not colluding with an attacker who is attempting to falsely authenticate to the verifier. With this assumption in mind, the threats to the authenticator(s) used for digital authentication are listed in
          - link "Table 8-1" [ref=e1119] [cursor=pointer]:
            - /url: "#63bSec8-Table1"
          - text: ", along with some examples."
