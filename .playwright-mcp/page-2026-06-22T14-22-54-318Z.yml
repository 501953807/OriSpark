        - paragraph
        - heading "1 Purpose" [level=2] [ref=e243]
        - paragraph [ref=e244]:
          - emphasis [ref=e245]: This section is informative.
        - paragraph [ref=e246]:
          - text: This document and its companion documents,
          - link "Special Publication (SP) 800-63" [ref=e247] [cursor=pointer]:
            - /url: sp800-63-3.html
          - text: ","
          - link "SP 800-63A" [ref=e248] [cursor=pointer]:
            - /url: sp800-63a.html
          - text: ", and"
          - link "SP 800-63C" [ref=e249] [cursor=pointer]:
            - /url: sp800-63c.html
          - text: ", provide technical guidelines to agencies for the implementation of digital authentication."
        - paragraph
        - heading "2 Introduction" [level=2] [ref=e250]
        - paragraph [ref=e251]:
          - emphasis [ref=e252]: This section is informative.
        - paragraph [ref=e253]: Digital identity is the unique representation of a subject engaged in an online transaction. A digital identity is always unique in the context of a digital service, but does not necessarily need to be traceable back to a specific real-life subject. In other words, accessing a digital service may not mean that the underlying subject’s real-life representation is known. Identity proofing establishes that a subject is actually who they claim to be. Digital authentication is the process of determining the validity of one or more authenticators used to claim a digital identity. Authentication establishes that a subject attempting to access a digital service is in control of the technologies used to authenticate. For services in which return visits are applicable, successfully authenticating provides reasonable risk-based assurances that the subject accessing the service today is the same as the one who accessed the service previously. Digital identity presents a technical challenge because it often involves the proofing of individuals over an open network and always involves the authentication of individuals over an open network. This presents multiple opportunities for impersonation and other attacks which can lead to fraudulent claims of a subject’s digital identity.
        - paragraph [ref=e254]:
          - text: The ongoing authentication of subscribers is central to the process of associating a subscriber with their online activity. Subscriber authentication is performed by verifying that the claimant controls one or more
          - emphasis [ref=e255]: authenticators
          - text: (called
          - emphasis [ref=e256]: tokens
          - text: in earlier versions of SP 800-63) associated with a given subscriber. A successful authentication results in the assertion of an identifier, either pseudonymous or non-pseudonymous, and optionally other identity information, to the relying party (RP).
        - paragraph [ref=e257]:
          - text: This document provides recommendations on types of authentication processes, including choices of authenticators, that may be used at various
          - emphasis [ref=e258]: Authenticator Assurance Levels
          - text: (AALs). It also provides recommendations on the lifecycle of authenticators, including revocation in the event of loss or theft.
        - paragraph [ref=e259]: This technical guideline applies to digital authentication of subjects to systems over a network. It does not address the authentication of a person for physical access (e.g., to a building), though some credentials used for digital access may also be used for physical access authentication. This technical guideline also requires that federal systems and service providers participating in authentication protocols be authenticated to subscribers.
        - paragraph [ref=e260]:
          - text: The strength of an authentication transaction is characterized by an ordinal measurement known as the AAL. Stronger authentication (a higher AAL) requires malicious actors to have better capabilities and expend greater resources in order to successfully subvert the authentication process. Authentication at higher AALs can effectively reduce the risk of attacks. A high-level summary of the technical requirements for each of the AALs is provided below; see
          - link "Sections 4" [ref=e261] [cursor=pointer]:
            - /url: "#sec4"
          - text: and
          - link "5" [ref=e262] [cursor=pointer]:
            - /url: "#sec5"
          - text: of this document for specific normative requirements.
        - paragraph [ref=e263]:
          - strong [ref=e264]: Authenticator Assurance Level 1
          - text: ": AAL1 provides some assurance that the claimant controls an authenticator bound to the subscriber’s account. AAL1 requires either single-factor or multi-factor authentication using a wide range of available authentication technologies. Successful authentication requires that the claimant prove possession and control of the authenticator through a secure authentication protocol."
        - paragraph [ref=e265]:
          - strong [ref=e266]: Authenticator Assurance Level 2
          - text: ": AAL2 provides high confidence that the claimant controls an authenticator(s) bound to the subscriber’s account. Proof of possession and control of two different authentication factors is required through secure authentication protocol(s). Approved cryptographic techniques are required at AAL2 and above."
        - paragraph [ref=e267]:
          - strong [ref=e268]: Authenticator Assurance Level 3
          - text: ": AAL3 provides very high confidence that the claimant controls authenticator(s) bound to the subscriber’s account. Authentication at AAL3 is based on proof of possession of a key through a cryptographic protocol. AAL3 authentication requires a hardware-based authenticator and an authenticator that provides verifier impersonation resistance; the same device may fulfill both these requirements. In order to authenticate at AAL3, claimants are required to prove possession and control of two distinct authentication factors through secure authentication protocol(s). Approved cryptographic techniques are required."
