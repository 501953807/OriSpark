        - paragraph
        - heading "3 Definitions and Abbreviations" [level=2] [ref=e312]
        - paragraph [ref=e313]:
          - text: See
          - link "SP 800-63" [ref=e314] [cursor=pointer]:
            - /url: sp800-63-3.html
          - text: ", Appendix A for a complete set of definitions and abbreviations."
        - paragraph
        - heading "4 Authenticator Assurance Levels" [level=2] [ref=e315]: 4 Authenticator Assurance Levels
        - paragraph [ref=e316]:
          - emphasis [ref=e317]: This section contains both normative and informative material.
        - paragraph [ref=e318]: To satisfy the requirements of a given AAL, a claimant SHALL be authenticated with at least a given level of strength to be recognized as a subscriber. The result of an authentication process is an identifier that SHALL be used each time that subscriber authenticates to that RP. The identifier MAY be pseudonymous. Subscriber identifiers SHOULD NOT be reused for a different subject but SHOULD be reused when a previously-enrolled subject is re-enrolled by the CSP. Other attributes that identify the subscriber as a unique subject MAY also be provided.
        - paragraph [ref=e319]: Detailed normative requirements for authenticators and verifiers at each AAL are provided in Section 5.
        - paragraph [ref=e320]:
          - text: See
          - link "SP 800-63" [ref=e321] [cursor=pointer]:
            - /url: sp800-63-3.html
          - text: Section 6.2 for details on how to choose the most appropriate AAL.
        - paragraph [ref=e322]:
          - text: FIPS 140 requirements are satisfied by
          - link "FIPS 140-2" [ref=e323] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: or newer revisions.
        - paragraph [ref=e324]: At IAL1, it is possible that attributes are collected and made available by the digital identity service. Any PII or other personal information — whether self-asserted or validated — requires multi-factor authentication. Therefore, agencies SHALL select a minimum of AAL2 when self-asserted PII or other personal information is made available online.
        - heading "4.1 Authenticator Assurance Level 1" [level=3] [ref=e325]
        - paragraph [ref=e326]:
          - emphasis [ref=e327]: This section is normative.
        - paragraph [ref=e328]: AAL1 provides some assurance that the claimant controls an authenticator bound to the subscriber’s account. AAL1 requires either single-factor or multi-factor authentication using a wide range of available authentication technologies. Successful authentication requires that the claimant prove possession and control of the authenticator through a secure authentication protocol.
        - heading "4.1.1 Permitted Authenticator Types" [level=4] [ref=e329]
        - paragraph [ref=e330]:
          - text: AAL1 authentication SHALL occur by the use of any of the following authenticator types, which are defined in
          - link "Section 5" [ref=e331] [cursor=pointer]:
            - /url: "#sec5"
          - text: ":"
        - list [ref=e332]:
          - listitem [ref=e333]:
            - text: Memorized Secret (
            - link "Section 5.1.1" [ref=e334] [cursor=pointer]:
              - /url: "#memsecret"
            - text: )
          - listitem [ref=e335]:
            - text: Look-Up Secret (
            - link "Section 5.1.2" [ref=e336] [cursor=pointer]:
              - /url: "#lookupsecrets"
            - text: )
          - listitem [ref=e337]:
            - text: Out-of-Band Devices (
            - link "Section 5.1.3" [ref=e338] [cursor=pointer]:
              - /url: "#out-of-band"
            - text: )
          - listitem [ref=e339]:
            - text: Single-Factor One-Time Password (OTP) Device (
            - link "Section 5.1.4" [ref=e340] [cursor=pointer]:
              - /url: "#singlefactorOTP"
            - text: )
          - listitem [ref=e341]:
            - text: Multi-Factor OTP Device (
            - link "Section 5.1.5" [ref=e342] [cursor=pointer]:
              - /url: "#multifactorOTP"
            - text: )
          - listitem [ref=e343]:
            - text: Single-Factor Cryptographic Software (
            - link "Section 5.1.6" [ref=e344] [cursor=pointer]:
              - /url: "#sfcs"
            - text: )
          - listitem [ref=e345]:
            - text: Single-Factor Cryptographic Device (
            - link "Section 5.1.7" [ref=e346] [cursor=pointer]:
              - /url: "#sfcd"
            - text: )
          - listitem [ref=e347]:
            - text: Multi-Factor Cryptographic Software (
            - link "Section 5.1.8" [ref=e348] [cursor=pointer]:
              - /url: "#mfcs"
            - text: )
          - listitem [ref=e349]:
            - text: Multi-Factor Cryptographic Device (
            - link "Section 5.1.9" [ref=e350] [cursor=pointer]:
              - /url: "#mfcd"
            - text: )
        - heading "4.1.2 Authenticator and Verifier Requirements" [level=4] [ref=e351]: 4.1.2 Authenticator and Verifier Requirements
        - paragraph [ref=e352]: Cryptographic authenticators used at AAL1 SHALL use approved cryptography. Software-based authenticators that operate within the context of an operating system MAY, where applicable, attempt to detect compromise (e.g., by malware) of the user endpoint in which they are running and SHOULD NOT complete the operation when such a compromise is detected.
        - paragraph [ref=e353]: Communication between the claimant and verifier (using the primary channel in the case of an out-of-band authenticator) SHALL be via an authenticated protected channel to provide confidentiality of the authenticator output and resistance to man-in-the-middle (MitM) attacks.
        - paragraph [ref=e354]:
          - text: Verifiers operated by government agencies at AAL1 SHALL be validated to meet the requirements of
          - link "FIPS 140" [ref=e355] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 1.
        - heading "4.1.3 Reauthentication" [level=4] [ref=e356]: 4.1.3 Reauthentication
        - paragraph [ref=e357]:
          - text: Periodic reauthentication of subscriber sessions SHALL be performed as described in
          - link "Section 7.2" [ref=e358] [cursor=pointer]:
            - /url: "#sessionreauthn"
          - text: . At AAL1, reauthentication of the subscriber SHOULD be repeated at least once per 30 days during an extended usage session, regardless of user activity. The session SHOULD be terminated (i.e., logged out) when this time limit is reached.
        - heading "4.1.4 Security Controls" [level=4] [ref=e359]
        - paragraph [ref=e360]:
          - text: The CSP SHALL employ appropriately-tailored security controls from the
          - emphasis [ref=e361]: low
          - text: baseline of security controls defined in
          - link "SP 800-53" [ref=e362] [cursor=pointer]:
            - /url: "#SP800-53"
          - text: or equivalent federal (e.g.
          - link "FEDRAMP" [ref=e363] [cursor=pointer]:
            - /url: "#FEDRAMP"
          - text: ) or industry standard. The CSP SHALL ensure that the minimum assurance-related controls for
          - emphasis [ref=e364]: low-impact
          - text: systems, or equivalent, are satisfied.
        - heading "4.1.5 Records Retention Policy" [level=4] [ref=e365]: 4.1.5 Records Retention Policy
        - paragraph [ref=e366]: The CSP shall comply with its respective records retention policies in accordance with applicable laws, regulations, and policies, including any National Archives and Records Administration (NARA) records retention schedules that may apply. If the CSP opts to retain records in the absence of any mandatory requirements, the CSP SHALL conduct a risk management process, including assessments of privacy and security risks, to determine how long records should be retained and SHALL inform the subscriber of that retention policy.
        - heading "4.2 Authenticator Assurance Level 2" [level=3] [ref=e367]
        - paragraph [ref=e368]:
          - emphasis [ref=e369]: This section is normative.
        - paragraph [ref=e370]: AAL2 provides high confidence that the claimant controls authenticator(s) bound to the subscriber’s account. Proof of possession and control of two distinct authentication factors is required through secure authentication protocol(s). Approved cryptographic techniques are required at AAL2 and above.
        - heading "4.2.1 Permitted Authenticator Types" [level=4] [ref=e371]: 4.2.1 Permitted Authenticator Types
        - paragraph [ref=e372]:
          - text: At AAL2, authentication SHALL occur by the use of either a multi-factor authenticator or a combination of two single-factor authenticators. A multi-factor authenticator requires two factors to execute a single authentication event, such as a cryptographically-secure device with an integrated biometric sensor that is required to activate the device. Authenticator requirements are specified in
          - link "Section 5" [ref=e373] [cursor=pointer]:
            - /url: "#sec5"
          - text: .
        - paragraph [ref=e374]: "When a multi-factor authenticator is used, any of the following MAY be used:"
        - list [ref=e375]:
          - listitem [ref=e376]:
            - text: Multi-Factor OTP Device (
            - link "Section 5.1.5" [ref=e377] [cursor=pointer]:
              - /url: "#multifactorOTP"
            - text: )
          - listitem [ref=e378]:
            - text: Multi-Factor Cryptographic Software (
            - link "Section 5.1.8" [ref=e379] [cursor=pointer]:
              - /url: "#mfcs"
            - text: )
          - listitem [ref=e380]:
            - text: Multi-Factor Cryptographic Device (
            - link "Section 5.1.9" [ref=e381] [cursor=pointer]:
              - /url: "#mfcd"
            - text: )
        - paragraph [ref=e382]:
          - text: When a combination of two single-factor authenticators is used, it SHALL include a Memorized Secret authenticator (
          - link "Section 5.1.1" [ref=e383] [cursor=pointer]:
            - /url: "#memsecret"
          - text: ") and one possession-based (i.e., “something you have”) authenticator from the following list:"
        - list [ref=e384]:
          - listitem [ref=e385]:
            - text: Look-Up Secret (
            - link "Section 5.1.2" [ref=e386] [cursor=pointer]:
              - /url: "#lookupsecrets"
            - text: )
          - listitem [ref=e387]:
            - text: Out-of-Band Device (
            - link "Section 5.1.3" [ref=e388] [cursor=pointer]:
              - /url: "#out-of-band"
            - text: )
          - listitem [ref=e389]:
            - text: Single-Factor OTP Device (
            - link "Section 5.1.4" [ref=e390] [cursor=pointer]:
              - /url: "#singlefactorOTP"
            - text: )
          - listitem [ref=e391]:
            - text: Single-Factor Cryptographic Software (
            - link "Section 5.1.6" [ref=e392] [cursor=pointer]:
              - /url: "#sfcs"
            - text: )
          - listitem [ref=e393]:
            - text: Single-Factor Cryptographic Device (
            - link "Section 5.1.7" [ref=e394] [cursor=pointer]:
              - /url: "#sfcd"
            - text: )
        - blockquote [ref=e395]:
          - paragraph [ref=e396]:
            - text: "Note: When biometric authentication meets the requirements in"
            - link "Section 5.2.3" [ref=e397] [cursor=pointer]:
              - /url: "#biometric_use"
            - text: ", the device has to be authenticated in addition to the biometric — a biometric is recognized as a factor, but not recognized as an authenticator by itself. Therefore, when conducting authentication with a biometric, it is unnecessary to use two authenticators because the associated device serves as “something you have,” while the biometric serves as “something you are.”"
        - heading "4.2.2 Authenticator and Verifier Requirements" [level=4] [ref=e398]: 4.2.2 Authenticator and Verifier Requirements
        - paragraph [ref=e399]:
          - text: Cryptographic authenticators used at AAL2 SHALL use approved cryptography. Authenticators procured by government agencies SHALL be validated to meet the requirements of
          - link "FIPS 140" [ref=e400] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 1. Software-based authenticators that operate within the context of an operating system MAY, where applicable, attempt to detect compromise of the platform in which they are running (e.g., by malware) and SHOULD NOT complete the operation when such a compromise is detected. At least one authenticator used at AAL2 SHALL be replay resistant as described in
          - link "Section 5.2.8" [ref=e401] [cursor=pointer]:
            - /url: "#replay"
          - text: . Authentication at AAL2 SHOULD demonstrate authentication intent from at least one authenticator as discussed in
          - link "Section 5.2.9" [ref=e402] [cursor=pointer]:
            - /url: "#intent"
          - text: .
        - paragraph [ref=e403]: Communication between the claimant and verifier (the primary channel in the case of an out-of-band authenticator) SHALL be via an authenticated protected channel to provide confidentiality of the authenticator output and resistance to MitM attacks.
        - paragraph [ref=e404]:
          - text: Verifiers operated by government agencies at AAL2 SHALL be validated to meet the requirements of
          - link "FIPS 140" [ref=e405] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 1.
        - paragraph [ref=e406]: When a device such as a smartphone is used in the authentication process, the unlocking of that device (typically done using a PIN or biometric) SHALL NOT be considered one of the authentication factors. Generally, it is not possible for a verifier to know that the device had been locked or if the unlock process met the requirements for the relevant authenticator type.
        - paragraph [ref=e407]:
          - text: When a biometric factor is used in authentication at AAL2, the performance requirements stated in
          - link "Section 5.2.3" [ref=e408] [cursor=pointer]:
            - /url: "#biometric_use"
          - text: SHALL be met, and the verifier SHOULD make a determination that the biometric sensor and subsequent processing meet these requirements.
        - heading "4.2.3 Reauthentication" [level=4] [ref=e409]: 4.2.3 Reauthentication
        - paragraph [ref=e410]:
          - text: Periodic reauthentication of subscriber sessions SHALL be performed as described in
          - link "Section 7.2" [ref=e411] [cursor=pointer]:
            - /url: "#sessionreauthn"
          - text: . At AAL2, authentication of the subscriber SHALL be repeated at least once per 12 hours during an extended usage session, regardless of user activity. Reauthentication of the subscriber SHALL be repeated following any period of inactivity lasting 30 minutes or longer. The session SHALL be terminated (i.e., logged out) when either of these time limits is reached.
        - paragraph [ref=e412]: Reauthentication of a session that has not yet reached its time limit MAY require only a memorized secret or a biometric in conjunction with the still-valid session secret. The verifier MAY prompt the user to cause activity just before the inactivity timeout.
        - heading "4.2.4 Security Controls" [level=4] [ref=e413]
        - paragraph [ref=e414]:
          - text: The CSP SHALL employ appropriately-tailored security controls from the
          - emphasis [ref=e415]: moderate
          - text: baseline of security controls defined in
          - link "SP 800-53" [ref=e416] [cursor=pointer]:
            - /url: "#SP800-53"
          - text: or equivalent federal (e.g.,
          - link "FEDRAMP" [ref=e417] [cursor=pointer]:
            - /url: "#FEDRAMP"
          - text: ) or industry standard. The CSP SHALL ensure that the minimum assurance-related controls for
          - emphasis [ref=e418]: moderate-impact
          - text: systems or equivalent are satisfied.
        - heading "4.2.5 Records Retention Policy" [level=4] [ref=e419]: 4.2.5 Records Retention Policy
        - paragraph [ref=e420]: The CSP shall comply with its respective records retention policies in accordance with applicable laws, regulations, and policies, including any NARA records retention schedules that may apply. If the CSP opts to retain records in the absence of any mandatory requirements, the CSP SHALL conduct a risk management process, including assessments of privacy and security risks to determine how long records should be retained and SHALL inform the subscriber of that retention policy.
        - heading "4.3 Authenticator Assurance Level 3" [level=3] [ref=e421]
        - paragraph [ref=e422]:
          - emphasis [ref=e423]: This section is normative.
        - paragraph [ref=e424]: AAL3 provides very high confidence that the claimant controls authenticator(s) bound to the subscriber’s account. Authentication at AAL3 is based on proof of possession of a key through a cryptographic protocol. AAL3 authentication SHALL use a hardware-based authenticator and an authenticator that provides verifier impersonation resistance — the same device MAY fulfill both these requirements. In order to authenticate at AAL3, claimants SHALL prove possession and control of two distinct authentication factors through secure authentication protocol(s). Approved cryptographic techniques are required.
        - heading "4.3.1 Permitted Authenticator Types" [level=4] [ref=e425]: 4.3.1 Permitted Authenticator Types
        - paragraph [ref=e426]: "AAL3 authentication SHALL occur by the use of one of a combination of authenticators satisfying the requirements in Section 4.3. Possible combinations are:"
        - list [ref=e427]:
          - listitem [ref=e428]:
            - text: Multi-Factor Cryptographic Device (
            - link "Section 5.1.9" [ref=e429] [cursor=pointer]:
              - /url: "#mfcd"
            - text: )
          - listitem [ref=e430]:
            - text: Single-Factor Cryptographic Device (
            - link "Section 5.1.7" [ref=e431] [cursor=pointer]:
              - /url: "#sfcd"
            - text: ) used in conjunction with Memorized Secret (
            - link "Section 5.1.1" [ref=e432] [cursor=pointer]:
              - /url: "#memsecret"
            - text: )
          - listitem [ref=e433]:
            - text: Multi-Factor OTP device (software or hardware) (
            - link "Section 5.1.5" [ref=e434] [cursor=pointer]:
              - /url: "#multifactorOTP"
            - text: ) used in conjunction with a Single-Factor Cryptographic Device (
            - link "Section 5.1.7" [ref=e435] [cursor=pointer]:
              - /url: "#sfcd"
            - text: )
          - listitem [ref=e436]:
            - text: Multi-Factor OTP device (hardware only) (
            - link "Section 5.1.5" [ref=e437] [cursor=pointer]:
              - /url: "#multifactorOTP"
            - text: ) used in conjunction with a Single-Factor Cryptographic Software (
            - link "Section 5.1.6" [ref=e438] [cursor=pointer]:
              - /url: "#sfcs"
            - text: )
          - listitem [ref=e439]:
            - text: Single-Factor OTP device (hardware only) (
            - link "Section 5.1.4" [ref=e440] [cursor=pointer]:
              - /url: "#singlefactorOTP"
            - text: ) used in conjunction with a Multi-Factor Cryptographic Software Authenticator (
            - link "Section 5.1.8" [ref=e441] [cursor=pointer]:
              - /url: "#mfcs"
            - text: )
          - listitem [ref=e442]:
            - text: Single-Factor OTP device (hardware only) (
            - link "Section 5.1.4" [ref=e443] [cursor=pointer]:
              - /url: "#singlefactorOTP"
            - text: ) used in conjunction with a Single-Factor Cryptographic Software Authenticator (
            - link "Section 5.1.6" [ref=e444] [cursor=pointer]:
              - /url: "#sfcs"
            - text: ) and a Memorized Secret (
            - link "Section 5.1.1" [ref=e445] [cursor=pointer]:
              - /url: "#memsecret"
            - text: )
        - heading "4.3.2 Authenticator and Verifier Requirements" [level=4] [ref=e446]: 4.3.2 Authenticator and Verifier Requirements
        - paragraph [ref=e447]:
          - text: Communication between the claimant and verifier SHALL be via an authenticated protected channel to provide confidentiality of the authenticator output and resistance to MitM attacks. At least one cryptographic authenticator used at AAL3 SHALL be verifier impersonation resistant as described in Section
          - link "5.2.5" [ref=e448] [cursor=pointer]:
            - /url: "#verifimpers"
          - text: and SHALL be replay resistant as described in Section
          - link "5.2.8" [ref=e449] [cursor=pointer]:
            - /url: "#replay"
          - text: . All authentication and reauthentication processes at AAL3 SHALL demonstrate authentication intent from at least one authenticator as described in
          - link "Section 5.2.9" [ref=e450] [cursor=pointer]:
            - /url: "#intent"
          - text: .
        - paragraph [ref=e451]:
          - text: Multi-factor authenticators used at AAL3 SHALL be hardware cryptographic modules validated at
          - link "FIPS 140" [ref=e452] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 2 or higher overall with at least
          - link "FIPS 140" [ref=e453] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 3 physical security. Single-factor cryptographic devices used at AAL3 SHALL be validated at
          - link "FIPS 140" [ref=e454] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 1 or higher overall with at least
          - link "FIPS 140" [ref=e455] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 3 physical security.
        - paragraph [ref=e456]:
          - text: Verifiers at AAL3 SHALL be validated at
          - link "FIPS 140" [ref=e457] [cursor=pointer]:
            - /url: "#FIPS140-2"
          - text: Level 1 or higher.
        - paragraph [ref=e458]:
          - text: Verifiers at AAL3 SHALL be verifier compromise resistant as described in
          - link "Section 5.2.7" [ref=e459] [cursor=pointer]:
            - /url: "#verifier-secrets"
          - text: with respect to at least one authentication factor.
        - paragraph [ref=e460]: Hardware-based authenticators and verifiers at AAL3 SHOULD resist relevant side-channel (e.g., timing and power-consumption analysis) attacks. Relevant side-channel attacks SHALL be determined by a risk assessment performed by the CSP.
        - paragraph [ref=e461]: When a device such a smartphone is used in the authentication process — presuming that the device is able to meet the requirements above — the unlocking of that device SHALL NOT be considered to satisfy one of the authentication factors. This is because it is generally not possible for verifier to know that the device had been locked nor whether the unlock process met the requirements for the relevant authenticator type.
        - paragraph [ref=e462]:
          - text: When a biometric factor is used in authentication at AAL3, the verifier SHALL make a determination that the biometric sensor and subsequent processing meet the performance requirements stated in
          - link "Section 5.2.3" [ref=e463] [cursor=pointer]:
            - /url: "#biometric_use"
          - text: .
        - heading "4.3.3 Reauthentication" [level=4] [ref=e464]: 4.3.3 Reauthentication
        - paragraph [ref=e465]:
          - text: Periodic reauthentication of subscriber sessions SHALL be performed as described in
          - link "Section 7.2" [ref=e466] [cursor=pointer]:
            - /url: "#sessionreauthn"
          - text: . At AAL3, authentication of the subscriber SHALL be repeated at least once per 12 hours during an extended usage session, regardless of user activity, as described in
          - link "Section 7.2" [ref=e467] [cursor=pointer]:
            - /url: "#sessionreauthn"
          - text: . Reauthentication of the subscriber SHALL be repeated following any period of inactivity lasting 15 minutes or longer. Reauthentication SHALL use both authentication factors. The session SHALL be terminated (i.e., logged out) when either of these time limits is reached. The verifier MAY prompt the user to cause activity just before the inactivity timeout.
        - heading "4.3.4 Security Controls" [level=4] [ref=e468]
        - paragraph [ref=e469]:
          - text: The CSP SHALL employ appropriately-tailored security controls from the
          - emphasis [ref=e470]: high
          - text: baseline of security controls defined in
          - link "SP 800-53" [ref=e471] [cursor=pointer]:
            - /url: "#SP800-53"
          - text: or an equivalent federal (e.g.,
          - link "FEDRAMP" [ref=e472] [cursor=pointer]:
            - /url: "#FEDRAMP"
          - text: ) or industry standard. The CSP SHALL ensure that the minimum assurance-related controls for
          - emphasis [ref=e473]: high-impact
          - text: systems or equivalent are satisfied.
        - heading "4.3.5 Records Retention Policy" [level=4] [ref=e474]: 4.3.5 Records Retention Policy
        - paragraph [ref=e475]: The CSP shall comply with its respective records retention policies in accordance with applicable laws, regulations, and policies, including any NARA records retention schedules that may apply. If the CSP opts to retain records in the absence of any mandatory requirements, the CSP SHALL conduct a risk management process, including assessments of privacy and security risks, to determine how long records should be retained and SHALL inform the subscriber of that retention policy.
        - heading "4.4 Privacy Requirements" [level=3] [ref=e476]: 4.4 Privacy Requirements
        - paragraph [ref=e477]:
          - text: The CSP SHALL employ appropriately-tailored privacy controls defined in
          - link "SP 800-53" [ref=e478] [cursor=pointer]:
            - /url: "#SP800-53"
          - text: or equivalent industry standard.
        - paragraph [ref=e479]: If CSPs process attributes for purposes other than identity proofing, authentication, or attribute assertions (collectively “identity service”), related fraud mitigation, or to comply with law or legal process, CSPs SHALL implement measures to maintain predictability and manageability commensurate with the privacy risk arising from the additional processing. Measures MAY include providing clear notice, obtaining subscriber consent, or enabling selective use or disclosure of attributes. When CSPs use consent measures, CSPs SHALL NOT make consent for the additional processing a condition of the identity service.
        - paragraph [ref=e480]: "Regardless of whether the CSP is an agency or private sector provider, the following requirements apply to an agency offering or using the authentication service:"
        - list [ref=e481]:
          - listitem [ref=e482]:
            - text: The agency SHALL consult with their Senior Agency Official for Privacy (SAOP) and conduct an analysis to determine whether the collection of PII to issue or maintain authenticators triggers the requirements of the
            - emphasis [ref=e483]: Privacy Act of 1974
            - link "[Privacy Act]" [ref=e484] [cursor=pointer]:
              - /url: "#PrivacyAct"
            - text: (see
            - link "Section 9.4" [ref=e485] [cursor=pointer]:
              - /url: "#agency-privacy"
            - text: ).
            - list [ref=e486]:
              - listitem [ref=e487]: The agency SHALL publish a System of Records Notice (SORN) to cover such collections, as applicable.
              - listitem [ref=e488]:
                - text: The agency SHALL consult with their SAOP and conduct an analysis to determine whether the collection of PII to issue or maintain authenticators triggers the requirements of the
                - emphasis [ref=e489]: E-Government Act of 2002
                - link "[E-Gov]" [ref=e490] [cursor=pointer]:
                  - /url: "#E-Gov"
                - text: .
              - listitem [ref=e491]: The agency SHALL publish a Privacy Impact Assessment (PIA) to cover such collection, as applicable.
