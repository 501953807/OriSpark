        - paragraph [ref=e1407]:
          - text: Several other strategies may be applied to mitigate the threats described in
          - link "Table 8-1" [ref=e1408] [cursor=pointer]:
            - /url: "#63bSec8-Table1"
          - text: ":"
        - list [ref=e1409]:
          - listitem [ref=e1410]:
            - paragraph [ref=e1411]:
              - emphasis [ref=e1412]: Multiple factors
              - text: make successful attacks more difficult to accomplish. If an attacker needs to both steal a cryptographic authenticator and guess a memorized secret, then the work to discover both factors may be too high.
          - listitem [ref=e1413]:
            - paragraph [ref=e1414]:
              - emphasis [ref=e1415]: Physical security mechanisms
              - text: may be employed to protect a stolen authenticator from duplication. Physical security mechanisms can provide tamper evidence, detection, and response.
          - listitem [ref=e1416]:
            - paragraph [ref=e1417]:
              - emphasis [ref=e1418]: Requiring the use of long memorized secrets
              - text: that don’t appear in common dictionaries may force attackers to try every possible value.
          - listitem [ref=e1419]:
            - paragraph [ref=e1420]:
              - emphasis [ref=e1421]: System and network security controls
              - text: may be employed to prevent an attacker from gaining access to a system or installing malicious software.
          - listitem [ref=e1422]:
            - paragraph [ref=e1423]:
              - emphasis [ref=e1424]: Periodic training
              - text: may be performed to ensure subscribers understand when and how to report compromise — or suspicion of compromise — or otherwise recognize patterns of behavior that may signify an attacker attempting to compromise the authentication process.
          - listitem [ref=e1425]:
            - paragraph [ref=e1426]:
              - emphasis [ref=e1427]: Out of band techniques
              - text: may be employed to verify proof of possession of registered devices (e.g., cell phones).
        - heading "8.3 Authenticator Recovery" [level=3] [ref=e1428]
        - paragraph [ref=e1429]: The weak point in many authentication mechanisms is the process followed when a subscriber loses control of one or more authenticators and needs to replace them. In many cases, the options remaining available to authenticate the subscriber are limited, and economic concerns (e.g., cost of maintaining call centers) motivate the use of inexpensive, and often less secure, backup authentication methods. To the extent that authenticator recovery is human-assisted, there is also the risk of social engineering attacks.
        - paragraph [ref=e1430]: To maintain the integrity of the authentication factors, it is essential that it not be possible to leverage an authentication involving one factor to obtain an authenticator of a different factor. For example, a memorized secret must not be usable to obtain a new list of look-up secrets.
        - heading "8.4 Session Attacks" [level=3] [ref=e1431]
        - paragraph [ref=e1432]:
          - text: The above discussion focuses on threats to the authentication event itself, but hijacking attacks on the session following an authentication event can have similar security impacts. The session management guidelines in
          - link "Section 7" [ref=e1433] [cursor=pointer]:
            - /url: "#sec7"
          - text: are essential to maintain session integrity against attacks, such as XSS. In addition, it is important to sanitize all information to be displayed
          - link "[OWASP-XSS-prevention]" [ref=e1434] [cursor=pointer]:
            - /url: "#OWASP-XSS-prevention"
          - text: to ensure that it does not contain executable content. These guidelines also recommend that session secrets be made inaccessible to mobile code in order to provide extra protection against exfiltration of session secrets.
        - paragraph [ref=e1435]: Another post-authentication threat, cross-site request forgery (CSRF), takes advantage of users’ tendency to have multiple sessions active at the same time. It is important to embed and verify a session identifier into web requests to prevent the ability for a valid URL or request to be unintentionally or maliciously activated.
        - paragraph
        - heading "9 Privacy Considerations" [level=2] [ref=e1436]
        - paragraph [ref=e1437]:
          - emphasis [ref=e1438]: These privacy considerations supplement the guidance in Section 4. This section is informative.
        - heading "9.1 Privacy Risk Assessment" [level=3] [ref=e1439]
        - paragraph [ref=e1440]:
          - link "Sections 4.1.5" [ref=e1441] [cursor=pointer]:
            - /url: "#aal1records"
          - text: ","
          - link "4.2.5" [ref=e1442] [cursor=pointer]:
            - /url: "#aal2records"
          - text: ", and"
          - link "4.3.5" [ref=e1443] [cursor=pointer]:
            - /url: "#aal3records"
          - text: "require the CSP to conduct a privacy risk assessment for records retention. Such a privacy risk assessment would include:"
        - list [ref=e1444]:
          - listitem [ref=e1445]: The likelihood that the records retention could create a problem for the subscriber, such as invasiveness or unauthorized access to the information.
          - listitem [ref=e1446]: The impact if such a problem did occur.
        - paragraph [ref=e1447]: CSPs should be able to reasonably justify any response they take to identified privacy risks, including accepting the risk, mitigating the risk, and sharing the risk. The use of subscriber consent is a form of sharing the risk, and therefore appropriate for use only when a subscriber could reasonably be expected to have the capacity to assess and accept the shared risk.
        - heading "9.2 Privacy Controls" [level=3] [ref=e1448]
        - paragraph [ref=e1449]:
          - link "Section 4.4" [ref=e1450] [cursor=pointer]:
            - /url: "#aal_privacy"
          - text: requires CSPs to employ appropriately-tailored privacy controls.
          - link "SP 800-53" [ref=e1451] [cursor=pointer]:
            - /url: "#SP800-53"
          - text: provides a set of privacy controls for CSPs to consider when deploying authentication mechanisms. These controls cover notices, redress, and other important considerations for successful and trustworthy deployments.
        - heading "9.3 Use Limitation" [level=3] [ref=e1452]
        - paragraph [ref=e1453]:
          - link "Section 4.4" [ref=e1454] [cursor=pointer]:
            - /url: "#aal_privacy"
          - text: requires CSPs to use measures to maintain the objectives of predictability (enabling reliable assumptions by individuals, owners, and operators about PII and its processing by an information system) and manageability (providing the capability for granular administration of PII, including alteration, deletion, and selective disclosure) commensurate with privacy risks that can arise from the processing of attributes for purposes other than identity proofing, authentication, authorization, or attribute assertion, related fraud mitigation, or to comply with law or legal process
          - link "NISTIR8062" [ref=e1455] [cursor=pointer]:
            - /url: "#NISTIR8062"
          - text: .
        - paragraph [ref=e1456]:
          - text: CSPs may have various business purposes for processing attributes, including providing non-identity services to subscribers. However, processing attributes for other purposes than those specified at collection can create privacy risks when individuals are not expecting or comfortable with the additional processing. CSPs can determine appropriate measures commensurate with the privacy risk arising from the additional processing. For example, absent applicable law, regulation or policy, it may not be necessary to get consent when processing attributes to provide non-identity services requested by subscribers, although notices may help subscribers maintain reliable assumptions about the processing (predictability). Other processing of attributes may carry different privacy risks that call for obtaining consent or allowing subscribers more control over the use or disclosure of specific attributes (manageability). Subscriber consent needs to be meaningful; therefore, as stated in
          - link "Section 4.4" [ref=e1457] [cursor=pointer]:
            - /url: "#aal_privacy"
          - text: ", when CSPs use consent measures, acceptance by the subscriber of additional uses SHALL NOT be a condition of providing authentication services."
        - paragraph [ref=e1458]: Consult your SAOP if there are questions about whether the proposed processing falls outside the scope of the permitted processing or the appropriate privacy risk mitigation measures.
        - heading "9.4 Agency-Specific Privacy Compliance" [level=3] [ref=e1459]:
          - text: "9.4"
          - text: Agency-Specific Privacy Compliance
        - paragraph [ref=e1460]:
          - link "Section 4.4" [ref=e1461] [cursor=pointer]:
            - /url: "#aal_privacy"
          - text: covers specific compliance obligations for federal CSPs. It is critical to involve your agency’s SAOP in the earliest stages of digital authentication system development in order to assess and mitigate privacy risks and advise the agency on compliance requirements, such as whether or not the collection of PII to issue or maintain authenticators triggers the
          - emphasis [ref=e1462]: Privacy Act of 1974
          - link "Privacy Act" [ref=e1463] [cursor=pointer]:
            - /url: "#PrivacyAct"
          - text: or the
          - emphasis [ref=e1464]: E-Government Act of 2002
          - link "E-Gov" [ref=e1465] [cursor=pointer]:
            - /url: "#E-Gov"
          - text: requirement to conduct a PIA. For example, with respect to centralized maintenance of biometrics, it is likely that the Privacy Act requirements will be triggered and require coverage by either a new or existing Privacy Act system of records due to the collection and maintenance of PII and any other attributes necessary for authentication. The SAOP can similarly assist the agency in determining whether a PIA is required.
        - paragraph [ref=e1466]: These considerations should not be read as a requirement to develop a Privacy Act SORN or PIA for authentication alone. In many cases it will make the most sense to draft a PIA and SORN that encompasses the entire digital authentication process or include the digital authentication process as part of a larger programmatic PIA that discusses the service or benefit to which the agency is establishing online.
        - paragraph [ref=e1467]: Due to the many components of digital authentication, it is important for the SAOP to have an awareness and understanding of each individual component. For example, other privacy artifacts may be applicable to an agency offering or using federated CSP or RP services (e.g., Data Use Agreements, Computer Matching Agreements). The SAOP can assist the agency in determining what additional requirements apply. Moreover, a thorough understanding of the individual components of digital authentication will enable the SAOP to thoroughly assess and mitigate privacy risks either through compliance processes or by other means.
        - paragraph
        - heading "10 Usability Considerations" [level=2] [ref=e1468]
        - paragraph [ref=e1469]:
          - emphasis [ref=e1470]: This section is informative.
        - paragraph [ref=e1471]:
          - link "ISO/IEC 9241-11" [ref=e1472] [cursor=pointer]:
            - /url: "#ISO9241"
          - text: defines usability as the “extent to which a product can be used by specified users to achieve specified goals with effectiveness, efficiency and satisfaction in a specified context of use.” This definition focuses on users, their goals, and the context of use as key elements necessary for achieving effectiveness, efficiency, and satisfaction. A holistic approach that accounts for these key elements is necessary to achieve usability.
        - paragraph [ref=e1473]: A user’s goal for accessing an information system is to perform an intended task. Authentication is the function that enables this goal. However, from the user’s perspective, authentication stands between them and their intended task. Effective design and implementation of authentication makes it easy to do the right thing, hard to do the wrong thing, and easy to recover when the wrong thing happens.
        - paragraph [ref=e1474]: Organizations need to be cognizant of the overall implications of their stakeholders’ entire digital authentication ecosystem. Users often employ one or more authenticator, each for a different RP. They then struggle to remember passwords, to recall which authenticator goes with which RP, and to carry multiple physical authentication devices. Evaluating the usability of authentication is critical, as poor usability often results in coping mechanisms and unintended work-arounds that can ultimately degrade the effectiveness of security controls.
        - paragraph [ref=e1475]: Integrating usability into the development process can lead to authentication solutions that are secure and usable while still addressing users’ authentication needs and organizations’ business goals.
        - paragraph [ref=e1476]: The impact of usability across digital systems needs to be considered as part of the risk assessment when deciding on the appropriate AAL. Authenticators with a higher AAL sometimes offer better usability and should be allowed for use for lower AAL applications.
        - paragraph [ref=e1477]:
          - text: Leveraging federation for authentication can alleviate many of the usability issues, though such an approach has its own tradeoffs, as discussed in
          - link "SP 800-63C" [ref=e1478] [cursor=pointer]:
            - /url: sp800-63c.html
          - text: .
        - paragraph [ref=e1479]: This section provides general usability considerations and possible implementations, but does not recommend specific solutions. The implementations mentioned are examples to encourage innovative technological approaches to address specific usability needs. Further, usability considerations and their implementations are sensitive to many factors that prevent a one-size-fits-all solution. For example, a font size that works in the desktop computing environment may force text to scroll off of a small OTP device screen. Performing a usability evaluation on the selected authenticator is a critical component of implementation. It is important to conduct evaluations with representative users, realistic goals and tasks, and appropriate contexts of use.
        - paragraph [ref=e1480]:
          - strong [ref=e1481]: ASSUMPTIONS
        - paragraph [ref=e1482]: In this section, the term “users” means “claimants” or “subscribers.”
        - paragraph [ref=e1483]: Guidelines and considerations are described from the users’ perspective.
        - paragraph [ref=e1484]:
          - text: Accessibility differs from usability and is out of scope for this document.
          - link "Section 508" [ref=e1485] [cursor=pointer]:
            - /url: "#Section508"
          - text: was enacted to eliminate barriers in information technology and require federal agencies to make their online public content accessible to people with disabilities. Refer to Section 508 law and standards for accessibility guidance.
        - heading "10.1 Usability Considerations Common to Authenticators" [level=3] [ref=e1486]: 10.1 Usability Considerations Common to Authenticators
        - paragraph [ref=e1487]: When selecting and implementing an authentication system, consider usability across the entire lifecycle of the selected authenticators (e.g., typical use and intermittent events), while being mindful of the combination of users, their goals, and context of use.
        - paragraph [ref=e1488]: A single authenticator type usually does not suffice for the entire user population. Therefore, whenever possible — based on AAL requirements — CSPs should support alternative authenticator types and allow users to choose based on their needs. Task immediacy, perceived cost benefit tradeoffs, and unfamiliarity with certain authenticators often impact choice. Users tend to choose options that incur the least burden or cost at that moment. For example, if a task requires immediate access to an information system, a user may prefer to create a new account and password rather than select an authenticator requiring more steps. Alternatively, users may choose a federated identity option — approved at the appropriate AAL — if they already have an account with an identity provider. Users may understand some authenticators better than others, and have different levels of trust based on their understanding and experience.
        - paragraph [ref=e1489]: Positive user authentication experiences are integral to the success of an organization achieving desired business outcomes. Therefore, they should strive to consider authenticators from the users’ perspective. The overarching authentication usability goal is to minimize user burden and authentication friction (e.g., the number of times a user has to authenticate, the steps involved, and the amount of information he or she has to track). Single sign-on exemplifies one such minimization strategy.
        - paragraph [ref=e1490]: Usability considerations applicable to most authenticators are described below. Subsequent sections describe usability considerations specific to a particular authenticator.
        - paragraph [ref=e1491]: "Usability considerations for typical usage of all authenticators include:"
        - list [ref=e1492]:
          - listitem [ref=e1493]:
            - paragraph [ref=e1494]: Provide information on the use and maintenance of the authenticator, e.g., what to do if the authenticator is lost or stolen, and instructions for use — especially if there are different requirements for first-time use or initialization.
          - listitem [ref=e1495]:
            - paragraph [ref=e1496]: Authenticator availability should also be considered as users will need to remember to have their authenticator readily available. Consider the need for alternate authentication options to protect against loss, damage, or other negative impacts to the original authenticator.
          - listitem [ref=e1497]:
            - paragraph [ref=e1498]: Whenever possible, based on AAL requirements, users should be provided with alternate authentication options. This allows users to choose an authenticator based on their context, goals, and tasks (e.g., the frequency and immediacy of the task). Alternate authentication options also help address availability issues that may occur with a particular authenticator.
          - listitem [ref=e1499]:
            - text: "Characteristics of user-facing text:"
            - list [ref=e1500]:
              - listitem [ref=e1501]: Write user-facing text (e.g., instructions, prompts, notifications, error messages) in plain language for the intended audience. Avoid technical jargon and, typically, write for a 6th to 8th grade literacy level.
              - listitem [ref=e1502]:
                - text: "Consider the legibility of user-facing and user-entered text, including font style, size, color, and contrast with surrounding background. Illegible text contributes to user entry errors. To enhance legibility, consider the use of:"
                - list [ref=e1503]:
                  - listitem [ref=e1504]: High contrast. The highest contrast is black on white.
                  - listitem [ref=e1505]: Sans serif fonts for electronic displays. Serif fonts for printed materials.
                  - listitem [ref=e1506]: Fonts that clearly distinguish between easily confusable characters (e.g., the capital letter “O” and the number “0”).
                  - listitem [ref=e1507]: A minimum font size of 12 points as long as the text fits for display on the device.
          - listitem [ref=e1508]:
            - text: "User experience during authenticator entry:"
            - list [ref=e1509]:
              - listitem [ref=e1510]: Offer the option to display text during entry, as masked text entry is error-prone. Once a given character is displayed long enough for the user to see, it can be hidden. Consider the device when determining masking delay time, as it takes longer to enter memorized secrets on mobile devices (e.g., tablets and smartphones) than on traditional desktop computers. Ensure masking delay durations are consistent with user needs.
              - listitem [ref=e1511]: Ensure the time allowed for text entry is adequate (i.e., the entry screen does not time out prematurely). Ensure allowed text entry times are consistent with user needs.
              - listitem [ref=e1512]: Provide clear, meaningful and actionable feedback on entry errors to reduce user confusion and frustration. Significant usability implications arise when users do not know they have entered text incorrectly.
              - listitem [ref=e1513]: Allow at least 10 entry attempts for authenticators requiring the entry of the authenticator output by the user. The longer and more complex the entry text, the greater the likelihood of user entry errors.
              - listitem [ref=e1514]: Provide clear, meaningful feedback on the number of remaining allowed attempts. For rate limiting (i.e., throttling), inform users how long they have to wait until the next attempt to reduce confusion and frustration.
          - listitem [ref=e1515]:
            - text: "Minimize the impact of form-factor constraints, such as limited touch and display areas on mobile devices:"
            - list [ref=e1516]:
              - listitem [ref=e1517]: Larger touch areas improve usability for text entry since typing on small devices is significantly more error prone and time consuming than typing on a full-size keyboard. The smaller the onscreen keyboard, the more difficult it is to type, due to the size of the input mechanism (e.g., a finger) relative to the size of the on-screen target.
              - listitem [ref=e1518]: Follow good user interface and information design for small displays.
        - paragraph [ref=e1519]: Intermittent events include events such as reauthentication, account lock-out, expiration, revocation, damage, loss, theft, and non-functional software.
        - paragraph [ref=e1520]: "Usability considerations for intermittent events across authenticator types include:"
        - list [ref=e1521]:
          - listitem [ref=e1522]:
            - paragraph [ref=e1523]: To prevent users from needing to reauthenticate due to user inactivity, prompt users in order to trigger activity just before (e.g., 2 minutes) an inactivity timeout would otherwise occur.
          - listitem [ref=e1524]:
            - paragraph [ref=e1525]: Prompt users with adequate time (e.g., 1 hour) to save their work before the fixed periodic reauthentication event required regardless of user activity.
          - listitem [ref=e1526]:
            - paragraph [ref=e1527]: Clearly communicate how and where to acquire technical assistance. For example, provide users with information such as a link to an online self-service feature, chat sessions or a phone number for help desk support. Ideally, sufficient information can be provided to enable users to recover from intermittent events on their own without outside intervention.
        - heading "10.2 Usability Considerations by Authenticator Type" [level=3] [ref=e1528]
        - paragraph [ref=e1529]:
          - text: In addition to the previously described general usability considerations applicable to most authenticators (
          - link "Section 10.1" [ref=e1530] [cursor=pointer]:
            - /url: "#usabilitycommon"
          - text: ), the following sections describe other usability considerations specific to particular authenticator types.
        - heading "10.2.1 Memorized Secrets" [level=4] [ref=e1531]: 10.2.1 Memorized Secrets
        - paragraph [ref=e1532]:
          - strong [ref=e1533]:
            - emphasis [ref=e1534]: Typical Usage
        - paragraph [ref=e1535]: Users manually input the memorized secret (commonly referred to as a password or PIN).
        - paragraph [ref=e1536]: "Usability considerations for typical usage include:"
        - list [ref=e1537]:
          - listitem [ref=e1538]:
            - text: Memorability of the memorized secret.
            - list [ref=e1539]:
              - listitem [ref=e1540]: The likelihood of recall failure increases as there are more items for users to remember. With fewer memorized secrets, users can more easily recall the specific memorized secret needed for a particular RP.
              - listitem [ref=e1541]: The memory burden is greater for a less frequently used password.
          - listitem [ref=e1542]:
            - text: User experience during entry of the memorized secret.
            - list [ref=e1543]:
              - listitem [ref=e1544]: Support copy and paste functionality in fields for entering memorized secrets, including passphrases.
        - paragraph [ref=e1545]:
          - strong [ref=e1546]:
            - emphasis [ref=e1547]: Intermittent Events
        - paragraph [ref=e1548]: "Usability considerations for intermittent events include:"
        - list [ref=e1549]:
          - listitem [ref=e1550]:
            - text: "When users create and change memorized secrets:"
            - list [ref=e1551]:
              - listitem [ref=e1552]: Clearly communicate information on how to create and change memorized secrets.
              - listitem [ref=e1553]:
                - text: Clearly communicate memorized secret requirements, as specified in
                - link "Section 5.1.1" [ref=e1554] [cursor=pointer]:
                  - /url: "#reqauthtype"
                - text: .
              - listitem [ref=e1555]: Allow at least 64 characters in length to support the use of passphrases. Encourage users to make memorized secrets as lengthy as they want, using any characters they like (including spaces), thus aiding memorization.
              - listitem [ref=e1556]: Do not impose other composition rules (e.g. mixtures of different character types) on memorized secrets.
              - listitem [ref=e1557]:
                - text: Do not require that memorized secrets be changed arbitrarily (e.g., periodically) unless there is a user request or evidence of authenticator compromise. (See
                - link "Section 5.1.1" [ref=e1558] [cursor=pointer]:
                  - /url: "#reqauthtype"
                - text: for additional information).
          - listitem [ref=e1559]: Provide clear, meaningful and actionable feedback when chosen passwords are rejected (e.g., when it appears on a “black list” of unacceptable passwords or has been used previously).
        - heading "10.2.2 Look-Up Secrets" [level=4] [ref=e1560]
        - paragraph [ref=e1561]:
          - strong [ref=e1562]:
            - emphasis [ref=e1563]: Typical Usage
        - paragraph [ref=e1564]: Users use the authenticator — printed or electronic — to look up the appropriate secret(s) needed to respond to a verifier’s prompt. For example, a user may be asked to provide a specific subset of the numeric or character strings printed on a card in table format.
        - paragraph [ref=e1565]: "Usability considerations for typical usage include:"
        - list [ref=e1566]:
          - listitem [ref=e1567]:
            - text: User experience during entry of look-up secrets.
            - list [ref=e1568]:
              - listitem [ref=e1569]: Consider the prompts’ complexity and size. The larger the subset of secrets a user is prompted to look up, the greater the usability implications. Both the cognitive workload and physical difficulty for entry should be taken into account when selecting the quantity and complexity of look-up secrets for authentication.
        - heading "10.2.3 Out-of-Band" [level=4] [ref=e1570]
        - paragraph [ref=e1571]:
          - strong [ref=e1572]:
            - emphasis [ref=e1573]: Typical Usage
        - paragraph [ref=e1574]: Out-of-band authentication requires users have access to a primary and secondary communication channel.
        - paragraph [ref=e1575]: "Usability considerations for typical usage:"
        - list [ref=e1576]:
          - listitem [ref=e1577]:
            - paragraph [ref=e1578]: Notify users of the receipt of a secret on a locked device. However, if the out of band device is locked, authentication to the device should be required to access the secret.
          - listitem [ref=e1579]:
            - paragraph [ref=e1580]: Depending on the implementation, consider form-factor constraints as they are particularly problematic when users must enter text on mobile devices. Providing larger touch areas will improve usability for entering secrets on mobile devices.
          - listitem [ref=e1581]:
            - paragraph [ref=e1582]: A better usability option is to offer features that do not require text entry on mobile devices (e.g., a single tap on the screen, or a copy feature so users can copy and paste out-of-band secrets). Providing users such features is particularly helpful when the primary and secondary channels are on the same device. For example, it is difficult for users to transfer the authentication secret on a smartphone because they must switch back and forth—potentially multiple times—between the out of band application and the primary channel.
        - heading "10.2.4 Single-Factor OTP Device" [level=4] [ref=e1583]
        - paragraph [ref=e1584]:
          - strong [ref=e1585]:
            - emphasis [ref=e1586]: Typical Usage
        - paragraph [ref=e1587]: Users access the OTP generated by the single-factor OTP device. The authenticator output is typically displayed on the device and the user enters it for the verifier.
        - paragraph [ref=e1588]: "Usability considerations for typical usage include:"
        - list [ref=e1589]:
          - listitem [ref=e1590]:
            - paragraph [ref=e1591]:
              - text: Authenticator output allows at least one minute between changes, but ideally allows users the full two minutes as specified in
              - link "Section 5.1.4.1" [ref=e1592] [cursor=pointer]:
                - /url: "#sfotpa"
              - text: . Users need adequate time to enter the authenticator output (including looking back and forth between the single-factor OTP device and the entry screen).
          - listitem [ref=e1593]:
            - paragraph [ref=e1594]: "Depending on the implementation, the following are additional usability considerations for implementers:"
            - list [ref=e1595]:
              - listitem [ref=e1596]: If the single-factor OTP device supplies its output via an electronic interface (e.g, USB) this is preferable since users do not have to manually enter the authenticator output. However, if a physical input (e.g., pressing a button) is required to operate, the location of the USB ports could pose usability difficulties. For example, the USB ports of some computers are located on the back of the computer and will be difficult for users to reach.
              - listitem [ref=e1597]: Limited availability of a direct computer interface such as a USB port could pose usability difficulties. For example, the number of USB ports on laptop computers is often very limited. This may force users to unplug other USB peripherals in order to use the single-factor OTP device.
        - heading "10.2.5 Multi-Factor OTP Device" [level=4] [ref=e1598]
        - paragraph [ref=e1599]:
          - strong [ref=e1600]:
            - emphasis [ref=e1601]: Typical Usage
        - paragraph [ref=e1602]:
          - text: Users access the OTP generated by the multi-factor OTP device through a second authentication factor. The OTP is typically displayed on the device and the user manually enters it for the verifier. The second authentication factor may be achieved through some kind of integral entry pad to enter a memorized secret, an integral biometric (e.g., fingerprint) reader, or a direct computer interface (e.g., USB port). Usability considerations for the additional factor apply as well — see
          - link "Section 10.2.1" [ref=e1603] [cursor=pointer]:
            - /url: "#memorizedsecrets"
          - text: for memorized secrets and
          - link "Section 10.4" [ref=e1604] [cursor=pointer]:
            - /url: "#biomusability"
          - text: for biometrics used in multi-factor authenticators.
        - paragraph [ref=e1605]: "Usability considerations for typical usage include:"
        - list [ref=e1606]:
          - listitem [ref=e1607]:
            - text: User experience during manual entry of the authenticator output.
            - list [ref=e1608]:
              - listitem [ref=e1609]: For time-based OTP, provide a grace period in addition to the time during which the OTP is displayed. Users need adequate time to enter the authenticator output, including looking back and forth between the multi-factor OTP device and the entry screen.
              - listitem [ref=e1610]: Consider form-factor constraints if users must unlock the multi-factor OTP device via an integral entry pad or enter the authenticator output on mobile devices. Typing on small devices is significantly more error prone and time-consuming than typing on a traditional keyboard. The smaller the integral entry pad and onscreen keyboard, the more difficult it is to type. Providing larger touch areas improves usability for unlocking the multi-factor OTP device or entering the authenticator output on mobile devices.
              - listitem [ref=e1611]: Limited availability of a direct computer interface like a USB port could pose usability difficulties. For example, laptop computers often have a limited number of USB ports, which may force users to unplug other USB peripherals to use the multi-factor OTP device.
        - heading "10.2.6 Single-Factor Cryptographic Software" [level=4] [ref=e1612]
        - paragraph [ref=e1613]:
          - strong [ref=e1614]:
            - emphasis [ref=e1615]: Typical Usage
        - paragraph [ref=e1616]: Users authenticate by proving possession and control of the cryptographic software key.
        - paragraph [ref=e1617]: "Usability considerations for typical usage include:"
        - list [ref=e1618]:
          - listitem [ref=e1619]: Give cryptographic keys appropriately descriptive names that are meaningful to users since users have to recognize and recall which cryptographic key to use for which authentication task. This prevents users from having to deal with multiple similarly- and ambiguously-named cryptographic keys. Selecting from multiple cryptographic keys on smaller mobile devices may be particularly problematic if the names of the cryptographic keys are shortened due to reduced screen size.
        - heading "10.2.7 Single-Factor Cryptographic Device" [level=4] [ref=e1620]
        - paragraph [ref=e1621]:
          - strong [ref=e1622]:
            - emphasis [ref=e1623]: Typical Usage
        - paragraph [ref=e1624]: Users authenticate by proving possession of the single-factor cryptographic device.
        - paragraph [ref=e1625]: "Usability considerations for typical usage include:"
        - list [ref=e1626]:
          - listitem [ref=e1627]:
            - paragraph [ref=e1628]: Requiring a physical input (e.g., pressing a button) to operate the single-factor cryptographic device could pose usability difficulties. For example, some USB ports are located on the back of computers, making it difficult for users to reach.
          - listitem [ref=e1629]:
            - paragraph [ref=e1630]: Limited availability of a direct computer interface like a USB port could pose usability difficulties. For example, laptop computers often have a limited number of USB ports, which may force users to unplug other USB peripherals to use the single-factor cryptographic device.
        - heading "10.2.8 Multi-Factor Cryptographic Software" [level=4] [ref=e1631]
        - paragraph [ref=e1632]:
          - strong [ref=e1633]:
            - emphasis [ref=e1634]: Typical Usage
        - paragraph [ref=e1635]:
          - text: In order to authenticate, users prove possession and control of the cryptographic key stored on disk or some other “soft” media that requires activation. The activation is through the input of a second authentication factor, either a memorized secret or a biometric. Usability considerations for the additional factor apply as well — see
          - link "Section 10.2.1" [ref=e1636] [cursor=pointer]:
            - /url: "#memorizedsecrets"
          - text: for memorized secrets and
          - link "Section 10.4" [ref=e1637] [cursor=pointer]:
            - /url: "#biomusability"
          - text: for biometrics used in multi-factor authenticators.
        - paragraph [ref=e1638]: "Usability considerations for typical usage include:"
        - list [ref=e1639]:
          - listitem [ref=e1640]: Give cryptographic keys appropriately descriptive names that are meaningful to users since users have to recognize and recall which cryptographic key to use for which authentication task. This prevents users from having to deal with multiple similarly- and ambiguously-named cryptographic keys. Selecting from multiple cryptographic keys on smaller mobile devices may be particularly problematic if the names of the cryptographic keys are shortened due to reduced screen size.
        - heading "10.2.9 Multi-Factor Cryptographic Device" [level=4] [ref=e1641]
        - paragraph [ref=e1642]:
          - strong [ref=e1643]:
            - emphasis [ref=e1644]: Typical Usage
        - paragraph [ref=e1645]:
          - text: Users authenticate by proving possession of the multi-factor cryptographic device and control of the protected cryptographic key. The device is activated by a second authentication factor, either a memorized secret or a biometric. Usability considerations for the additional factor apply as well — see
          - link "Section 10.2.1" [ref=e1646] [cursor=pointer]:
            - /url: "#memorizedsecrets"
          - text: for memorized secrets and
          - link "Section 10.4" [ref=e1647] [cursor=pointer]:
            - /url: "#biomusability"
          - text: for biometrics used in multi-factor authenticators.
        - paragraph [ref=e1648]: "Usability considerations for typical usage include:"
        - list [ref=e1649]:
          - listitem [ref=e1650]:
            - text: Do not require users to keep multi-factor cryptographic devices connected following authentication. Users may forget to disconnect the multi-factor cryptographic device when they are done with it (e.g., forgetting a smartcard in the smartcard reader and walking away from the computer).
            - list [ref=e1651]:
              - listitem [ref=e1652]: Users need to be informed regarding whether the multi-factor cryptographic device is required to stay connected or not.
          - listitem [ref=e1653]:
            - paragraph [ref=e1654]: Give cryptographic keys appropriately descriptive names that are meaningful to users since users have to recognize and recall which cryptographic key to use for which authentication task. This prevents users being faced with multiple similarly and ambiguously named cryptographic keys. Selecting from multiple cryptographic keys on smaller mobile devices (such as smartphones) may be particularly problematic if the names of the cryptographic keys are shortened due to reduced screen size.
          - listitem [ref=e1655]: Limited availability of a direct computer interface like a USB port could pose usability difficulties. For example, laptop computers often have a limited number of USB ports, which may force users to unplug other USB peripherals to use the multi-factor cryptographic device.
        - heading "10.3 Summary of Usability Considerations" [level=3] [ref=e1656]
        - paragraph [ref=e1657]:
          - link "Table 10-1" [ref=e1658] [cursor=pointer]:
            - /url: "#t10-1"
          - text: summarizes the usability considerations for typical usage and intermittent events for each authenticator type. Many of the usability considerations for typical usage apply to most of the authenticator types, as demonstrated in the rows. The table highlights common and divergent usability characteristics across the authenticator types. Each column allows readers to easily identify the usability attributes to address for each authenticator. Depending on users’ goals and context of use, certain attributes may be valued over others. Whenever possible, provide alternative authenticator types and allow users to choose between them.
        - paragraph [ref=e1659]: Multi-factor authenticators (e.g., multi-factor OTP devices, multi-factor cryptographic software, and multi-factor cryptographic devices) also inherit their secondary factor’s usability considerations. As biometrics are only allowed as an activation factor in multi-factor authentication solutions, usability considerations for biometrics are not included in Table 10-1 and are discussed in Section 10.4.
        - paragraph
        - generic [ref=e1660]:
          - paragraph [ref=e1661]:
            - strong [ref=e1662]: Table 10-1 Usability Considerations Summary by Authenticator Type
          - paragraph [ref=e1663]
        - heading "10.4 Biometrics Usability Considerations" [level=3] [ref=e1664]: 10.4 Biometrics Usability Considerations
        - paragraph [ref=e1665]:
          - text: This section provides a high-level overview of general usability considerations for biometrics. A more detailed discussion of biometric usability can be found in
          - emphasis [ref=e1666]: Usability & Biometrics, Ensuring Successful Biometric Systems
          - link "NIST Usability" [ref=e1667] [cursor=pointer]:
            - /url: "#use-and-bio"
          - text: .
        - paragraph [ref=e1668]: "Although there are other biometric modalities, the following three biometric modalities are more commonly used for authentication: fingerprint, face and iris."
        - paragraph [ref=e1669]:
          - strong [ref=e1670]:
            - emphasis [ref=e1671]: Typical Usage
        - list [ref=e1672]:
          - listitem [ref=e1673]:
            - paragraph [ref=e1674]: For all modalities, user familiarity and practice with the device improves performance.
          - listitem [ref=e1675]:
            - paragraph [ref=e1676]: Device affordances (i.e., properties of a device that allow a user to perform an action), feedback, and clear instructions are critical to a user’s success with the biometric device. For example, provide clear instructions on the required actions for liveness detection.
          - listitem [ref=e1677]:
            - paragraph [ref=e1678]: Ideally, users can select the modality they are most comfortable with for their second authentication factor. The user population may be more comfortable and familiar with — and accepting of — some biometric modalities than others.
          - listitem [ref=e1679]:
            - text: User experience with biometrics as an activation factor.
            - list [ref=e1680]:
              - listitem [ref=e1681]: Provide clear, meaningful feedback on the number of remaining allowed attempts. For example, for rate limiting (i.e., throttling), inform users of the time period they have to wait until next attempt to reduce user confusion and frustration.
          - listitem [ref=e1682]:
            - text: "Fingerprint Usability Considerations:"
            - list [ref=e1683]:
              - listitem [ref=e1684]: Users have to remember which finger(s) they used for initial enrollment.
              - listitem [ref=e1685]: The amount of moisture on the finger(s) affects the sensor’s ability for successful capture.
              - listitem [ref=e1686]: Additional factors influencing fingerprint capture quality include age, gender, and occupation (e.g., users handling chemicals or working extensively with their hands may have degraded friction ridges).
          - listitem [ref=e1687]:
            - text: "Face Usability Considerations:"
            - list [ref=e1688]:
              - listitem [ref=e1689]: Users have to remember whether they wore any artifacts (e.g., glasses) during enrollment because it affects facial recognition accuracy.
              - listitem [ref=e1690]: Differences in environmental lighting conditions can affect facial recognition accuracy.
              - listitem [ref=e1691]: Facial expressions affect facial recognition accuracy (e.g., smiling versus neutral expression).
              - listitem [ref=e1692]: Facial poses affect facial recognition accuracy (e.g., looking down or away from the camera).
          - listitem [ref=e1693]:
            - text: "Iris Usability Considerations:"
            - list [ref=e1694]:
              - listitem [ref=e1695]: Wearing colored contacts may affect the iris recognition accuracy.
              - listitem [ref=e1696]: Users who have had eye surgery may need to re-enroll post-surgery.
              - listitem [ref=e1697]: Differences in environmental lighting conditions can affect iris recognition accuracy, especially for certain iris colors.
        - paragraph [ref=e1698]:
          - strong [ref=e1699]:
            - emphasis [ref=e1700]: Intermittent Events
        - paragraph [ref=e1701]: "As biometrics are only permitted as a second factor for multi-factor authentication, usability considerations for intermittent events with the primary factor still apply. Intermittent events with biometrics use include, but are not limited to, the following, which may affect recognition accuracy:"
        - list [ref=e1702]:
          - listitem [ref=e1703]: If users injure their enrolled finger(s), fingerprint recognition may not work. Fingerprint authentication will be difficult for users with degraded fingerprints.
          - listitem [ref=e1704]: The time elapsed between the time of facial recognition for authentication and the time of the initial enrollment can affect recognition accuracy as a user’s face changes naturally over time. A user’s weight change may also be a factor.
          - listitem [ref=e1705]: Iris recognition may not work for people who had eye surgery, unless they re-enroll.
        - paragraph [ref=e1706]: "Across all biometric modalities, usability considerations for intermittent events include:"
        - list [ref=e1707]:
          - listitem [ref=e1708]: An alternative authentication method must be available and functioning. In cases where biometrics do not work, allow users to use a memorized secret as an alternative second factor.
          - listitem [ref=e1709]:
            - text: "Provisions for technical assistance:"
            - list [ref=e1710]:
              - listitem [ref=e1711]: Clearly communicate information on how and where to acquire technical assistance. For example, provide users information such as a link to an online self-service feature and a phone number for help desk support. Ideally, provide sufficient information to enable users to recover from intermittent events on their own without outside intervention.
              - listitem [ref=e1712]: Inform users of factors that may affect the sensitivity of the biometric sensor (e.g., cleanliness of the sensor).
        - paragraph
        - heading "11 References" [level=2] [ref=e1713]
        - paragraph [ref=e1714]:
          - emphasis [ref=e1715]: This section is informative.
