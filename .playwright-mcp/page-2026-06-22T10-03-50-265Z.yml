          - heading "What is the ASVS?" [level=2] [ref=e67]
          - paragraph [ref=e68]: The OWASP Application Security Verification Standard (ASVS) Project provides a basis for testing web application technical security controls and also provides developers with a list of requirements for secure development.
          - heading "Support the ASVS" [level=2] [ref=e69]
          - paragraph [ref=e70]:
            - text: For more details on how to financially support the ASVS, see our
            - link "Supporters Page" [ref=e71] [cursor=pointer]:
              - /url: https://appsecg.host/fundasvs
            - text: .
          - heading "Stay up to date with the ASVS" [level=2] [ref=e72]
          - paragraph [ref=e73]: "Follow us on social media to ensure you don’t miss updates about the ASVS:"
          - list [ref=e74]:
            - listitem [ref=e75]:
              - link "Twitter Follow" [ref=e76] [cursor=pointer]:
                - /url: https://twitter.com/OWASP_ASVS
                - img "Twitter Follow" [ref=e77]
            - listitem [ref=e78]:
              - link [ref=e79] [cursor=pointer]:
                - /url: https://www.linkedin.com/company/owasp-asvs/
                - img [ref=e80]
          - heading "More Details on the ASVS" [level=2] [ref=e81]
          - paragraph [ref=e82]:
            - text: The primary aim of the
            - strong [ref=e83]: OWASP Application Security Verification Standard (ASVS) Project
            - text: "is to normalize the range in the coverage and level of rigor available in the market when it comes to performing Web application security verification using a commercially-workable open standard. The standard provides a basis for testing application technical security controls, as well as any technical security controls in the environment, that are relied on to protect against vulnerabilities such as Cross-Site Scripting (XSS) and SQL injection. This standard can be used to establish a level of confidence in the security of Web applications. The requirements were developed with the following objectives in mind:"
          - list [ref=e84]:
            - listitem [ref=e85]:
              - strong [ref=e86]: Use as a metric
              - text: "- Provide application developers and application owners with a yardstick with which to assess the degree of trust that can be placed in their Web applications,"
            - listitem [ref=e87]:
              - strong [ref=e88]: Use as guidance
              - text: "- Provide guidance to security control developers as to what to build into security controls in order to satisfy application security requirements, and"
            - listitem [ref=e89]:
              - strong [ref=e90]: Use during procurement
              - text: "- Provide a basis for specifying application security verification requirements in contracts."
          - paragraph [ref=e91]:
            - text: Get the latest stable version of the ASVS (5.0.0) from the
            - link "Downloads" [ref=e92] [cursor=pointer]:
              - /url: https://github.com/OWASP/ASVS/tree/v5.0.0#latest-stable-version---500
            - text: page.
          - heading "How To Reference ASVS Requirements" [level=2] [ref=e93]
          - paragraph [ref=e94]:
            - text: Each requirement has an identifier in the format
            - code [ref=e95]: <chapter>.<section>.<requirement>
            - text: ", where each element is a number. For example,"
            - code [ref=e96]: 1.11.3
            - text: .
          - list [ref=e97]:
            - listitem [ref=e98]:
              - text: The
              - code [ref=e99]: <chapter>
              - text: value corresponds to the chapter from which the requirement comes; for example, all
              - code [ref=e100]: 1.#.#
              - text: requirements are from the ‘Encoding and Sanitization’ chapter.
            - listitem [ref=e101]:
              - text: The
              - code [ref=e102]: <section>
              - text: "value corresponds to the section within that chapter where the requirement appears, for example: all"
              - code [ref=e103]: 1.2.#
              - text: requirements are in the ‘Injection Prevention’ section of the ‘Encoding and Sanitization’ chapter.
            - listitem [ref=e104]:
              - text: The
              - code [ref=e105]: <requirement>
              - text: value identifies the specific requirement within the chapter and section, for example,
              - code [ref=e106]: 1.2.5
              - text: "which as of version 5.0.0 of this standard is:"
          - blockquote [ref=e107]:
            - paragraph [ref=e108]: Verify that the application protects against OS command injection and that operating system calls use parameterized OS queries or use contextual command line output encoding.
          - paragraph [ref=e109]:
            - text: "Since the identifiers may change between versions of the standard, it is preferable for other documents, reports, or tools to use the following format:"
            - code [ref=e110]: v<version>-<chapter>.<section>.<requirement>
            - text: ", where: ‘version’ is the ASVS version tag. For example:"
            - code [ref=e111]: v5.0.0-1.2.5
            - text: would be understood to mean specifically the 5th requirement in the ‘Injection Prevention’ section of the ‘Encoding and Sanitization’ chapter from version 5.0.0. (This could be summarized as
            - code [ref=e112]: v<version>-<requirement_identifier>
            - text: .)
          - paragraph [ref=e113]:
            - text: "Note: The"
            - code [ref=e114]: v
            - text: preceding the version number in the format should always be lowercase.
          - paragraph [ref=e115]:
            - text: If identifiers are used without including the
            - code [ref=e116]: v<version>
            - text: element then they should be assumed to refer to the latest Application Security Verification Standard content. As the standard grows and changes this becomes problematic, which is why writers or developers should include the version element.
          - paragraph [ref=e117]:
            - text: ASVS requirement lists are made available in
            - link "CSV, JSON, and other formats" [ref=e118] [cursor=pointer]:
              - /url: https://github.com/OWASP/ASVS
            - text: which may be useful for reference or programmatic use.
