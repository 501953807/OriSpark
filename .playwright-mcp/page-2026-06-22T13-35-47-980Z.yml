                    - img [ref=e582]
                - paragraph [ref=e584]:
                  - text: Each scenario has an identifier in the format
                  - code [ref=e585]: WSTG-<category>-<number>
                  - text: ", where: 'category' is a 4 character upper case string that identifies the type of test or weakness, and 'number' is a zero-padded numeric value from 01 to 99. For example:"
                  - code [ref=e586]: WSTG-INFO-02
                  - text: is the second Information Gathering test.
                - paragraph [ref=e587]:
                  - text: "The identifiers may change between versions. Therefore, it is preferable that other documents, reports, or tools use the format:"
                  - code [ref=e588]: WSTG-<version>-<category>-<number>
                  - text: ", where: 'version' is the version tag with punctuation removed. For example:"
                  - code [ref=e589]: WSTG-v42-INFO-02
                  - text: would be understood to mean specifically the second Information Gathering test from version 4.2.
                - paragraph [ref=e590]:
                  - text: If identifiers are used without including the
                  - code [ref=e591]: <version>
                  - text: element, they should be assumed to refer to the latest Web Security Testing Guide content. As the guide grows and changes this becomes problematic, which is why writers or developers should include the version element.
