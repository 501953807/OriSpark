        - article [ref=e591]:
          - heading "Authentication Cheat Sheet ¶" [level=1] [ref=e592]:
            - text: Authentication Cheat Sheet
            - link "¶" [ref=e593] [cursor=pointer]:
              - /url: "#authentication-cheat-sheet"
          - heading "Introduction ¶" [level=2] [ref=e594]:
            - text: Introduction
            - link "¶" [ref=e595] [cursor=pointer]:
              - /url: "#introduction"
          - paragraph [ref=e596]:
            - strong [ref=e597]: Authentication
            - text: (
            - strong [ref=e598]: AuthN
            - text: ) is the process of verifying that an individual, entity, or website is who or what it claims to be by determining the validity of one or more authenticators (like passwords, fingerprints, or security tokens) that are used to back up this claim.
          - paragraph [ref=e599]:
            - strong [ref=e600]: Digital Identity
            - text: is the unique representation of a subject engaged in an online transaction. A digital identity is always unique in the context of a digital service but does not necessarily need to be traceable back to a specific real-life subject.
          - paragraph [ref=e601]:
            - strong [ref=e602]: Identity Proofing
            - text: establishes that a subject is actually who they claim to be. This concept is related to KYC concepts and it aims to bind a digital identity with a real person.
          - paragraph [ref=e603]:
            - strong [ref=e604]: Session Management
            - text: is a process by which a server maintains the state of an entity interacting with it. This is required for a server to remember how to react to subsequent requests throughout a transaction. Sessions are maintained on the server by a session identifier which can be passed back and forth between the client and server when transmitting and receiving requests. Sessions should be unique per user and computationally very difficult to predict. The
            - link "Session Management Cheat Sheet" [ref=e605] [cursor=pointer]:
              - /url: Session_Management_Cheat_Sheet.html
            - text: contains further guidance on the best practices in this area.
          - heading "Authentication General Guidelines ¶" [level=2] [ref=e606]:
            - text: Authentication General Guidelines
            - link "¶" [ref=e607] [cursor=pointer]:
              - /url: "#authentication-general-guidelines"
          - heading "User IDs ¶" [level=3] [ref=e608]:
            - text: User IDs
            - link "¶" [ref=e609] [cursor=pointer]:
              - /url: "#user-ids"
          - paragraph [ref=e610]: The primary function of a User ID is to uniquely identify a user within a system. Ideally, User IDs should be randomly generated to prevent the creation of predictable or sequential IDs, which could pose a security risk, especially in systems where User IDs might be exposed or inferred from external sources.
          - heading "Usernames ¶" [level=3] [ref=e611]:
            - text: Usernames
            - link "¶" [ref=e612] [cursor=pointer]:
              - /url: "#usernames"
          - paragraph [ref=e613]: Usernames are easy-to-remember identifiers chosen by the user and used for identifying themselves when logging into a system or service. The terms User ID and username might be used interchangeably if the username chosen by the user also serves as their unique identifier within the system.
          - paragraph [ref=e614]:
            - text: Users should be permitted to use their email address as a username, provided the email is verified during sign-up. Additionally, they should have the option to choose a username other than an email address. For information on validating email addresses, please visit the
            - link "input validation cheat sheet email discussion" [ref=e615] [cursor=pointer]:
              - /url: Input_Validation_Cheat_Sheet.html#email-address-validation
            - text: .
          - heading "Authentication Solution and Sensitive Accounts ¶" [level=3] [ref=e616]:
            - text: Authentication Solution and Sensitive Accounts
            - link "¶" [ref=e617] [cursor=pointer]:
              - /url: "#authentication-solution-and-sensitive-accounts"
          - list [ref=e618]:
            - listitem [ref=e619]:
              - text: Do
              - strong [ref=e620]: NOT
              - text: allow login with sensitive accounts (i.e. accounts that can be used internally within the solution such as to a backend / middleware / database) to any front-end user interface
            - listitem [ref=e621]:
              - text: Do
              - strong [ref=e622]: NOT
              - text: use the same authentication solution (e.g. IDP / AD) used internally for unsecured access (e.g., public access / DMZ)
          - heading "Implement Proper Password Strength Controls ¶" [level=3] [ref=e623]:
            - text: Implement Proper Password Strength Controls
            - link "¶" [ref=e624] [cursor=pointer]:
              - /url: "#implement-proper-password-strength-controls"
          - paragraph [ref=e625]: "A key concern when using passwords for authentication is password strength. A \"strong\" password policy makes it difficult or even improbable for one to guess the password through either manual or automated means. The following characteristics define a strong password:"
          - list [ref=e626]:
            - listitem [ref=e627]:
              - text: Password Length
              - list [ref=e628]:
                - listitem [ref=e629]:
                  - strong [ref=e630]: Minimum
                  - text: length for passwords should be enforced by the application.
                  - list [ref=e631]:
                    - listitem [ref=e632]:
                      - text: If MFA is enabled passwords
                      - strong [ref=e633]: shorter than 8 characters
                      - text: are considered to be weak (
                      - link "NIST SP800-63B" [ref=e634] [cursor=pointer]:
                        - /url: https://pages.nist.gov/800-63-4/sp800-63b.html#passwordver
                      - text: ).
                    - listitem [ref=e635]:
                      - text: If MFA is not enabled passwords
                      - strong [ref=e636]: shorter than 15 characters
                      - text: are considered to be weak (
                      - link "NIST SP800-63B" [ref=e637] [cursor=pointer]:
                        - /url: https://pages.nist.gov/800-63-4/sp800-63b.html#passwordver
                      - text: ).
                - listitem [ref=e638]:
                  - strong [ref=e639]: Maximum
                  - text: password length should be
                  - strong [ref=e640]: at least 64 characters
                  - text: to allow passphrases (
                  - link "NIST SP800-63B" [ref=e641] [cursor=pointer]:
                    - /url: https://pages.nist.gov/800-63-4/sp800-63b.html#passwordlength
                  - text: ). Note that certain implementations of hashing algorithms may cause
                  - link "long password denial of service" [ref=e642] [cursor=pointer]:
                    - /url: https://www.acunetix.com/vulnerabilities/web/long-password-denial-of-service/
                  - text: .
            - listitem [ref=e643]:
              - text: Do not silently truncate passwords. The
              - link "Password Storage Cheat Sheet" [ref=e644] [cursor=pointer]:
                - /url: Password_Storage_Cheat_Sheet.html#maximum-password-lengths
              - text: provides further guidance on how to handle passwords that are longer than the maximum length.
            - listitem [ref=e645]:
              - text: Allow usage of
              - strong [ref=e646]: all
              - text: characters including unicode and whitespace. There should be no password composition rules limiting the type of characters permitted. There should be no requirement for upper or lower case or numbers or special characters.
            - listitem [ref=e647]:
              - text: Ensure credential rotation when a password leak occurs, at the time of compromise identification or when authenticator technology changes. Avoid requiring periodic password changes; instead, encourage users to pick strong passwords and enable
              - link "Multifactor Authentication Cheat Sheet (MFA)" [ref=e648] [cursor=pointer]:
                - /url: Multifactor_Authentication_Cheat_Sheet.html
              - text: . According to NIST guidelines, verifiers should not mandate arbitrary password changes (e.g., periodically).
            - listitem [ref=e649]:
              - text: Include a password strength meter to help users create a more complex password
              - list [ref=e650]:
                - listitem [ref=e651]:
                  - link "zxcvbn-ts library" [ref=e652] [cursor=pointer]:
                    - /url: https://github.com/zxcvbn-ts/zxcvbn
                  - text: can be used for this purpose.
                - listitem [ref=e653]:
                  - text: Other language implementations of zxcvbn
                  - link "listed here" [ref=e654] [cursor=pointer]:
                    - /url: https://github.com/dropbox/zxcvbn?tab=readme-ov-file
                  - text: ; however check the age and maturity of each example before use.
            - listitem [ref=e655]:
              - text: Block common and previously breached passwords
              - list [ref=e656]:
                - listitem [ref=e657]:
                  - link "Pwned Passwords" [ref=e658] [cursor=pointer]:
                    - /url: https://haveibeenpwned.com/Passwords
                  - text: is a service where passwords can be checked against previously breached passwords. Details on the API
                  - link "are here" [ref=e659] [cursor=pointer]:
                    - /url: https://haveibeenpwned.com/API/v3#PwnedPasswords
                  - text: .
                - listitem [ref=e660]:
                  - text: Alternatively, you can download the
                  - link "Pwned Passwords" [ref=e661] [cursor=pointer]:
                    - /url: https://haveibeenpwned.com/Passwords
                  - text: database
                  - link "using this mechanism" [ref=e662] [cursor=pointer]:
                    - /url: https://github.com/HaveIBeenPwned/PwnedPasswordsDownloader?tab=readme-ov-file#what-is-haveibeenpwned-downloader
                  - text: to host it yourself.
                - listitem [ref=e663]:
                  - text: "Other top password lists are available but there is no guarantee as to how updated they are:"
                  - list [ref=e664]:
                    - listitem [ref=e665]:
                      - link "Various password lists" [ref=e666] [cursor=pointer]:
                        - /url: https://github.com/danielmiessler/SecLists/tree/master/Passwords
                      - text: hosted by SecLists from Daniel Miessler.
                    - listitem [ref=e667]:
                      - text: Static copy of the top 100,000 passwords from "Have I Been Pwned" hosted by NCSC in
                      - link "text" [ref=e668] [cursor=pointer]:
                        - /url: https://www.ncsc.gov.uk/static-assets/documents/PwnedPasswordsTop100k.txt
                      - text: and
                      - link "JSON" [ref=e669] [cursor=pointer]:
                        - /url: https://www.ncsc.gov.uk/static-assets/documents/PwnedPasswordsTop100k.json
                      - text: format.
          - heading "For more detailed information check ¶" [level=4] [ref=e670]:
            - text: For more detailed information check
            - link "¶" [ref=e671] [cursor=pointer]:
              - /url: "#for-more-detailed-information-check"
          - list [ref=e672]:
            - listitem [ref=e673]:
              - link "ASVS v5.0 Password Security Requirements" [ref=e674] [cursor=pointer]:
                - /url: https://github.com/OWASP/ASVS/blob/master/5.0/en/0x15-V6-Authentication.md#v62-password-security
            - listitem [ref=e675]:
              - 'link "Passwords Evolved: Authentication Guidance for the Modern Era" [ref=e676] [cursor=pointer]':
                - /url: https://www.troyhunt.com/passwords-evolved-authentication-guidance-for-the-modern-era/
          - heading "Implement Secure Password Recovery Mechanism ¶" [level=3] [ref=e677]:
            - text: Implement Secure Password Recovery Mechanism
            - link "¶" [ref=e678] [cursor=pointer]:
              - /url: "#implement-secure-password-recovery-mechanism"
          - paragraph [ref=e679]:
            - text: It is common for an application to have a mechanism that provides a means for a user to gain access to their account in the event they forget their password. Please see
            - link "Forgot Password Cheat Sheet" [ref=e680] [cursor=pointer]:
              - /url: Forgot_Password_Cheat_Sheet.html
            - text: for details on this feature.
          - heading "Store Passwords in a Secure Fashion ¶" [level=3] [ref=e681]:
            - text: Store Passwords in a Secure Fashion
            - link "¶" [ref=e682] [cursor=pointer]:
              - /url: "#store-passwords-in-a-secure-fashion"
          - paragraph [ref=e683]:
            - text: It is critical for an application to store a password using the right cryptographic technique. Please see
            - link "Password Storage Cheat Sheet" [ref=e684] [cursor=pointer]:
              - /url: Password_Storage_Cheat_Sheet.html
            - text: for details on this feature.
          - heading "Compare Password Hashes Using Safe Functions ¶" [level=3] [ref=e685]:
            - text: Compare Password Hashes Using Safe Functions
            - link "¶" [ref=e686] [cursor=pointer]:
              - /url: "#compare-password-hashes-using-safe-functions"
          - paragraph [ref=e687]:
            - text: Where possible, the user-supplied password should be compared to the stored password hash using a secure password comparison function provided by the language or framework, such as the
            - link "password_verify()" [ref=e688] [cursor=pointer]:
              - /url: https://www.php.net/manual/en/function.password-verify.php
            - text: "function in PHP. Where this is not possible, ensure that the comparison function:"
          - list [ref=e689]:
            - listitem [ref=e690]: Has a maximum input length, to protect against denial of service attacks with very long inputs.
            - listitem [ref=e691]: Explicitly sets the type of both variables, to protect against type confusion attacks such as Magic Hashes in PHP.
            - listitem [ref=e692]: Returns in constant time, to protect against timing attacks.
          - heading "Change Password Feature ¶" [level=3] [ref=e693]:
            - text: Change Password Feature
            - link "¶" [ref=e694] [cursor=pointer]:
              - /url: "#change-password-feature"
          - paragraph [ref=e695]: "When developing a change password feature, ensure to have:"
          - list [ref=e696]:
            - listitem [ref=e697]: The user is authenticated with an active session.
            - listitem [ref=e698]: "Current password verification. This is to ensure that it's the legitimate user who is changing the password. Consider this abuse case: a user logs in on a public computer and forgets to log out. Another person could then use that active session. If we don't verify the current password, this other person may be able to change the password."
          - heading "Transmit Passwords Only Over TLS or Other Strong Transport ¶" [level=3] [ref=e699]:
            - text: Transmit Passwords Only Over TLS or Other Strong Transport
            - link "¶" [ref=e700] [cursor=pointer]:
              - /url: "#transmit-passwords-only-over-tls-or-other-strong-transport"
          - paragraph [ref=e701]:
            - text: "See:"
            - link "Transport Layer Security Cheat Sheet" [ref=e702] [cursor=pointer]:
              - /url: Transport_Layer_Security_Cheat_Sheet.html
          - paragraph [ref=e703]: The login page and all subsequent authenticated pages must be exclusively accessed over TLS or other strong transport. Failure to utilize TLS or other strong transport for the login page allows an attacker to modify the login form action, causing the user's credentials to be posted to an arbitrary location. Failure to utilize TLS or other strong transport for authenticated pages after login enables an attacker to view the unencrypted session ID and compromise the user's authenticated session.
          - heading "Require Re-authentication for Sensitive Features ¶" [level=3] [ref=e704]:
            - text: Require Re-authentication for Sensitive Features
            - link "¶" [ref=e705] [cursor=pointer]:
              - /url: "#require-re-authentication-for-sensitive-features"
          - paragraph [ref=e706]: In order to mitigate CSRF and session hijacking, it's important to require the current credentials for an account before updating sensitive account information such as the user's password or email address -- or before sensitive transactions, such as shipping a purchase to a new address. Without this countermeasure, an attacker may be able to execute sensitive transactions through a CSRF or XSS attack without needing to know the user's current credentials. Additionally, an attacker may get temporary physical access to a user's browser or steal their session ID to take over the user's session.
          - heading "Reauthentication After Risk Events ¶" [level=3] [ref=e707]:
            - text: Reauthentication After Risk Events
            - link "¶" [ref=e708] [cursor=pointer]:
              - /url: "#reauthentication-after-risk-events"
          - paragraph [ref=e709]:
            - strong [ref=e710]: "Overview:"
            - text: Reauthentication is critical when an account has experienced high-risk activity such as account recovery, password resets, or suspicious behavior patterns. This section outlines when and how to trigger reauthentication to protect users and prevent unauthorized access. For further details, see the
            - link "Require Re-authentication for Sensitive Features" [ref=e711] [cursor=pointer]:
              - /url: "#require-re-authentication-for-sensitive-features"
            - text: section.
          - heading "When to Trigger Reauthentication ¶" [level=4] [ref=e712]:
            - text: When to Trigger Reauthentication
            - link "¶" [ref=e713] [cursor=pointer]:
              - /url: "#when-to-trigger-reauthentication"
          - list [ref=e714]:
            - listitem [ref=e715]:
              - strong [ref=e716]: Suspicious Account Activity
              - text: When unusual login patterns, IP address changes, or device enrollments occur
            - listitem [ref=e717]:
              - strong [ref=e718]: Account Recovery
              - text: After users reset their passwords or change sensitive account details
            - listitem [ref=e719]:
              - strong [ref=e720]: Critical Actions
              - text: For high-risk actions like changing payment details or adding new trusted devices
          - heading "Reauthentication Mechanisms ¶" [level=4] [ref=e721]:
            - text: Reauthentication Mechanisms
            - link "¶" [ref=e722] [cursor=pointer]:
              - /url: "#reauthentication-mechanisms"
          - list [ref=e723]:
            - listitem [ref=e724]:
              - strong [ref=e725]: Adaptive Authentication
              - text: Use risk-based authentication models that adapt to the user's behavior and context
            - listitem [ref=e726]:
              - strong [ref=e727]: Multi-Factor Authentication (MFA)
              - text: Require an additional layer of verification for sensitive actions or events
            - listitem [ref=e728]:
              - strong [ref=e729]: Challenge-Based Verification
              - text: Prompt users to confirm their identity with a challenge question or secondary method
          - heading "Implementation Recommendations ¶" [level=4] [ref=e730]:
            - text: Implementation Recommendations
            - link "¶" [ref=e731] [cursor=pointer]:
              - /url: "#implementation-recommendations"
          - list [ref=e732]:
            - listitem [ref=e733]:
              - strong [ref=e734]: Minimize User Friction
              - text: Ensure that reauthentication does not disrupt the user experience unnecessarily
            - listitem [ref=e735]:
              - strong [ref=e736]: Context-Aware Decisions
              - text: Make reauthentication decisions based on context (e.g., geolocation, device type, prior patterns)
            - listitem [ref=e737]:
              - strong [ref=e738]: Secure Session Management
              - text: Invalidate sessions after reauthentication and rotate tokens—see the
              - link "OWASP Session Management Cheat Sheet" [ref=e739] [cursor=pointer]:
                - /url: https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html
          - heading "References ¶" [level=4] [ref=e740]:
            - text: References
            - link "¶" [ref=e741] [cursor=pointer]:
              - /url: "#references"
          - list [ref=e742]:
            - listitem [ref=e743]:
              - link "OWASP Session Management Cheat Sheet" [ref=e744] [cursor=pointer]:
                - /url: https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html
            - listitem [ref=e745]: "OWASP ASVS – 2.2.2: Reauthentication requirements"
            - listitem [ref=e746]: "NIST 800-63B: Digital Identity Guidelines – Authentication Assurance Levels"
          - heading "Consider Strong Transaction Authentication ¶" [level=3] [ref=e747]:
            - text: Consider Strong Transaction Authentication
            - link "¶" [ref=e748] [cursor=pointer]:
              - /url: "#consider-strong-transaction-authentication"
          - paragraph [ref=e749]:
            - text: Some applications should use a second factor to check whether a user may perform sensitive operations. For more information, see the
            - link "Transaction Authorization Cheat Sheet" [ref=e750] [cursor=pointer]:
              - /url: Transaction_Authorization_Cheat_Sheet.html
            - text: .
          - heading "TLS Client Authentication ¶" [level=4] [ref=e751]:
            - text: TLS Client Authentication
            - link "¶" [ref=e752] [cursor=pointer]:
              - /url: "#tls-client-authentication"
          - paragraph [ref=e753]: TLS Client Authentication, also known as two-way TLS authentication, consists of both browser and server sending their respective TLS certificates during the TLS handshake process. Just as you can validate the authenticity of a server by using the certificate and asking a verifiably-valid Certificate Authority (CA) if the certificate is valid, the server can authenticate the user by receiving a certificate from the client and validating against a third-party CA or its own CA. To do this, the server must provide the user with a certificate generated specifically for him, assigning values to the subject so that these can be used to determine what user the certificate should validate. The user installs the certificate on a browser and now uses it for the website.
          - paragraph [ref=e754]: "This approach is appropriate when:"
          - list [ref=e755]:
            - listitem [ref=e756]: It is acceptable (or even preferred) that the user has access to the website only from a single computer/browser.
            - listitem [ref=e757]: The user is not easily scared by the process of installing TLS certificates on their browser, or there will be someone, probably from IT support, who will do this for the user.
            - listitem [ref=e758]: The website requires an extra step of security.
            - listitem [ref=e759]: It is also a good thing to use when the website is for an intranet of a company or organization.
          - paragraph [ref=e760]: It is generally not a good idea to use this method for widely and publicly available websites that will have an average user. For example, it wouldn't be a good idea to implement this for a website like Facebook. While this technique can prevent the user from having to type a password (thus protecting against an average keylogger from stealing it), it is still considered a good idea to consider using both a password and TLS client authentication combined.
          - paragraph [ref=e761]: Additionally, if the client is behind an enterprise proxy that performs SSL/TLS decryption, this will break certificate authentication unless the site is allowed on the proxy.
          - paragraph [ref=e762]:
            - text: "For more information, see:"
            - link "Client-authenticated TLS handshake" [ref=e763] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Transport_Layer_Security#Client-authenticated_TLS_handshake
          - heading "Authentication and Error Messages ¶" [level=3] [ref=e764]:
            - text: Authentication and Error Messages
            - link "¶" [ref=e765] [cursor=pointer]:
              - /url: "#authentication-and-error-messages"
          - paragraph [ref=e766]: Incorrectly implemented error messages in the case of authentication functionality can be used for the purposes of user ID and password enumeration. An application should respond (both HTTP and HTML) in a generic manner.
          - heading "Authentication Responses ¶" [level=4] [ref=e767]:
            - text: Authentication Responses
            - link "¶" [ref=e768] [cursor=pointer]:
              - /url: "#authentication-responses"
          - paragraph [ref=e769]: "Using any of the authentication mechanisms (login, password reset, or password recovery), an application must respond with a generic error message regardless of whether:"
          - list [ref=e770]:
            - listitem [ref=e771]: The user ID or password was incorrect.
            - listitem [ref=e772]: The account does not exist.
            - listitem [ref=e773]: The account is locked or disabled.
          - paragraph [ref=e774]: The account registration feature should also be taken into consideration, and the same approach of a generic error message can be applied regarding the case in which the user exists.
          - paragraph [ref=e775]:
            - text: The objective is to prevent the creation of a
            - link "discrepancy factor" [ref=e776] [cursor=pointer]:
              - /url: https://cwe.mitre.org/data/definitions/204.html
            - text: ", allowing an attacker to mount a user enumeration action against the application."
          - paragraph [ref=e777]:
            - text: It is interesting to note that the business logic itself can bring a discrepancy factor related to the processing time taken. Indeed, depending on the implementation, the processing time can be significantly different according to the case (success vs failure) allowing an attacker to mount a
            - link "time-based attack" [ref=e778] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Timing_attack
            - text: (delta of some seconds for example).
          - paragraph [ref=e779]: "Example using pseudo-code for a login feature:"
          - list [ref=e780]:
            - listitem [ref=e781]: First implementation using the "quick exit" approach
          - code [ref=e784]: IF USER_EXISTS(username) THEN password_hash=HASH(password) IS_VALID=LOOKUP_CREDENTIALS_IN_STORE(username, password_hash) IF NOT IS_VALID THEN RETURN Error("Invalid Username or Password!") ENDIF ELSE RETURN Error("Invalid Username or Password!") ENDIF
          - paragraph [ref=e785]: It can be clearly seen that if the user doesn't exist, the application will directly throw an error. Otherwise, when the user exists and the password doesn't, it is apparent that there will be more processing before the application errors out. In return, the response time will be different for the same error, allowing the attacker to differentiate between a wrong username and a wrong password.
          - list [ref=e786]:
            - listitem [ref=e787]: "Second implementation without relying on the \"quick exit\" approach:"
          - code [ref=e790]: password_hash=HASH(password) IS_VALID=LOOKUP_CREDENTIALS_IN_STORE(username, password_hash) IF NOT IS_VALID THEN RETURN Error("Invalid Username or Password!") ENDIF
          - paragraph [ref=e791]: This code will go through the same process no matter what the user or the password is, allowing the application to return in approximately the same response time.
          - paragraph [ref=e792]:
            - text: The problem with returning a generic error message for the user is a User Experience (UX) matter. A legitimate user might feel confused with the generic messages, thus making it hard for them to use the application, and might after several retries, leave the application because of its complexity. The decision to return a
            - emphasis [ref=e793]: generic error message
            - text: can be determined based on the criticality of the application and its data. For example, for critical applications, the team can decide that under the failure scenario, a user will always be redirected to the support page and a
            - emphasis [ref=e794]: generic error message
            - text: will be returned.
          - paragraph [ref=e795]:
            - text: Regarding the user enumeration itself, protection against
            - link "brute-force attacks" [ref=e796] [cursor=pointer]:
              - /url: "#protect-against-automated-attacks"
            - text: is also effective because it prevents an attacker from applying the enumeration at scale. Usage of
            - link "CAPTCHA" [ref=e797] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/CAPTCHA
            - text: can be applied to a feature for which a
            - emphasis [ref=e798]: generic error message
            - text: cannot be returned because the
            - emphasis [ref=e799]: user experience
            - text: must be preserved.
          - heading "Incorrect and correct response examples ¶" [level=5] [ref=e800]:
            - text: Incorrect and correct response examples
            - link "¶" [ref=e801] [cursor=pointer]:
              - /url: "#incorrect-and-correct-response-examples"
          - heading "Login ¶" [level=6] [ref=e802]:
            - text: Login
            - link "¶" [ref=e803] [cursor=pointer]:
              - /url: "#login"
          - paragraph [ref=e804]: "Incorrect response examples:"
          - list [ref=e805]:
            - listitem [ref=e806]: "\"Login for User foo: invalid password.\""
            - listitem [ref=e807]: "\"Login failed, invalid user ID.\""
            - listitem [ref=e808]: "\"Login failed; account disabled.\""
            - listitem [ref=e809]: "\"Login failed; this user is not active.\""
          - paragraph [ref=e810]: "Correct response example:"
          - list [ref=e811]:
            - listitem [ref=e812]: "\"Login failed; Invalid user ID or password.\""
          - heading "Password recovery ¶" [level=6] [ref=e813]:
            - text: Password recovery
            - link "¶" [ref=e814] [cursor=pointer]:
              - /url: "#password-recovery"
          - paragraph [ref=e815]: "Incorrect response examples:"
          - list [ref=e816]:
            - listitem [ref=e817]: "\"We just sent you a password reset link.\""
            - listitem [ref=e818]: "\"This email address doesn't exist in our database.\""
          - paragraph [ref=e819]: "Correct response example:"
          - list [ref=e820]:
            - listitem [ref=e821]: "\"If that email address is in our database, we will send you an email to reset your password.\""
          - heading "Account creation ¶" [level=6] [ref=e822]:
            - text: Account creation
            - link "¶" [ref=e823] [cursor=pointer]:
              - /url: "#account-creation"
          - paragraph [ref=e824]: "Incorrect response examples:"
          - list [ref=e825]:
            - listitem [ref=e826]: "\"This user ID is already in use.\""
            - listitem [ref=e827]: "\"Welcome! You have signed up successfully.\""
          - paragraph [ref=e828]: "Correct response example:"
          - list [ref=e829]:
            - listitem [ref=e830]: "\"A link to activate your account has been emailed to the address provided.\""
          - heading "Error Codes and URLs ¶" [level=5] [ref=e831]:
            - text: Error Codes and URLs
            - link "¶" [ref=e832] [cursor=pointer]:
              - /url: "#error-codes-and-urls"
          - paragraph [ref=e833]:
            - text: The application may return a different
            - link "HTTP Error code" [ref=e834] [cursor=pointer]:
              - /url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Status
            - text: depending on the authentication attempt response. It may respond with a 200 for a positive result and a 403 for a negative result. Even though a generic error page is shown to a user, the HTTP response code may differ which can leak information about whether the account is valid or not.
          - paragraph [ref=e835]:
            - text: Error disclosure can also be used as a discrepancy factor, consult the
            - link "error handling cheat sheet" [ref=e836] [cursor=pointer]:
              - /url: Error_Handling_Cheat_Sheet.html
            - text: regarding the global handling of different errors in an application.
          - heading "Protect Against Automated Attacks ¶" [level=3] [ref=e837]:
            - text: Protect Against Automated Attacks
            - link "¶" [ref=e838] [cursor=pointer]:
              - /url: "#protect-against-automated-attacks"
          - paragraph [ref=e839]: "There are a number of different types of automated attacks that attackers can use to try and compromise user accounts. The most common types are listed below:"
          - table [ref=e842]:
            - rowgroup [ref=e843]:
              - row "Attack Type Description" [ref=e844]:
                - columnheader "Attack Type" [ref=e845]
                - columnheader "Description" [ref=e846]
            - rowgroup [ref=e847]:
              - row "Brute Force Testing multiple passwords from a dictionary or other source against a single account." [ref=e848]:
                - cell "Brute Force" [ref=e849]
                - cell "Testing multiple passwords from a dictionary or other source against a single account." [ref=e850]
              - row "Credential Stuffing Testing username/password pairs obtained from the breach of another site." [ref=e851]:
                - cell "Credential Stuffing" [ref=e852]
                - cell "Testing username/password pairs obtained from the breach of another site." [ref=e853]
              - row "Password Spraying Testing a single weak password against a large number of different accounts." [ref=e854]:
                - cell "Password Spraying" [ref=e855]
                - cell "Testing a single weak password against a large number of different accounts." [ref=e856]
          - paragraph [ref=e857]: Different protection mechanisms can be implemented to protect against these attacks. In many cases, these defenses do not provide complete protection, but when a number of them are implemented in a defense-in-depth approach, a reasonable level of protection can be achieved.
          - paragraph [ref=e858]:
            - text: The following sections will focus primarily on preventing brute-force attacks, although these controls can also be effective against other types of attacks. For further guidance on defending against credential stuffing and password spraying, see the
            - link "Credential Stuffing Cheat Sheet" [ref=e859] [cursor=pointer]:
              - /url: Credential_Stuffing_Prevention_Cheat_Sheet.html
            - text: .
          - heading "Multi-Factor Authentication ¶" [level=4] [ref=e860]:
            - text: Multi-Factor Authentication
            - link "¶" [ref=e861] [cursor=pointer]:
              - /url: "#multi-factor-authentication"
          - paragraph [ref=e862]:
            - text: Multi-factor authentication (MFA) is by far the best defense against the majority of password-related attacks, including brute-force attacks, with analysis by Microsoft suggesting that it would have stopped
            - link "99.9% of account compromises" [ref=e863] [cursor=pointer]:
              - /url: https://techcommunity.microsoft.com/t5/Azure-Active-Directory-Identity/Your-Pa-word-doesn-t-matter/ba-p/731984
            - text: . As such, it should be implemented wherever possible; however, depending on the audience of the application, it may not be practical or feasible to enforce the use of MFA.
          - paragraph [ref=e864]:
            - text: The
            - link "Multifactor Authentication Cheat Sheet" [ref=e865] [cursor=pointer]:
              - /url: Multifactor_Authentication_Cheat_Sheet.html
            - text: contains further guidance on implementing MFA.
          - heading "Login Throttling ¶" [level=4] [ref=e866]:
            - text: Login Throttling
            - link "¶" [ref=e867] [cursor=pointer]:
              - /url: "#login-throttling"
          - paragraph [ref=e868]: "Login Throttling is a protocol used to prevent an attacker from making too many attempts at guessing a password through normal interactive means, it includes the following controls:"
          - list [ref=e869]:
            - listitem [ref=e870]: Maximum number of attempts.
          - heading "Account Lockout ¶" [level=5] [ref=e871]:
            - text: Account Lockout
            - link "¶" [ref=e872] [cursor=pointer]:
              - /url: "#account-lockout"
          - paragraph [ref=e873]: The most common protection against these attacks is to implement account lockout, which prevents any more login attempts for a period after a certain number of failed logins.
          - paragraph [ref=e874]: "The counter of failed logins should be associated with the account itself, rather than the source IP address, in order to prevent an attacker from making login attempts from a large number of different IP addresses. There are a number of different factors that should be considered when implementing an account lockout policy in order to find a balance between security and usability:"
          - list [ref=e875]:
            - listitem [ref=e876]: The number of failed attempts before the account is locked out (lockout threshold).
            - listitem [ref=e877]: The time period that these attempts must occur within (observation window).
            - listitem [ref=e878]: How long the account is locked out for (lockout duration).
          - paragraph [ref=e879]: Rather than implementing a fixed lockout duration (e.g., ten minutes), some applications use an exponential lockout, where the lockout duration starts as a very short period (e.g., one second), but doubles after each failed login attempt.
          - list [ref=e880]:
            - listitem [ref=e881]: Amount of time to delay after each account lockout (max 2-3, after that permanent account lockout).
          - paragraph [ref=e882]: When designing an account lockout system, care must be taken to prevent it from being used to cause a denial of service by locking out other users' accounts. One way this could be performed is to allow the use of the forgotten password functionality to log in, even if the account is locked out.
          - heading "CAPTCHA ¶" [level=4] [ref=e883]:
            - text: CAPTCHA
            - link "¶" [ref=e884] [cursor=pointer]:
              - /url: "#captcha"
          - paragraph [ref=e885]: The use of an effective CAPTCHA can help to prevent automated login attempts against accounts. However, many CAPTCHA implementations have weaknesses that allow them to be solved using automated techniques or can be outsourced to services that can solve them. As such, the use of CAPTCHA should be viewed as a defense-in-depth control to make brute-force attacks more time-consuming and expensive, rather than as a preventative.
          - paragraph [ref=e886]: It may be more user-friendly to only require a CAPTCHA be solved after a small number of failed login attempts, rather than requiring it from the very first login.
          - heading "Security Questions and Memorable Words ¶" [level=4] [ref=e887]:
            - text: Security Questions and Memorable Words
            - link "¶" [ref=e888] [cursor=pointer]:
              - /url: "#security-questions-and-memorable-words"
          - paragraph [ref=e889]:
            - text: The addition of a security question or memorable word can also help protect against automated attacks, especially when the user is asked to enter a number of randomly chosen characters from the word. It should be noted that this does
            - strong [ref=e890]: not
            - text: constitute multi-factor authentication, as both factors are the same (something you know). Furthermore, security questions are often weak and have predictable answers, so they must be carefully chosen. The
            - link "Choosing and Using Security Questions cheat sheet" [ref=e891] [cursor=pointer]:
              - /url: Choosing_and_Using_Security_Questions_Cheat_Sheet.html
            - text: contains further guidance on this.
          - heading "Logging and Monitoring ¶" [level=2] [ref=e892]:
            - text: Logging and Monitoring
            - link "¶" [ref=e893] [cursor=pointer]:
              - /url: "#logging-and-monitoring"
          - paragraph [ref=e894]: Enable logging and monitoring of authentication functions to detect attacks/failures on a real-time basis
          - list [ref=e895]:
            - listitem [ref=e896]: Ensure that all failures are logged and reviewed
            - listitem [ref=e897]: Ensure that all password failures are logged and reviewed
            - listitem [ref=e898]: Ensure that all account lockouts are logged and reviewed
          - heading "Use of authentication protocols that require no password ¶" [level=2] [ref=e899]:
            - text: Use of authentication protocols that require no password
            - link "¶" [ref=e900] [cursor=pointer]:
              - /url: "#use-of-authentication-protocols-that-require-no-password"
          - paragraph [ref=e901]: While authentication through a combination of username, password, and multi-factor authentication is considered generally secure, there are use cases where it isn't considered the best option or even safe. Examples of this are third-party applications that desire to connect to the web application, either from a mobile device, another website, desktop, or other situations. When this happens, it is NOT considered safe to allow the third-party application to store the user/password combo, since then it extends the attack surface into their hands, where it isn't in your control. For this and other use cases, there are several authentication protocols that can protect you from exposing your users' data to attackers.
          - heading "OAuth 2.0 and 2.1 ¶" [level=3] [ref=e902]:
            - text: OAuth 2.0 and 2.1
            - link "¶" [ref=e903] [cursor=pointer]:
              - /url: "#oauth-20-and-21"
          - paragraph [ref=e904]:
            - text: OAuth is an
            - strong [ref=e905]: authorization
            - text: "framework for delegated access to APIs. See also:"
            - link "OAuth 2.0 Cheat Sheet" [ref=e906] [cursor=pointer]:
              - /url: OAuth2_Cheat_Sheet.html
            - text: .
          - blockquote [ref=e907]:
            - paragraph [ref=e908]:
              - strong [ref=e909]: "Note:"
              - text: "OAuth 2.1 is an IETF Working Group draft that consolidates OAuth 2.0 and widely adopted best practices and is intended to replace RFC 6749/6750; guidance in this cheat sheet applies to both OAuth 2.0 and OAuth 2.1. References:"
              - link "draft-ietf-oauth-v2-1-13" [ref=e910] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/draft-ietf-oauth-v2-1-13
              - text: ","
              - link "oauth.net/2.1" [ref=e911] [cursor=pointer]:
                - /url: https://oauth.net/2.1/
          - heading "OpenID Connect (OIDC) ¶" [level=3] [ref=e912]:
            - text: OpenID Connect (OIDC)
            - link "¶" [ref=e913] [cursor=pointer]:
              - /url: "#openid-connect-oidc"
          - paragraph [ref=e914]:
            - strong [ref=e915]: OpenID Connect 1.0 (OIDC)
            - text: is an identity layer
            - strong [ref=e916]: on top of OAuth
            - text: . It defines how a client (
            - strong [ref=e917]: relying party
            - text: ) verifies the
            - strong [ref=e918]: end user's
            - text: identity using an
            - strong [ref=e919]: ID Token
            - text: (a signed JWT) and how to obtain user claims in an interoperable way. Use
            - strong [ref=e920]: OIDC for authentication/SSO
            - text: ; use
            - strong [ref=e921]: OAuth for authorization
            - text: to APIs.
          - heading "OIDC implementation guidance ¶" [level=4] [ref=e922]:
            - text: OIDC implementation guidance
            - link "¶" [ref=e923] [cursor=pointer]:
              - /url: "#oidc-implementation-guidance"
          - list [ref=e924]:
            - listitem [ref=e925]:
              - strong [ref=e926]: Validate ID Tokens
              - text: "on the relying party: issuer ("
              - code [ref=e927]: iss
              - text: ), audience (
              - code [ref=e928]: aud
              - text: ), signature (per provider JWKs), expiration (
              - code [ref=e929]: exp
              - text: ).
            - listitem [ref=e930]:
              - text: Prefer
              - strong [ref=e931]: well-maintained libraries/SDKs
              - text: and provider discovery/JWKS endpoints.
            - listitem [ref=e932]:
              - text: Use the
              - strong [ref=e933]: UserInfo
              - text: endpoint when additional claims beyond the ID Token are required.
          - blockquote [ref=e934]:
            - paragraph [ref=e935]:
              - strong [ref=e936]: "Avoid confusion:"
              - strong [ref=e937]: OpenID 2.0 ("OpenID")
              - text: was a separate, legacy authentication protocol that has been
              - strong [ref=e938]: superseded by OpenID Connect
              - text: "and is considered obsolete. New systems should not implement OpenID 2.0. References:"
              - link "OpenID Foundation — obsolete OpenID 2.0 libraries" [ref=e939] [cursor=pointer]:
                - /url: https://openid.net/developers/libraries-for-obsolete-specifications/
              - text: ","
              - link "OpenID 2.0 → OIDC migration" [ref=e940] [cursor=pointer]:
                - /url: https://openid.net/specs/openid-connect-migration-1_0.html
          - heading "SAML ¶" [level=3] [ref=e941]:
            - text: SAML
            - link "¶" [ref=e942] [cursor=pointer]:
              - /url: "#saml"
          - paragraph [ref=e943]: Security Assertion Markup Language (SAML) is often considered to compete with OpenId. The most recommended version is 2.0 since it is very feature-complete and provides strong security. Like OpenId, SAML uses identity providers, but unlike OpenId, it is XML-based and provides more flexibility. SAML is based on browser redirects which send XML data. Furthermore, SAML isn't only initiated by a service provider; it can also be initiated from the identity provider. This allows the user to navigate through different portals while still being authenticated without having to do anything, making the process transparent.
          - paragraph [ref=e944]: While OpenId has taken most of the consumer market, SAML is often the choice for enterprise applications because there are few OpenId identity providers which are considered enterprise-class (meaning that the way they validate the user identity doesn't have high standards required for enterprise identity). It is more common to see SAML being used inside of intranet websites, sometimes even using a server from the intranet as the identity provider.
          - paragraph [ref=e945]: In the past few years, applications like SAP ERP and SharePoint (SharePoint by using Active Directory Federation Services 2.0) have decided to use SAML 2.0 authentication as an often preferred method for single sign-on implementations whenever enterprise federation is required for web services and web applications.
          - paragraph [ref=e946]:
            - strong [ref=e947]:
              - text: "See also:"
              - link "SAML Security Cheat Sheet" [ref=e948] [cursor=pointer]:
                - /url: SAML_Security_Cheat_Sheet.html
          - heading "FIDO ¶" [level=3] [ref=e949]:
            - text: FIDO
            - link "¶" [ref=e950] [cursor=pointer]:
              - /url: "#fido"
          - paragraph [ref=e951]: "The Fast Identity Online (FIDO) Alliance has created two protocols to facilitate online authentication: the Universal Authentication Framework (UAF) protocol and the Universal Second Factor (U2F) protocol. While UAF focuses on passwordless authentication, U2F allows the addition of a second factor to existing password-based authentication. Both protocols are based on a public key cryptography challenge-response model."
          - paragraph [ref=e952]: UAF takes advantage of existing security technologies present on devices for authentication including fingerprint sensors, cameras (face biometrics), microphones (voice biometrics), Trusted Execution Environments (TEEs), Secure Elements (SEs), and others. The protocol is designed to plug these device capabilities into a common authentication framework. UAF works with both native applications and web applications.
          - paragraph [ref=e953]:
            - text: U2F augments password-based authentication using a hardware token (typically USB) that stores cryptographic authentication keys and uses them for signing. The user can use the same token as a second factor for multiple applications. U2F works with web applications. It provides
            - strong [ref=e954]: protection against phishing
            - text: by using the URL of the website to look up the stored authentication key.
          - paragraph [ref=e955]:
            - strong [ref=e956]: FIDO2
            - text: ": FIDO2 and WebAuthn, encompassing previous standards (UAF/U2F), form the foundation of modern"
            - strong [ref=e957]: Passkeys
            - text: technology. Passkeys enable users to securely log in using local user verification (such as biometrics or device PINs), often with credential synchronization across devices.
          - heading "Hardware-backed Key Storage ¶" [level=4] [ref=e958]:
            - text: Hardware-backed Key Storage
            - link "¶" [ref=e959] [cursor=pointer]:
              - /url: "#hardware-backed-key-storage"
          - paragraph [ref=e960]: For many authenticators, including common platform passkeys, the private key is generated and stored by the operating system's secure key manager. Depending on the platform and authenticator, keys may be protected using hardware-backed components such as the Trusted Platform Module (TPM) on Windows, Secure Enclave on Apple devices, or the Android Keystore/StrongBox on Android, or by other software-based mechanisms.
          - paragraph [ref=e961]: In typical implementations, the private key is intended to be non-exportable and bound to the authenticator, and the platform security module signs a server challenge using this key. However, some authenticators support credential synchronization or backup that may involve export or server-side storage, and not all implementations are hardware-backed. Relying parties should not assume that keys are hardware-backed and non-exportable unless this is verified (for example, via authenticator properties or attestation).
          - heading "Password Managers ¶" [level=2] [ref=e962]:
            - text: Password Managers
            - link "¶" [ref=e963] [cursor=pointer]:
              - /url: "#password-managers"
          - paragraph [ref=e964]: "Password managers are programs, browser plugins, or web services that automate the management of a large quantity of different credentials. Most password managers have functionality to allow users to easily use them on websites, either: (a) by pasting the passwords into the login form -- or -- (b) by simulating the user typing them in."
          - paragraph [ref=e965]: "Web applications should not make the job of password managers more difficult than necessary by observing the following recommendations:"
          - list [ref=e966]:
            - listitem [ref=e967]:
              - text: Use standard HTML forms for username and password input with appropriate
              - code [ref=e968]: type
              - text: attributes.
            - listitem [ref=e969]: Avoid plugin-based login pages (such as Flash or Silverlight).
            - listitem [ref=e970]:
              - text: Implement a reasonable maximum password length, at least 64 characters, as discussed in the
              - link "Implement Proper Password Strength Controls section" [ref=e971] [cursor=pointer]:
                - /url: "#implement-proper-password-strength-controls"
              - text: .
            - listitem [ref=e972]: Allow any printable characters to be used in passwords.
            - listitem [ref=e973]: Allow users to paste into the username, password, and MFA fields.
            - listitem [ref=e974]:
              - text: Allow users to navigate between the username and password field with a single press of the
              - code [ref=e975]: Tab
              - text: key.
          - heading "Changing A User's Registered Email Address ¶" [level=2] [ref=e976]:
            - text: Changing A User's Registered Email Address
            - link "¶" [ref=e977] [cursor=pointer]:
              - /url: "#changing-a-users-registered-email-address"
          - paragraph [ref=e978]: "User email addresses often change. The following process is recommended to handle such situations in a system:"
          - paragraph [ref=e979]:
            - emphasis [ref=e980]:
              - text: "Note: The process is less stringent with"
              - link "Multifactor Authentication" [ref=e981] [cursor=pointer]:
                - /url: https://cheatsheetseries.owasp.org/cheatsheets/Multifactor_Authentication_Cheat_Sheet.html
              - text: ", as proof-of-identity is stronger than relying solely on a password."
          - heading "Recommended Process If the User HAS Multifactor Authentication Enabled ¶" [level=3] [ref=e982]:
            - text: Recommended Process If the User HAS
            - link "Multifactor Authentication" [ref=e983] [cursor=pointer]:
              - /url: https://cheatsheetseries.owasp.org/cheatsheets/Multifactor_Authentication_Cheat_Sheet.html
            - text: Enabled
            - link "¶" [ref=e984] [cursor=pointer]:
              - /url: "#recommended-process-if-the-user-has-multifactor-authentication-enabled"
          - list [ref=e985]:
            - listitem [ref=e986]: Confirm the validity of the user's authentication cookie/token. If not valid, display a login screen.
            - listitem [ref=e987]: Describe the process for changing the registered email address to the user.
            - listitem [ref=e988]: Ask the user to submit a proposed new email address, ensuring it complies with system rules.
            - listitem [ref=e989]:
              - text: Request the use of
              - link "Multifactor Authentication" [ref=e990] [cursor=pointer]:
                - /url: https://cheatsheetseries.owasp.org/cheatsheets/Multifactor_Authentication_Cheat_Sheet.html
              - text: for identity verification.
            - listitem [ref=e991]: Store the proposed new email address as a pending change.
            - listitem [ref=e992]:
              - text: Create and store
              - strong [ref=e993]: two
              - text: time-limited nonces for (a) system administrators' notification, and (b) user confirmation.
            - listitem [ref=e994]:
              - paragraph [ref=e995]: "Send two email messages with links that include those nonces:"
              - list [ref=e996]:
                - listitem [ref=e997]:
                  - paragraph [ref=e998]:
                    - text: A
                    - strong [ref=e999]: notification-only email message
                    - text: to the current address, alerting the user to the impending change and providing a link to report unexpected activity.
                - listitem [ref=e1000]:
                  - paragraph [ref=e1001]:
                    - text: A
                    - strong [ref=e1002]: confirmation-required email message
                    - text: to the proposed new address, instructing the user to confirm the change and providing a link for unexpected situations.
            - listitem [ref=e1003]:
              - paragraph [ref=e1004]: Handle responses from the links accordingly.
          - heading "Recommended Process If the User DOES NOT HAVE Multifactor Authentication Enabled ¶" [level=3] [ref=e1005]:
            - text: Recommended Process If the User DOES NOT HAVE Multifactor Authentication Enabled
            - link "¶" [ref=e1006] [cursor=pointer]:
              - /url: "#recommended-process-if-the-user-does-not-have-multifactor-authentication-enabled"
          - list [ref=e1007]:
            - listitem [ref=e1008]: Confirm the validity of the user's authentication cookie/token. If not valid, display a login screen.
            - listitem [ref=e1009]: Describe the process for changing the registered email address to the user.
            - listitem [ref=e1010]: Ask the user to submit a proposed new email address, ensuring it complies with system rules.
            - listitem [ref=e1011]: Request the user's current password for identity verification.
            - listitem [ref=e1012]: Store the proposed new email address as a pending change.
            - listitem [ref=e1013]: Create and store three time-limited nonces for system administrators' notification, user confirmation, and an additional step for password reliance.
            - listitem [ref=e1014]:
              - paragraph [ref=e1015]: "Send two email messages with links to those nonces:"
              - list [ref=e1016]:
                - listitem [ref=e1017]:
                  - paragraph [ref=e1018]:
                    - text: A
                    - strong [ref=e1019]: confirmation-required email message
                    - text: to the current address, instructing the user to confirm the change and providing a link for an unexpected situation.
                - listitem [ref=e1020]:
                  - paragraph [ref=e1021]:
                    - text: A
                    - strong [ref=e1022]: separate confirmation-required email message
                    - text: to the proposed new address, instructing the user to confirm the change and providing a link for unexpected situations.
            - listitem [ref=e1023]:
              - paragraph [ref=e1024]: Handle responses from the links accordingly.
          - heading "Notes on the Above Processes ¶" [level=3] [ref=e1025]:
            - text: Notes on the Above Processes
            - link "¶" [ref=e1026] [cursor=pointer]:
              - /url: "#notes-on-the-above-processes"
          - list [ref=e1027]:
            - listitem [ref=e1028]:
              - paragraph [ref=e1029]:
                - text: It's worth noting that Google adopts a different approach with accounts secured only by a password --
                - link "where the current email address receives a notification-only email" [ref=e1030] [cursor=pointer]:
                  - /url: https://support.google.com/accounts/answer/55393?hl=en
                - text: . This method carries risks and requires user vigilance.
            - listitem [ref=e1031]:
              - paragraph [ref=e1032]:
                - text: Regular social engineering training is crucial. System administrators and help desk staff should be trained to follow the prescribed process and recognize and respond to social engineering attacks. Refer to
                - link "CISA's \"Avoiding Social Engineering and Phishing Attacks\"" [ref=e1033] [cursor=pointer]:
                  - /url: https://www.cisa.gov/news-events/news/avoiding-social-engineering-and-phishing-attacks
                - text: for guidance.
          - heading "Adaptive or Risk Based Authentication ¶" [level=2] [ref=e1034]:
            - text: Adaptive or Risk Based Authentication
            - link "¶" [ref=e1035] [cursor=pointer]:
              - /url: "#adaptive-or-risk-based-authentication"
          - paragraph [ref=e1036]: A feature of more advanced applications is the ability to require different authentication stages depending on various environmental and contextual attributes (including but not limited to, the sensitivity of the data for which access is being requested, time of day, user location, IP address, or device fingerprint).
          - paragraph [ref=e1037]: For example, an application may require MFA for the first login from a particular device but not for subsequent logins from that device. Alternatively, a single sign-on solution may authenticate the user and allow them to remain logged in for a day but require a reauthentication if they try to access their profile page.
          - paragraph [ref=e1038]: Another option is the opposite approach where an application allows low risk access with just something that identifies the device (e.g., a specific mobile device fingerprint, a persistent cookie and browser fingerprint, etc. from the previous IP address) and then gradually requires stronger authentication for more sensitive operations. An example might be to allow someone to trigger something to see their current bank balance, but not the account number or anything else. If they need to see transactions, then the application puts them through some base level authentication and if they want to do any money movement, then MFA is required.
          - paragraph [ref=e1039]: "Questions that should be considered when implementing a mechanism like this include:"
          - list [ref=e1040]:
            - listitem [ref=e1041]: Are the policies being put in place in line with any corporate policies and especially any regulatory policy?
            - listitem [ref=e1042]: Which user‑ or device‑attributes (IP, geolocation, device fingerprint, time‑of‑day, behavioral biometrics, etc.) will we monitor at session start?
            - listitem [ref=e1043]: Which of those signals need to be refreshed during an active session, and at what cadence?
            - listitem [ref=e1044]: How will we ensure each signal’s accuracy and handle missing or low‑confidence data?
            - listitem [ref=e1045]: What scoring model (weights, thresholds, ML, rule‑based, hybrid) will convert raw signals into a risk tier?
            - listitem [ref=e1046]: Where will the model run (edge, API gateway, central service), and what is our latency budget?
            - listitem [ref=e1047]: What action maps to each risk tier (allow, CAPTCHA, step‑up MFA, block, revoke session)?
            - listitem [ref=e1048]: What user‑facing messages and error codes will accompany each action?
            - listitem [ref=e1049]: At which exact code or platform layers will we invoke the risk engine (login controller, middleware, API gateway, service mesh)?
            - listitem [ref=e1050]: How do we propagate decisions consistently across web, mobile, and API clients?
            - listitem [ref=e1051]: How do we mutate, extend, or revoke tokens/cookies when a mid‑session risk check escalates?
            - listitem [ref=e1052]: How do we synchronize state across multiple concurrent devices or browser tabs?
            - listitem [ref=e1053]: What monitoring and alerting will be in place for potentially suspicious activity, including how the user is notified.
