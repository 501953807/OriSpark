<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2332;
    --border: #1e293b; --text: #e2e8f0; --text2: #94a3b8;
    --accent: #8b5cf6; --accent2: #f59e0b;

    --pink: #ec4899; --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 2rem;
  }
  .container {
    max-width: 1280px; width: 100%;
    background: var(--surface); border-radius: 16px;
    border: 1px solid var(--border); padding: 2rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 1.4rem; font-weight: 700;
    color: var(--accent); margin-bottom: 0.25rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  h1 .badge {
    font-size: 0.65rem; background: rgba(139,92,246,0.15);
    color: var(--accent); padding: 2px 8px; border-radius: 4px;
    font-weight: 500;
  }
  .subtitle {
    color: var(--text2); font-size: 0.85rem;
    margin-bottom: 1.5rem; padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  svg { width: 100%; height: auto; display: block; }
  .legend {
    display: flex; gap: 1.5rem; flex-wrap: wrap;
    margin-top: 1rem; padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.75rem; color: var(--text2);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  @media (max-width: 900px) {
    body { padding: 0.5rem; }
    .container { padding: 1rem; }
    h1 { font-size: 1.1rem; }
  }
</style>
</head>
